rules:

  - id: llm-llm05-output-rendered-as-html-without-escape
    languages: [javascript, typescript]
    severity: WARNING
    message: |
      LLM output rendered into the DOM via innerHTML / dangerouslySetInnerHTML.
      Adversarial output (e.g., from a poisoned RAG corpus) can inject script.
      Render as text, or sanitize with DOMPurify.

      OWASP LLM Top 10:2025 — LLM05 Improper Output Handling
    patterns:
      - pattern-either:
          - pattern: $EL.innerHTML = $RESP.content[0].text
          - pattern: $EL.innerHTML = $RESP.choices[0].message.content
          - pattern: '<$X dangerouslySetInnerHTML={{ __html: $RESP.content[0].text }} />'
          - pattern: '<$X dangerouslySetInnerHTML={{ __html: $RESP.choices[0].message.content }} />'
    metadata:
      category: security
      owasp: "LLM05:2025 Improper Output Handling"
      cwe: "CWE-79"
      confidence: HIGH
      pack: [llm, fast, deep]
