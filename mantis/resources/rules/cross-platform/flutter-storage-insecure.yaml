  - id: flutter-world-readable-file-permissions
    patterns:
      - pattern-either:
          - pattern: |
              File($PATH).writeAsString($DATA, mode: FileMode.$MODE)
          - pattern: |
              File($PATH).openWrite(mode: FileMode.$MODE)
      - metavariable-regex:
          metavariable: $MODE
          regex: (write|append)
      - pattern-not-inside: |
          void main() {
            test('...', () { ... });
          }
    message: |
      File created without explicit permission control (OWASP M9).
      Files created in Flutter inherit default permissions which may be
      world-readable on some platforms.

      RISK:
      On Android, files in external storage are readable by other apps.
      On iOS with iCloud backup enabled, files may be backed up to cloud.

      SECURE IMPLEMENTATION:
      ```dart
      import 'dart:io';
      import 'package:path_provider/path_provider.dart';

      class SecureFileCreation {
        Future<void> createSecureFile(String filename, String content) async {
          // Use app-private directory (not external storage)
          final directory = await getApplicationSupportDirectory();
          final file = File('${directory.path}/$filename');

          // Write file
          await file.writeAsString(content);

          // On Android, explicitly set permissions (600 = owner read/write only)
          if (Platform.isAndroid) {
            await Process.run('chmod', ['600', file.path]);
          }

          // On iOS, exclude from backup if contains sensitive data
          if (Platform.isIOS) {
            await file.setLastModified(DateTime.now());
            // Set exclude from backup attribute
            await Process.run('xattr', [
              '-w',
              'com.apple.MobileBackup',
              '1',
              file.path
            ]);
          }
        }

        // Verify no files in external storage
        Future<void> verifyNoExternalStorage() async {
          if (Platform.isAndroid) {
            final externalDir = await getExternalStorageDirectory();
            final files = externalDir?.listSync() ?? [];

            for (var file in files) {
              if (file is File && await _containsSensitiveData(file)) {
                print('WARNING: Sensitive file in external storage: ${file.path}');
                // Move to internal storage or delete
              }
            }
          }
        }

        Future<bool> _containsSensitiveData(File file) async {
          // Implement sensitive data detection logic
          return false;
        }
      }
      ```

      STORAGE LOCATIONS SECURITY:
      | Location | Android | iOS | Security |
      |----------|---------|-----|----------|
      | Application Support | Private | Private | ✅ Secure |
      | Documents | Private | iCloud backup | ⚠️ Backed up |
      | Cache | Private, cleared | Private | ✅ Temporary |
      | External Storage | Public | N/A | ❌ Insecure |

      BEST PRACTICES:
      - Use getApplicationSupportDirectory() for sensitive files
      - Never use getExternalStorageDirectory() for sensitive data
      - Set restrictive permissions (600) on Android
      - Exclude sensitive files from iOS backup
      - Verify file locations in security audits

      Reference: OWASP Mobile Storage Cheat Sheet
    severity: WARNING
    languages:
