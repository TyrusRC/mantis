      Credentials stored in Keychain without biometric protection (OWASP M3).

      RISK:
      Credentials without biometric protection can be accessed if device is unlocked.

      SECURE IMPLEMENTATION:
      ```javascript
      import * as Keychain from 'react-native-keychain';

      async function storeCredentialsSecurely(username, password) {
        await Keychain.setGenericPassword(username, password, {
          accessControl: Keychain.ACCESS_CONTROL.BIOMETRY_CURRENT_SET,
          accessible: Keychain.ACCESSIBLE.WHEN_PASSCODE_SET_THIS_DEVICE_ONLY,
          authenticationType: Keychain.AUTHENTICATION_TYPE.BIOMETRICS,
          service: 'app.credentials',
        });
      }

      async function getCredentialsWithBiometric() {
        const credentials = await Keychain.getGenericPassword({
          service: 'app.credentials',
          authenticationPrompt: {
            title: 'Authenticate to access credentials',
          },
        });

        return credentials;
      }
