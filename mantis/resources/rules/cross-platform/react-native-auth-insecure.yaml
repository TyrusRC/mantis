rules:
  # React Native Authentication/Authorization Security Rules
  # OWASP Mobile Top 10 2024 - M3: Insecure Authentication/Authorization
  # Comprehensive detection of authentication vulnerabilities in React Native apps
  # Coverage: Biometrics, JWT, OAuth, session management, password policies

  # ============================================================================
  # BIOMETRIC AUTHENTICATION VULNERABILITIES
  # ============================================================================

  - id: react-native-biometric-event-based-no-crypto
    patterns:
      - pattern-either:
          - pattern: |
              ReactNativeBiometrics.simplePrompt({...})
          - pattern: |
              $BIOMETRICS.simplePrompt({...})
          - pattern: |
              await $BIOMETRICS.simplePrompt({...})
      - pattern-not-inside: |
          const result = await $BIOMETRICS.createSignature({...})
          ...
      - pattern-not-inside: |
          $BIOMETRICS.createKeys()
          ...
          await $BIOMETRICS.createSignature({...})
    message: |
      Event-based biometric authentication without cryptographic binding (OWASP M3).

      VULNERABILITY:
      Using simplePrompt() only checks biometric success/failure without
      cryptographic operations. Attackers can bypass this via:
      - Frida hooking to return success=true
      - Runtime manipulation
      - Binary patching

      VULNERABLE PATTERN:
      ```javascript
      import ReactNativeBiometrics from 'react-native-biometrics';

      class InsecureBiometricAuth {
        async authenticate() {
          const biometrics = new ReactNativeBiometrics();

          // VULNERABLE: Event-based authentication
          const {success} = await biometrics.simplePrompt({
            promptMessage: 'Authenticate to continue',
          });

          if (success) {
            // Grant access based on boolean only
            await this.loadSensitiveData();
            return true;
          }

          return false;
        }
      }
      ```

      ATTACK SCENARIO:
      ```javascript
      // Frida script to bypass biometric check
      Java.perform(function() {
        var ReactNativeBiometrics = Java.use('com.rnbiometrics.ReactNativeBiometricsModule');

        ReactNativeBiometrics.simplePrompt.implementation = function(options, promise) {
          console.log('[*] Biometric prompt bypassed!');

          // Return success without actual authentication
          var map = Java.use('com.facebook.react.bridge.WritableNativeMap').$new();
          map.putBoolean('success', true);
          promise.resolve(map);
        };
      });
      ```

      SECURE IMPLEMENTATION - Crypto-bound biometrics:
      ```javascript
      import ReactNativeBiometrics from 'react-native-biometrics';
      import * as Keychain from 'react-native-keychain';
      import CryptoJS from 'crypto-js';

      class SecureBiometricAuth {
        constructor() {
          this.biometrics = new ReactNativeBiometrics({
            allowDeviceCredentials: true,
          });
        }

        // Initialize biometric-protected key pair
        async setupBiometricKey() {
          const {available, biometryType} = await this.biometrics.isSensorAvailable();

          if (!available) {
            throw new Error('Biometric authentication not available');
          }

          // Create public/private key pair stored in hardware-backed keystore
          const {publicKey} = await this.biometrics.createKeys();

          // Send public key to backend for registration
          await this.registerPublicKey(publicKey);

          console.log(`Biometric key created (${biometryType})`);
          return publicKey;
        }

        // Authenticate with cryptographic signature
        async authenticateAndDecrypt(encryptedData) {
          try {
            // SECURE: Create cryptographic signature with biometric authentication
            const {success, signature} = await this.biometrics.createSignature({
              promptMessage: 'Authenticate to access sensitive data',
              payload: encryptedData,
            });

            if (!success || !signature) {
              throw new Error('Biometric authentication failed');
            }

            // Verify signature with backend
            const verified = await this.verifySignature(signature, encryptedData);

            if (!verified) {
              throw new Error('Signature verification failed');
            }

            // Retrieve encryption key from biometric-protected keychain
            const credentials = await Keychain.getGenericPassword({
              service: 'biometric.encryption.key',
              accessControl: Keychain.ACCESS_CONTROL.BIOMETRY_CURRENT_SET,
              authenticationType: Keychain.AUTHENTICATION_TYPE.BIOMETRICS,
            });

            if (!credentials) {
              throw new Error('Encryption key not found');
            }

            // Decrypt data using biometric-protected key
            const decrypted = this.decryptData(encryptedData, credentials.password);
            return decrypted;
          } catch (error) {
            console.error('Biometric authentication error:', error);
            return null;
          }
        }

        // Store encryption key in biometric-protected keychain
        async storeEncryptionKey(key) {
          await Keychain.setGenericPassword('biometric_key', key, {
            service: 'biometric.encryption.key',
            accessControl: Keychain.ACCESS_CONTROL.BIOMETRY_CURRENT_SET,
            accessible: Keychain.ACCESSIBLE.WHEN_PASSCODE_SET_THIS_DEVICE_ONLY,
            authenticationType: Keychain.AUTHENTICATION_TYPE.BIOMETRICS,
          });
        }

        // Encrypt sensitive data
        encryptData(plaintext, key) {
          const encrypted = CryptoJS.AES.encrypt(plaintext, key).toString();
          return encrypted;
        }

        // Decrypt sensitive data
        decryptData(ciphertext, key) {
          const decrypted = CryptoJS.AES.decrypt(ciphertext, key);
          return decrypted.toString(CryptoJS.enc.Utf8);
        }

        // Verify signature with backend
        async verifySignature(signature, payload) {
          const response = await fetch('https://api.example.com/auth/verify-signature', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({signature, payload}),
          });

          const {valid} = await response.json();
          return valid;
        }

        // Register public key with backend
        async registerPublicKey(publicKey) {
          await fetch('https://api.example.com/auth/register-biometric', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({publicKey}),
          });
        }

        // Delete biometric keys (on logout)
        async deleteBiometricKeys() {
          await this.biometrics.deleteKeys();
          await Keychain.resetGenericPassword({
            service: 'biometric.encryption.key',
          });
        }
      }

      // Usage
      const auth = new SecureBiometricAuth();

      // Setup
      await auth.setupBiometricKey();
      await auth.storeEncryptionKey(generateRandomKey());

      // Authenticate
      const decrypted = await auth.authenticateAndDecrypt(encryptedData);

      if (decrypted) {
        console.log('Authentication successful');
      }
      ```

      PLATFORM-SPECIFIC SECURITY:

      **Android (BiometricPrompt + Keystore):**
      ```javascript
      // Configure for hardware-backed keystore
      const biometrics = new ReactNativeBiometrics({
        allowDeviceCredentials: true,
      });

      // Keys stored in:
      // - Android Keystore (hardware-backed on modern devices)
      // - StrongBox (on supported devices with dedicated secure hardware)
      ```

      **iOS (Touch ID/Face ID + Keychain):**
      ```javascript
      // Configure Keychain security
      await Keychain.setGenericPassword('key', value, {
        accessControl: Keychain.ACCESS_CONTROL.BIOMETRY_CURRENT_SET,
        accessible: Keychain.ACCESSIBLE.WHEN_PASSCODE_SET_THIS_DEVICE_ONLY,
      });

      // Keys stored in:
      // - Keychain with Secure Enclave protection
      // - Invalidated when biometric enrollment changes
      ```

      SECURITY GUARANTEES:
      - Private key never leaves secure hardware
      - Signature proves biometric authentication occurred
      - Backend can verify signature authenticity
      - Cannot be bypassed by Frida/hooking alone
      - Encryption keys protected by biometric hardware

      BEST PRACTICES:
      1. ✅ Use createSignature() for cryptographic binding
      2. ✅ Store keys in hardware-backed keystore/keychain
      3. ✅ Verify signatures on backend
      4. ✅ Invalidate keys when biometrics change
      5. ✅ Implement password/PIN fallback
      6. ❌ Never use simplePrompt() for authentication
      7. ❌ Never rely on boolean result alone

      TESTING:
      ```javascript
      describe('Biometric Authentication', () => {
        it('should require valid signature for access', async () => {
          const auth = new SecureBiometricAuth();

          // Mock successful biometric but invalid signature
          jest.spyOn(auth.biometrics, 'createSignature').mockResolvedValue({
            success: true,
            signature: 'invalid_signature',
          });

          // Should fail on signature verification
          const result = await auth.authenticateAndDecrypt('encrypted_data');
          expect(result).toBeNull();
        });
      });
      ```

      References:
      - OWASP MASTG: MASTG-TEST-0025 (Biometric Authentication)
      - CWE-287: Improper Authentication
      - MASVS-AUTH-3: Additional authentication for sensitive operations
    severity: ERROR
    languages:
      - javascript
      - typescript
    metadata:
      category: security
      cwe: "CWE-287: Improper Authentication"
      owasp-mobile-2024: "M3: Insecure Authentication/Authorization"
      masvs-v2: "MASVS-AUTH-3"
      confidence: HIGH
      likelihood: MEDIUM
      impact: HIGH
      subcategory:
        - vuln

  - id: react-native-touchid-deprecated
    patterns:
      - pattern-either:
          - pattern: |
              import $X from 'react-native-touch-id'
          - pattern: |
              TouchID.authenticate($MSG)
          - pattern: |
              require('react-native-touch-id')
    message: |
      Using deprecated react-native-touch-id library (OWASP M3).

      RISK:
      react-native-touch-id is deprecated and lacks:
      - Android BiometricPrompt support
      - Face ID support
      - Security updates
      - Cryptographic binding

      SECURE ALTERNATIVE:
      ```javascript
      // Replace with react-native-biometrics
      npm install react-native-biometrics

      // Or expo-local-authentication
      npm install expo-local-authentication
      ```

      Reference: CWE-1104 (Use of Unmaintained Third Party Components)
    severity: WARNING
    languages:
      - javascript
      - typescript
    metadata:
      category: security
      cwe: "CWE-1104: Use of Unmaintained Third Party Components"
      owasp-mobile-2024: "M3: Insecure Authentication/Authorization"
      confidence: HIGH

  # ============================================================================
  # JWT TOKEN VALIDATION VULNERABILITIES
  # ============================================================================

  - id: react-native-jwt-no-signature-verification
    patterns:
      - pattern-either:
          - pattern: |
              jwt.decode($TOKEN)
          - pattern: |
              jwtDecode($TOKEN)
          - pattern: |
              JSON.parse(atob($TOKEN.split('.')[1]))
      - pattern-not-inside: |
          jwt.verify($TOKEN, $SECRET)
          ...
      - pattern-not-inside: |
          jwtVerify($TOKEN, ...)
          ...
    message: |
      JWT decoded without signature verification (OWASP M3).

      VULNERABILITY:
      Decoding JWTs without verifying signatures allows attackers to:
      - Forge tokens with any claims
      - Modify user IDs, roles, permissions
      - Use "none" algorithm attack
      - Bypass authentication completely

      VULNERABLE PATTERN:
      ```javascript
      import jwtDecode from 'jwt-decode';

      class InsecureJWT {
        getUserFromToken(token) {
          // VULNERABLE: Decode without verification
          const decoded = jwtDecode(token);

          // Trust unverified claims
          const userId = decoded.sub;
          const isAdmin = decoded.admin || false;

          if (isAdmin) {
            this.grantAdminAccess();
          }

          return decoded;
        }
      }
      ```

      ATTACK SCENARIO:
      ```javascript
      // Attacker creates forged JWT with admin privileges
      const header = {alg: 'none', typ: 'JWT'};
      const payload = {
        sub: 'attacker123',
        admin: true,
        exp: 9999999999,
        iat: Date.now() / 1000,
      };

      // Create forged token with "none" algorithm
      const encodedHeader = btoa(JSON.stringify(header));
      const encodedPayload = btoa(JSON.stringify(payload));
      const forgedToken = `${encodedHeader}.${encodedPayload}.`;

      // App decodes without verification
      const decoded = jwtDecode(forgedToken);
      console.log(decoded.admin); // true - Admin access granted!
      ```

      SECURE IMPLEMENTATION:
      ```javascript
      import * as jose from 'jose';
      import * as Keychain from 'react-native-keychain';

      class SecureJWTHandler {
        // Get public key for verification
        async getPublicKey() {
          // Fetch from secure backend or app config
          const credentials = await Keychain.getGenericPassword({
            service: 'jwt.public.key',
          });

          if (!credentials) {
            // Fetch from backend with certificate pinning
            const response = await fetch('https://api.example.com/.well-known/jwks.json');
            const jwks = await response.json();
            return jwks.keys[0];
          }

          return JSON.parse(credentials.password);
        }

        // SECURE: Verify and decode JWT
        async verifyAndDecodeToken(token) {
          try {
            // Get public key
            const jwk = await this.getPublicKey();
            const publicKey = await jose.importJWK(jwk, 'RS256');

            // SECURE: Verify signature before trusting claims
            const {payload} = await jose.jwtVerify(token, publicKey, {
              issuer: 'https://your-auth-server.com',
              audience: 'your-mobile-app',
              // Automatically checks expiration
              clockTolerance: 30, // 30 seconds tolerance
            });

            // Additional validations
            if (!this.validateClaims(payload)) {
              throw new Error('Invalid token claims');
            }

            return payload;
          } catch (error) {
            if (error.code === 'ERR_JWT_EXPIRED') {
              console.log('Token expired, refreshing...');
              // Trigger token refresh
              return null;
            }

            console.error('JWT verification failed:', error);
            return null;
          }
        }

        // Validate token claims
        validateClaims(payload) {
          // Check required claims
          if (!payload.sub || !payload.iat || !payload.exp) {
            return false;
          }

          // Validate issuer
          if (payload.iss !== 'https://your-auth-server.com') {
            return false;
          }

          // Validate audience
          if (payload.aud !== 'your-mobile-app') {
            return false;
          }

          // Validate not-before if present
          if (payload.nbf && Date.now() / 1000 < payload.nbf) {
            return false;
          }

          return true;
        }

        // For symmetric key verification (NOT recommended for mobile)
        async verifyHMACToken(token, secret) {
          // WARNING: HMAC secrets should NEVER be in mobile apps
          // This is for demonstration only
          throw new Error(
            'HMAC verification should be server-side only. ' +
            'Use RS256/ES256 for mobile apps.'
          );
        }

        // Decode token header without verification (safe for metadata)
        decodeHeader(token) {
          try {
            const header = jose.decodeProtectedHeader(token);
            return header;
          } catch (error) {
            console.error('Failed to decode JWT header:', error);
            return null;
          }
        }
      }

      // Usage
      const jwtHandler = new SecureJWTHandler();

      async function handleAuthToken(token) {
        // SECURE: Verify before using
        const payload = await jwtHandler.verifyAndDecodeToken(token);

        if (payload) {
          const userId = payload.sub;
          const roles = payload.roles || [];

          // Safe to use verified claims
          if (roles.includes('admin')) {
            console.log('Admin user authenticated');
          }
        } else {
          // Invalid token - logout
          await logout();
        }
      }
      ```

      JWT SECURITY BEST PRACTICES:

      **1. Algorithm Selection:**
      ```javascript
      // ✅ RECOMMENDED for mobile apps
      - RS256 (RSA + SHA-256)
      - ES256 (ECDSA + SHA-256)
      - PS256 (RSA-PSS + SHA-256)

      // ⚠️ AVOID in mobile apps
      - HS256 (HMAC) - requires shared secret in app

      // ❌ NEVER allow
      - none (no signature)
      ```

      **2. Key Management:**
      ```javascript
      // ✅ DO
      - Store public keys securely (Keychain)
      - Fetch public keys from backend JWKS endpoint
      - Use certificate pinning when fetching keys
      - Rotate keys periodically

      // ❌ DON'T
      - Hardcode keys in source code
      - Store private keys in mobile app
      - Use same key across all apps
      ```

      **3. Claim Validation:**
      ```javascript
      async verifyToken(token) {
        const payload = await jose.jwtVerify(token, publicKey, {
          // Required validations
          issuer: 'https://auth.example.com',     // iss claim
          audience: 'mobile-app',                  // aud claim
          clockTolerance: 30,                      // Time skew tolerance

          // Optional but recommended
          maxTokenAge: '1h',                       // Maximum token age
          subject: expectedUserId,                 // sub claim
          typ: 'JWT',                              // typ header
        });

        return payload;
      }
      ```

      **4. Token Storage:**
      ```javascript
      import EncryptedStorage from 'react-native-encrypted-storage';

      // Store JWT securely
      await EncryptedStorage.setItem('access_token', token);

      // Never in AsyncStorage
      // await AsyncStorage.setItem('access_token', token); // ❌ INSECURE
      ```

      **5. Token Refresh Flow:**
      ```javascript
      class TokenManager {
        async getValidToken() {
          let token = await EncryptedStorage.getItem('access_token');

          if (!token) return null;

          // Check expiration
          try {
            await jwtHandler.verifyAndDecodeToken(token);
            return token;
          } catch (error) {
            if (error.code === 'ERR_JWT_EXPIRED') {
              // Refresh token
              token = await this.refreshToken();
              return token;
            }
            return null;
          }
        }

        async refreshToken() {
          const refreshToken = await EncryptedStorage.getItem('refresh_token');

          const response = await fetch('https://api.example.com/auth/refresh', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({refresh_token: refreshToken}),
          });

          const {access_token, refresh_token} = await response.json();

          await EncryptedStorage.setItem('access_token', access_token);
          await EncryptedStorage.setItem('refresh_token', refresh_token);

          return access_token;
        }
      }
      ```

      TESTING:
      ```javascript
      describe('JWT Security', () => {
        it('should reject unsigned tokens', async () => {
          const handler = new SecureJWTHandler();
          const unsignedToken = 'eyJhbGciOiJub25lIn0.eyJzdWIiOiIxMjM0In0.';

          const payload = await handler.verifyAndDecodeToken(unsignedToken);
          expect(payload).toBeNull();
        });

        it('should reject expired tokens', async () => {
          const handler = new SecureJWTHandler();
          const expiredToken = createExpiredToken();

          const payload = await handler.verifyAndDecodeToken(expiredToken);
          expect(payload).toBeNull();
        });

        it('should reject tampered tokens', async () => {
          const handler = new SecureJWTHandler();
          const validToken = 'eyJ...'; // Valid token
          const tamperedToken = validToken.replace('user', 'admin');

          const payload = await handler.verifyAndDecodeToken(tamperedToken);
          expect(payload).toBeNull();
        });
      });
      ```

      MIGRATION FROM INSECURE CODE:
      ```javascript
      // BEFORE (Insecure)
      import jwtDecode from 'jwt-decode';
      const payload = jwtDecode(token);

      // AFTER (Secure)
      import {SecureJWTHandler} from './auth/jwt';
      const handler = new SecureJWTHandler();
      const payload = await handler.verifyAndDecodeToken(token);
      ```

      References:
      - OWASP JWT Cheat Sheet
      - CWE-347: Improper Verification of Cryptographic Signature
      - RFC 7519: JSON Web Token (JWT)
      - RFC 7515: JSON Web Signature (JWS)
    severity: ERROR
    languages:
      - javascript
      - typescript
    metadata:
      category: security
      cwe: "CWE-347: Improper Verification of Cryptographic Signature"
      owasp-mobile-2024: "M3: Insecure Authentication/Authorization"
      confidence: HIGH

  - id: react-native-jwt-hardcoded-secret
    patterns:
      - pattern-either:
          - pattern: |
              jwt.sign($PAYLOAD, '$SECRET')
          - pattern: |
              jwt.verify($TOKEN, '$SECRET')
          - pattern: |
              const secret = '$SECRET';
              ...
              jwt.sign($PAYLOAD, secret)
      - metavariable-regex:
          metavariable: $SECRET
          regex: ^[A-Za-z0-9+/=]{16,}$
    message: |
      JWT with hardcoded secret key (OWASP M3).

      CRITICAL RISK:
      Hardcoded JWT secrets can be extracted from:
      - APK/IPA decompilation
      - Binary analysis (strings command)
      - Memory dumps
      - Reverse engineering tools

      Once extracted, attackers can:
      - Forge tokens for any user
      - Gain admin access
      - Bypass all authentication

      SECURE SOLUTION:
      ```javascript
      // ❌ WRONG: Mobile apps should NEVER sign JWTs
      // JWT signing MUST happen on backend only

      // ✅ CORRECT: Mobile apps should only:
      // 1. Verify JWT signatures (with public key)
      // 2. Read verified claims
      // 3. Store tokens securely

      class ProperMobileJWTUsage {
        // ✅ Verify with public key (safe)
        async verifyToken(token) {
          const publicKey = await this.getPublicKey();
          return await jose.jwtVerify(token, publicKey);
        }

        // ❌ Never sign tokens (private key should never be in app)
        signToken(payload) {
          throw new Error(
            'Token signing must be done on backend server, not mobile app!'
          );
        }
      }
      ```

      Reference: CWE-798, OWASP M3
    severity: ERROR
    languages:
      - javascript
      - typescript
    metadata:
      category: security
      cwe: "CWE-798: Use of Hard-coded Credentials"
      owasp-mobile-2024: "M3: Insecure Authentication/Authorization"
      confidence: HIGH

  - id: react-native-jwt-asyncstorage
    patterns:
      - pattern-either:
          - pattern: |
              AsyncStorage.setItem('$KEY', $TOKEN)
          - pattern: |
              await AsyncStorage.setItem('$KEY', $TOKEN)
      - metavariable-regex:
          metavariable: $KEY
          regex: (?i).*(token|jwt|access[_-]?token|id[_-]?token|refresh[_-]?token).*
    message: |
      JWT token stored in AsyncStorage without encryption (OWASP M3 + M9).

      RISK:
      JWTs in AsyncStorage are vulnerable to:
      - ADB backup extraction
      - Root/jailbreak access
      - Malware
      - Physical device access

      SECURE IMPLEMENTATION:
      ```javascript
      import EncryptedStorage from 'react-native-encrypted-storage';

      // ✅ SECURE
      await EncryptedStorage.setItem('access_token', token);

      // ❌ INSECURE
      // await AsyncStorage.setItem('access_token', token);
      ```

      Reference: CWE-312, OWASP M9
    severity: ERROR
    languages:
      - javascript
      - typescript
    metadata:
      category: security
      cwe: "CWE-312: Cleartext Storage of Sensitive Information"
      owasp-mobile-2024: "M3: Insecure Authentication/Authorization"
      confidence: HIGH

  # ============================================================================
  # OAUTH & OIDC VULNERABILITIES
  # ============================================================================

  - id: react-native-oauth-no-pkce
    patterns:
      - pattern-either:
          - pattern: |
              authorize({..., clientId: $CLIENT, ...})
          - pattern: |
              $AUTH.authorize({...})
      - pattern-not: |
          authorize({..., codeChallenge: $CHALLENGE, ...})
      - pattern-not: |
          authorize({..., usePKCE: true, ...})
    message: |
      OAuth flow without PKCE (Proof Key for Code Exchange) (OWASP M3).

      VULNERABILITY:
      OAuth without PKCE is vulnerable to authorization code interception attacks.

      ATTACK SCENARIO:
      1. Malicious app registers same redirect URI scheme
      2. Legitimate app initiates OAuth flow
      3. Malicious app intercepts authorization code
      4. Attacker exchanges code for access token
      5. Account takeover

      VULNERABLE PATTERN:
      ```javascript
      import {authorize} from 'react-native-app-auth';

      // VULNERABLE: OAuth without PKCE
      const config = {
        issuer: 'https://auth.example.com',
        clientId: 'mobile-app',
        redirectUrl: 'com.myapp://oauth/callback',
        scopes: ['openid', 'profile', 'email'],
      };

      const result = await authorize(config);
      // Code interception possible!
      ```

      SECURE IMPLEMENTATION with PKCE:
      ```javascript
      import {authorize, refresh, revoke} from 'react-native-app-auth';
      import EncryptedStorage from 'react-native-encrypted-storage';
      import {sha256} from 'react-native-sha256';

      class SecureOAuthManager {
        constructor() {
          this.config = {
            issuer: 'https://auth.example.com',
            clientId: 'your-mobile-app',
            redirectUrl: 'com.yourcompany.yourapp://oauth/callback',
            scopes: ['openid', 'profile', 'email'],

            // PKCE Configuration (automatically handled by library)
            usePKCE: true,

            // Additional security
            additionalParameters: {
              prompt: 'consent', // Force consent screen
            },

            // Service configuration
            serviceConfiguration: {
              authorizationEndpoint: 'https://auth.example.com/authorize',
              tokenEndpoint: 'https://auth.example.com/token',
              revocationEndpoint: 'https://auth.example.com/revoke',
            },
          };
        }

        // Perform OAuth login with PKCE
        async login() {
          try {
            // Library automatically generates PKCE parameters:
            // - code_verifier (random string)
            // - code_challenge (SHA256 of verifier)
            // - code_challenge_method = S256
            const result = await authorize(this.config);

            // Store tokens securely
            await this.storeTokens(result);

            return {
              accessToken: result.accessToken,
              idToken: result.idToken,
              refreshToken: result.refreshToken,
            };
          } catch (error) {
            console.error('OAuth login failed:', error);
            throw error;
          }
        }

        // Store tokens in encrypted storage
        async storeTokens(authResult) {
          await EncryptedStorage.setItem('access_token', authResult.accessToken);

          if (authResult.refreshToken) {
            await EncryptedStorage.setItem('refresh_token', authResult.refreshToken);
          }

          if (authResult.idToken) {
            await EncryptedStorage.setItem('id_token', authResult.idToken);
          }

          // Store expiration time
          const expirationDate = new Date(authResult.accessTokenExpirationDate);
          await EncryptedStorage.setItem(
            'token_expiration',
            expirationDate.toISOString()
          );
        }

        // Refresh access token
        async refreshToken() {
          try {
            const refreshToken = await EncryptedStorage.getItem('refresh_token');

            if (!refreshToken) {
              throw new Error('No refresh token available');
            }

            const result = await refresh(this.config, {
              refreshToken: refreshToken,
            });

            await this.storeTokens(result);

            return result.accessToken;
          } catch (error) {
            console.error('Token refresh failed:', error);
            // Force re-authentication
            await this.logout();
            throw error;
          }
        }

        // Get valid access token (refresh if needed)
        async getAccessToken() {
          const token = await EncryptedStorage.getItem('access_token');
          const expirationStr = await EncryptedStorage.getItem('token_expiration');

          if (!token || !expirationStr) {
            return null;
          }

          const expiration = new Date(expirationStr);
          const now = new Date();

          // Refresh if token expires in less than 5 minutes
          if (expiration.getTime() - now.getTime() < 5 * 60 * 1000) {
            return await this.refreshToken();
          }

          return token;
        }

        // Logout and revoke tokens
        async logout() {
          try {
            const accessToken = await EncryptedStorage.getItem('access_token');

            if (accessToken) {
              // Revoke token on server
              await revoke(this.config, {
                tokenToRevoke: accessToken,
                sendClientId: true,
              });
            }
          } catch (error) {
            console.error('Token revocation failed:', error);
          } finally {
            // Always clear local tokens
            await EncryptedStorage.removeItem('access_token');
            await EncryptedStorage.removeItem('refresh_token');
            await EncryptedStorage.removeItem('id_token');
            await EncryptedStorage.removeItem('token_expiration');
          }
        }
      }

      // Usage
      const oauth = new SecureOAuthManager();

      // Login
      const {accessToken, idToken} = await oauth.login();

      // Get valid token (auto-refresh if needed)
      const token = await oauth.getAccessToken();

      // Use token in API calls
      const response = await fetch('https://api.example.com/user/profile', {
        headers: {
          Authorization: `Bearer ${token}`,
        },
      });

      // Logout
      await oauth.logout();
      ```

      PKCE FLOW EXPLANATION:
      ```
      1. App generates random code_verifier
      2. App creates code_challenge = SHA256(code_verifier)
      3. App sends code_challenge to authorization server
      4. User authenticates, server returns code
      5. App sends code + code_verifier to token endpoint
      6. Server verifies: SHA256(code_verifier) == code_challenge
      7. If valid, server returns access token

      Attacker cannot:
      - Generate valid code_verifier without original random value
      - Exchange intercepted code without verifier
      ```

      REDIRECT URI SECURITY:
      ```javascript
      // ✅ RECOMMENDED: App-specific custom scheme
      redirectUrl: 'com.yourcompany.yourapp://oauth/callback'

      // ⚠️ LESS SECURE: Universal links (can be hijacked)
      redirectUrl: 'https://yourapp.com/oauth/callback'

      // ❌ INSECURE: Generic schemes
      redirectUrl: 'myapp://callback'
      ```

