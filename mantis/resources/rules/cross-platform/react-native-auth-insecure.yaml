      class PasswordValidator {
        static readonly MIN_LENGTH = 8;
        static readonly RECOMMENDED_LENGTH = 12;

        static validate(password) {
          const errors = [];
          const warnings = [];

          // Length check
          if (password.length < this.MIN_LENGTH) {
            errors.push(`Password must be at least ${this.MIN_LENGTH} characters`);
          } else if (password.length < this.RECOMMENDED_LENGTH) {
            warnings.push(`For better security, use at least ${this.RECOMMENDED_LENGTH} characters`);
          }

          // Complexity checks
          const hasUppercase = /[A-Z]/.test(password);
          const hasLowercase = /[a-z]/.test(password);
          const hasDigits = /[0-9]/.test(password);
          const hasSpecialChars = /[!@#$%^&*(),.?":{}|<>]/.test(password);

          const complexityCount = [
            hasUppercase,
            hasLowercase,
            hasDigits,
            hasSpecialChars,
          ].filter(Boolean).length;

          if (complexityCount < 3) {
            warnings.push(
              'Use a mix of uppercase, lowercase, numbers, and special characters'
            );
          }

          // Common password check
          if (this.isCommonPassword(password)) {
            errors.push('This password is too common. Choose a unique password.');
          }

          return {
            valid: errors.length === 0,
            errors,
            warnings,
          };
        }

        static isCommonPassword(password) {
          const common = [
            'password', '12345678', 'qwerty', 'abc123',
            'password123', '111111', '123123', 'admin',
            'letmein', 'welcome',
          ];
          return common.includes(password.toLowerCase());
        }
