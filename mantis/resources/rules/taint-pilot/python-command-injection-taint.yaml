rules:
  - id: taint-python-command-injection-subprocess
    mode: taint
    pattern-sources:
      - patterns:
          - pattern-either:
              - pattern: $REQ.args[...]
              - pattern: $REQ.args.get(...)
              - pattern: $REQ.form[...]
              - pattern: $REQ.form.get(...)
              - pattern: $REQ.json[...]
              - pattern: $REQ.GET[...]
              - pattern: $REQ.POST[...]
              - pattern: $REQ.cookies[...]
              - pattern: $REQ.headers[...]
              - pattern: request.args.get(...)
              - pattern: request.form[...]
              - pattern: request.json
              - pattern: input(...)
              - pattern: sys.argv[$X]
              - pattern: os.environ[$X]
              - pattern: os.environ.get(...)
    pattern-sinks:
      - patterns:
          - pattern-either:
              - patterns:
                  - pattern-either:
                      - pattern: subprocess.run($CMD, ..., shell=True, ...)
                      - pattern: subprocess.call($CMD, ..., shell=True, ...)
                      - pattern: subprocess.check_output($CMD, ..., shell=True, ...)
                      - pattern: subprocess.check_call($CMD, ..., shell=True, ...)
                      - pattern: subprocess.Popen($CMD, ..., shell=True, ...)
              - pattern: os.system($CMD)
              - pattern: os.popen($CMD)
              - pattern: commands.getoutput($CMD)
              - pattern: commands.getstatusoutput($CMD)
    pattern-sanitizers:
      - patterns:
          - pattern-either:
              - pattern: shlex.quote($X)
              - pattern: shlex.split($X)
    message: |
      Tainted user input flows into a shell command. Use a list-form subprocess call
      with shell=False (the default) so each argument is passed as a separate token,
      or shlex.quote() the value before splicing into a shell string. Never pass
      user input as part of a shell=True command.
    severity: ERROR
    languages: [python]
    metadata:
      category: security
      cwe: "CWE-78: OS Command Injection"
      owasp: "A03:2025 Injection"
      confidence: HIGH
      pack: [taint, web, fast, deep, bugbounty]
      references:
        - https://cwe.mitre.org/data/definitions/78.html
