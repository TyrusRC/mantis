name: bugbounty
description: |
  Bug-bounty oriented selection — ERROR-severity rules at HIGH or MEDIUM
  confidence. Pair with `/audit bugbounty`, which gates findings on entrypoint
  reachability. For CVE-linked rules specifically, run `/audit cve` alongside.
filters:
  severity: [ERROR]
  confidence: [HIGH, MEDIUM]
exclude:
  rule_id_globs: []
