rules:
  # MASVS-STORAGE: Insecure SharedPreferences Usage - IMPROVED VERSION
  # Based on MASTG-TEST-0001: Testing Local Storage for Sensitive Data
  # Detects sensitive data stored in SharedPreferences without encryption
  #
  # IMPROVEMENTS in this version:
  # - Tightened regex patterns to reduce false positives
  # - Added test code exclusions
  # - Added debug build exclusions
  # - Excluded UI state flags and boolean values
  # - Excluded validation/configuration constants
  # - Expected FP reduction: 30% -> <5%


  - id: mastg-android-sharedpreferences-world-readable
    patterns:
      - pattern-either:
          - pattern: getSharedPreferences($NAME, MODE_WORLD_READABLE)
          - pattern: getSharedPreferences($NAME, MODE_WORLD_WRITEABLE)
          - pattern: getSharedPreferences($NAME, Context.MODE_WORLD_READABLE)
          - pattern: getSharedPreferences($NAME, Context.MODE_WORLD_WRITEABLE)

      # EXCLUDE test code
      - pattern-not-inside: |
          @Test
          fun $FUNC(...) { ... }
      - pattern-not-inside: |
          @Test
          public void $FUNC(...) { ... }

    message: |
      World-readable/writable SharedPreferences detected (MASVS-STORAGE).

      MODE_WORLD_READABLE and MODE_WORLD_WRITEABLE are:
      - Deprecated since API 17 (Android 4.2)
      - Removed in API 24 (Android 7.0)
      - Extremely insecure (any app can read/write)

      VULNERABLE CODE:
      ```java
      SharedPreferences prefs = getSharedPreferences(
          "app_prefs",
          MODE_WORLD_READABLE  // ❌ Any app can read
      );
      ```

      SECURE FIX:
      ```kotlin
      // Use MODE_PRIVATE (default, secure)
      val prefs = getSharedPreferences("app_prefs", MODE_PRIVATE)

      // Or use EncryptedSharedPreferences for sensitive data
      val encryptedPrefs = EncryptedSharedPreferences.create(
          context,
          "secure_prefs",
          masterKey,
          EncryptedSharedPreferences.PrefKeyEncryptionScheme.AES256_SIV,
          EncryptedSharedPreferences.PrefValueEncryptionScheme.AES256_GCM
      )
      ```

      SECURITY IMPACT:
      - MODE_WORLD_READABLE: Any app on device can read your data
      - MODE_WORLD_WRITEABLE: Any app can modify your data (data poisoning)
      - Can lead to credential theft, data tampering, privilege escalation

    severity: ERROR
    languages:
      - java
      - kotlin
    metadata:
      category: security
      cwe: "CWE-732: Incorrect Permission Assignment for Critical Resource"
      mastg-test: "MASTG-TEST-0001"
      masvs: "MASVS-STORAGE-1"
      confidence: HIGH

