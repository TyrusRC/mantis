      owasp-mobile-2024: "M5: Insecure Communication"
      masvs: "MASVS-NETWORK-2"
      confidence: MEDIUM

  # ============ COMPLIANCE & REGULATORY ============

  - id: m8-android-gdpr-privacy-manifest-incomplete
    patterns:
      - pattern: |
          <uses-permission android:name="$PERM" />
      - metavariable-regex:
          metavariable: $PERM
          regex: ^android\.permission\.(ACCESS_FINE_LOCATION|ACCESS_COARSE_LOCATION|READ_CONTACTS|READ_PHONE_STATE|CAMERA|RECORD_AUDIO)$
    message: |
      Privacy-sensitive permission without clear justification (GDPR/CCPA Compliance).
      GDPR/CCPA require clear disclosure of why personal data is collected.

      REGULATORY REQUIREMENTS:
      - GDPR Article 13: Purpose specification
      - GDPR Article 25: Data protection by design
      - CCPA 1798.100: Right to know
      - Google Play Data Safety: Permission disclosure

      COMPLIANCE CHECKLIST:
      - [ ] Privacy policy includes permission justification
      - [ ] Runtime permission rationale shown to users
      - [ ] Data minimization (only request needed permissions)
      - [ ] User consent before data collection
      - [ ] Data retention policy documented
      - [ ] Ability to delete collected data

      SECURE IMPLEMENTATION:
      ```kotlin
      class GDPRCompliantPermissions(private val activity: Activity) {

          fun requestLocationWithRationale() {
              when {
                  hasPermission(ACCESS_FINE_LOCATION) -> {
                      // Permission already granted
                      useLocation()
                  }

                  shouldShowRationale(ACCESS_FINE_LOCATION) -> {
                      // Show detailed explanation (GDPR requirement)
                      showPermissionRationale(
                          title = "Location Permission Required",
                          message = """
                              We need access to your location to:

                              1. Show nearby stores (GDPR Purpose: Service delivery)
                              2. Provide accurate delivery estimates

                              Your location is:
                              - Used only when app is open
                              - Never shared with third parties
                              - Deleted after 30 days
                              - Can be disabled anytime in Settings

                              You can refuse this permission and still use basic features.
                          """.trimIndent(),
                          onAccept = {
                              requestPermission(ACCESS_FINE_LOCATION)
                          },
                          onDecline = {
                              // Allow app usage without location
                              enableLimitedMode()
                          }
                      )
                  }

                  else -> {
                      // First time request
                      requestPermission(ACCESS_FINE_LOCATION)
                  }
              }
          }

          fun showPermissionRationale(
              title: String,
              message: String,
              onAccept: () -> Unit,
              onDecline: () -> Unit
          ) {
              MaterialAlertDialogBuilder(activity)
                  .setTitle(title)
                  .setMessage(message)
                  .setPositiveButton("Allow") { _, _ -> onAccept() }
                  .setNegativeButton("Deny") { _, _ -> onDecline() }
                  .setNeutralButton("Learn More") { _, _ ->
                      // Open privacy policy
                      openPrivacyPolicy()
                  }
                  .setCancelable(false)
                  .show()
          }
      }
      ```

      PRIVACY POLICY REQUIREMENTS:
      ```markdown
      ## Data Collection & Usage

      ### Location Data
      - Purpose: Show nearby stores and delivery estimates
      - Collection: Only when app is in use
      - Storage: Encrypted on device for 30 days
      - Sharing: Never shared with third parties
      - Retention: Automatically deleted after 30 days
      - Your Rights: Delete anytime in Settings > Privacy

      ### Camera Permission
      - Purpose: Scan QR codes and upload profile photos
      - Collection: Only when explicitly triggered by user
      - Storage: Photos stored locally, QR data not retained
      - Sharing: Not shared unless you choose to share photos
      ```

      DATA SAFETY SECTION (Google Play):
      ```yaml
      # data_safety.yml
      location:
        purpose: Provide location-based services
        optional: true
        ephemeral: false
        shared: false

      contacts:
        purpose: Enable social features
        optional: true
        ephemeral: false
        shared: false
      ```

      CONSENT MANAGEMENT:
      ```kotlin
      class ConsentManager(private val context: Context) {
          private val prefs = context.getSharedPreferences("consent", MODE_PRIVATE)

          fun requestConsent(
              dataType: String,
              purpose: String,
              onConsent: (Boolean) -> Unit
          ) {
              if (hasConsent(dataType)) {
                  onConsent(true)
                  return
              }

              showConsentDialog(
                  "We'd like to collect $dataType for: $purpose\n\n" +
                  "You can withdraw consent anytime.",
                  onAccept = {
                      saveConsent(dataType, true)
                      logConsent(dataType, "granted")
                      onConsent(true)
                  },
                  onDecline = {
                      saveConsent(dataType, false)
                      logConsent(dataType, "denied")
                      onConsent(false)
                  }
              )
          }

          fun withdrawConsent(dataType: String) {
              saveConsent(dataType, false)
              deleteCollectedData(dataType)
              logConsent(dataType, "withdrawn")
          }
      }
      ```

      Reference: GDPR, CCPA, OWASP M6, M8, MASVS-PRIVACY-1
