  - id: m8-android-certificate-pinning-expiration-missing
    patterns:
      - pattern: |
          <pin-set>
            ...
            <pin digest="$DIGEST">$HASH</pin>
            ...
          </pin-set>
      - pattern-not-inside: |
          <pin-set expiration="$DATE">
            ...
          </pin-set>
    message: |
      Certificate pinning without expiration date (OWASP M5/M8).
      Pin-sets should include expiration to force pin rotation.

      WHY EXPIRATION IS IMPORTANT:
      - Forces regular pin updates
      - Prevents stale pins after certificate rotation
      - Allows planned migration
      - Reduces risk of app breaking on cert renewal
      - Best practice for pin management

      VULNERABLE PATTERN:
      ```xml
      <domain-config>
          <domain includeSubdomains="true">api.example.com</domain>
          <pin-set>
              <!-- No expiration = pins never expire -->
              <pin digest="SHA-256">base64hash==</pin>
              <pin digest="SHA-256">backup-hash==</pin>
          </pin-set>
      </domain-config>
      ```

      SECURE PATTERN:
      ```xml
      <domain-config>
          <domain includeSubdomains="true">api.example.com</domain>
          <!-- Set expiration 1 year from now -->
          <pin-set expiration="2026-01-01">
              <!-- Pin to intermediate CA (longer lifetime) -->
              <pin digest="SHA-256">intermediateCaHash==</pin>
              <!-- Backup pin to different CA -->
              <pin digest="SHA-256">backupCaHash==</pin>
          </pin-set>
      </domain-config>
      ```

      CERTIFICATE PINNING BEST PRACTICES:

      1. Pin to Intermediate CA (not leaf cert):
      ```bash
      # Get intermediate CA pin
      openssl s_client -connect api.example.com:443 -showcerts < /dev/null 2>/dev/null | \
        openssl x509 -outform DER | \
        openssl dgst -sha256 -binary | \
        openssl base64
      ```

      2. Include Backup Pins:
      ```xml
      <pin-set expiration="2026-12-31">
          <!-- Current intermediate CA -->
          <pin digest="SHA-256">primary-ca-hash==</pin>
          <!-- Backup CA (different provider) -->
          <pin digest="SHA-256">backup-ca-hash==</pin>
          <!-- Future CA (rotation plan) -->
          <pin digest="SHA-256">future-ca-hash==</pin>
      </pin-set>
      ```

      3. Monitor Expiration:
      ```kotlin
      // Monitor pin expiration
      class CertPinningMonitor {
          fun checkPinExpiration() {
              val expirationDate = SimpleDateFormat("yyyy-MM-dd")
                  .parse("2026-01-01")

              val daysUntilExpiration = ChronoUnit.DAYS.between(
                  LocalDate.now(),
                  expirationDate.toInstant().atZone(ZoneId.systemDefault()).toLocalDate()
              )

              if (daysUntilExpiration < 30) {
                  // Alert: Update pins in next release
                  logWarning("Certificate pins expiring in $daysUntilExpiration days")
              }
          }
      }
      ```

      4. Emergency Pin Bypass (for recovery):
      ```kotlin
      // Build.gradle
      android {
          buildTypes {
              release {
                  buildConfigField "boolean", "ENABLE_PINNING", "true"
              }
              debug {
                  buildConfigField "boolean", "ENABLE_PINNING", "false"
              }
          }
      }

      // OkHttp certificate pinning
      val certificatePinner = if (BuildConfig.ENABLE_PINNING) {
          CertificatePinner.Builder()
              .add("api.example.com", "sha256/hash==")
              .build()
      } else {
          null
      }
      ```

      PIN ROTATION STRATEGY:
      - Year 0: Deploy app with pins expiring Year 1
      - Month 9: Issue update with new pins expiring Year 2
      - Year 1: Old pins expire, users must update
      - Repeat cycle

      Reference: OWASP M5, M8, MASVS-NETWORK-2, RFC 7469
