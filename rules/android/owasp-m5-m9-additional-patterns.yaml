rules:
  # Additional Android Security Patterns
  # Patterns discovered from real-world vulnerable applications
  # Covers OWASP M5 (Insecure Communication) and M9 (Insecure Data Storage)

  # ============ INSECURE SMS OPERATIONS ============


  - id: owasp-m5-sms-no-validation
    patterns:
      - pattern-either:
          - pattern: |
              SmsManager.getDefault().sendTextMessage($PHONE, ..., $MESSAGE, ...)
          - pattern: |
              $SMS.sendTextMessage($PHONE, ..., $MESSAGE, ...)
      - pattern-not: SmsManager.getDefault().sendTextMessage("...", ...)
      - pattern-not-inside: |
          if ($PHONE.matches(...)) {
            ...
          }
      - pattern-not-inside: |
          if (android.util.Patterns.PHONE.matcher($PHONE).matches()) {
            ...
          }
    message: |
      SMS sent without phone number validation (OWASP M5: Insecure Communication).
      Sending SMS to unvalidated numbers can lead to toll fraud or privacy violations.

      Validate phone numbers using:
      - Regular expressions for format checking
      - Android's Patterns.PHONE matcher
      - Length restrictions (E.164 format: +<country code><number>)

      Also ensure the SMS-sending component is NOT exported in AndroidManifest.xml.
    severity: WARNING
    languages:
      - java
      - kotlin
    metadata:
      category: security
      cwe: "CWE-20: Improper Input Validation"
      owasp-mobile-2024: "M5: Insecure Communication"
      confidence: MEDIUM

  # ============ RUNTIME APK DOWNLOAD ============

  - id: owasp-m9-runtime-apk-download
    patterns:
      - pattern-either:
          - pattern: |
              $DOWNLOAD_MANAGER.enqueue($REQUEST)
          - pattern: |
              $WORKER.filesendtodownload(..., Uri.parse($URL))
      - metavariable-regex:
          metavariable: $URL
          regex: .*\.apk.*
    message: |
      Runtime APK download detected (OWASP M9: Insecure Data Storage / M2: Supply Chain).
      Downloading and potentially installing APKs at runtime poses significant security risks.

      Example vulnerable code:
      ```java
      checkworker.filesendtodownload(this,
          Uri.parse("https://github.com/user/repo/releases/download/app-debug.apk"));
      ```

      Risks:
      - Bypasses Google Play security scanning
      - No signature verification
      - Man-in-the-middle attacks
      - Installation of malware/backdoors
      - Violates Google Play policies

      If dynamic updates are required:
      1. Use Google Play App Bundles and In-App Updates API
      2. Use Google Play Feature Delivery for on-demand modules
      3. Implement certificate pinning for download URLs
      4. Verify APK signatures before installation
      5. Use HTTPS only (never HTTP)

      Never download APKs from third-party sources at runtime.
    severity: ERROR
    languages:
      - java
      - kotlin
    metadata:
      category: security
      cwe: "CWE-494: Download of Code Without Integrity Check"
      owasp-mobile-2024: "M2: Inadequate Supply Chain Security, M9: Insecure Data Storage"
      confidence: HIGH
      found_in_sample: "sample/android-app/NavigationDrawer_Dashboard.java"

  - id: owasp-m9-apk-download-url
    patterns:
      - pattern-either:
          - pattern: Uri.parse("$URL")
          - pattern: URL("$URL")
      - metavariable-regex:
          metavariable: $URL
          regex: ^https?://.*\.apk$
    message: |
      Hardcoded APK download URL (OWASP M2/M9: Supply Chain / Insecure Data Storage).
      Downloading APK files from external URLs creates security and policy violations.

      This practice:
      - Violates Google Play Store policies
      - Bypasses app review processes
      - Enables malware distribution
      - Creates update mechanism vulnerabilities

      Use official update mechanisms:
      - Google Play In-App Updates API
      - Google Play Feature Delivery
      - Firebase App Distribution (for testing only)
    severity: ERROR
    languages:
      - java
      - kotlin
    metadata:
      category: security
      cwe: "CWE-494: Download of Code Without Integrity Check"
      owasp-mobile-2024: "M2: Inadequate Supply Chain Security"
      confidence: HIGH
      found_in_sample: "sample/android-app/NavigationDrawer_Dashboard.java"

  # ============ DYNAMIC CODE LOADING ============

  - id: owasp-m2-dexclassloader-untrusted
    patterns:
      - pattern-either:
          - pattern: new DexClassLoader($PATH, ...)
          - pattern: new PathClassLoader($PATH, ...)
          - pattern: DexFile.loadDex($PATH, ...)
      - pattern-not: new DexClassLoader(getApplicationInfo().sourceDir, ...)
    message: |
      Dynamic code loading from untrusted source (OWASP M2: Supply Chain Security).
      Loading DEX files at runtime can execute arbitrary code and bypass security controls.

      Risks:
      - Code injection attacks
      - Malware execution
      - Bypasses static analysis
      - Evades code signing verification

      Secure practices:
      1. Avoid dynamic code loading if possible
      2. If required, only load from app's private storage
      3. Verify cryptographic signatures before loading
      4. Use Google Play Feature Delivery instead
      5. Never load from external storage or network

      Example secure pattern:
      ```java
      File dexFile = new File(context.getFilesDir(), "trusted.dex");
      // Verify signature
      if (verifySignature(dexFile)) {
          DexClassLoader loader = new DexClassLoader(
              dexFile.getAbsolutePath(),
              context.getCacheDir().getAbsolutePath(),
              null,
              getClass().getClassLoader()
          );
      }
      ```
    severity: ERROR
    languages:
      - java
      - kotlin
    metadata:
      category: security
      cwe: "CWE-494: Download of Code Without Integrity Check"
      owasp-mobile-2024: "M2: Inadequate Supply Chain Security"
      confidence: HIGH

  # ============ INSECURE FILE PROVIDER PATHS ============


  - id: owasp-m8-exported-receiver-no-permission
    patterns:
      - pattern: |
          <receiver android:exported="true" android:name="$NAME">
            ...
          </receiver>
      - pattern-not: |
          <receiver android:exported="true" android:permission="$PERM" android:name="$NAME">
            ...
          </receiver>
    message: |
      Exported BroadcastReceiver without permission (OWASP M8: Security Misconfiguration).
      Exported receivers without permissions can be triggered by any app on the device.

      Risks:
      - Unauthorized intent injection
      - Denial of service attacks
      - Data leakage via receiver responses
      - Triggering privileged operations

      Secure Fix:
      ```xml
      <receiver
          android:name=".MyReceiver"
          android:exported="true"
          android:permission="com.myapp.permission.SEND_BROADCAST">
          <intent-filter>
              <action android:name="com.myapp.ACTION" />
          </intent-filter>
      </receiver>

      <!-- Define custom permission -->
      <permission
          android:name="com.myapp.permission.SEND_BROADCAST"
          android:protectionLevel="signature" />
      ```

      Or if the receiver is only for internal use:
      ```xml
      <receiver
          android:name=".MyReceiver"
          android:exported="false">
      </receiver>
      ```
    severity: ERROR
    languages:
      - xml
    metadata:
      category: security
      cwe: "CWE-927: Use of Implicit Intent for Sensitive Communication"
      owasp-mobile-2024: "M8: Security Misconfiguration"
      confidence: HIGH
