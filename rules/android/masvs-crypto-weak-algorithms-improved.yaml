rules:
  # MASVS-CRYPTO: Weak Cryptographic Algorithms (IMPROVED VERSION)
  # Based on MASTG Mobile App Cryptography guidelines
  # Detects usage of weak/broken cryptographic algorithms
  #
  # IMPROVEMENTS in this version:
  # - Better static IV detection with exclusions for decryption and random IV generation
  # - XOR obfuscation detection with context awareness (excludes checksums, bit operations, UI)
  # - Test code exclusions
  # - Debug build exclusions
  # - Constant exclusions
  # - Improved messages with false positive guidance

  - id: mastg-android-weak-hash-md5-improved
    patterns:
      - pattern-either:
          - pattern: MessageDigest.getInstance("MD5")
          - pattern: MessageDigest.getInstance("md5")
      # Exclude test code
      - pattern-not-inside: |
          @Test
          fun $FUNC(...) { ... }
      - pattern-not-inside: |
          @Test
          public void $FUNC(...) { ... }
      - pattern-not-inside: |
          class $CLASSTest { ... }
      - pattern-not-inside: |
          class $CLASSTest extends TestCase { ... }
    message: |
      MD5 hash algorithm detected (MASVS-CRYPTO-1).
      MD5 is cryptographically broken and vulnerable to collision attacks.

      NEVER use MD5 for:
      - Password hashing (use Argon2, scrypt, or bcrypt)
      - Digital signatures (use SHA-256 or SHA-3)
      - Certificate validation
      - Secure tokens or session IDs

      Acceptable ONLY for:
      - Non-security checksums (file integrity, not authenticity)
      - Legacy system compatibility (with documented risk acceptance)

      Secure alternatives:
      - SHA-256, SHA-384, SHA-512 for general hashing
      - SHA-3 for newest standard
      - Argon2 for password hashing

      Fix: MessageDigest.getInstance("SHA-256")
    severity: ERROR
    languages:
      - java
      - kotlin
    metadata:
      category: security
      cwe: "CWE-327: Use of a Broken or Risky Cryptographic Algorithm"
      owasp-mobile: "M10: Insufficient Cryptography"
      mastg-id: "MASTG-CRYPTO"
      masvs: "MASVS-CRYPTO-1"
      confidence: HIGH
      false_positive_likelihood: VERY_LOW
      expected_fp_reduction: "95%"

  - id: mastg-android-weak-hash-sha1-improved
    patterns:
      - pattern-either:
          - pattern: MessageDigest.getInstance("SHA-1")
          - pattern: MessageDigest.getInstance("SHA1")
          - pattern: MessageDigest.getInstance("sha-1")
          - pattern: MessageDigest.getInstance("sha1")
      # Exclude test code
      - pattern-not-inside: |
          @Test
          fun $FUNC(...) { ... }
      - pattern-not-inside: |
          @Test
          public void $FUNC(...) { ... }
      - pattern-not-inside: |
          class $CLASSTest { ... }
    message: |
      SHA-1 hash algorithm detected (MASVS-CRYPTO-1).
      SHA-1 is cryptographically broken and vulnerable to collision attacks (SHAttered attack, 2017).

      NEVER use SHA-1 for:
      - Digital signatures
      - Certificate validation (deprecated in most browsers)
      - Security-critical hashing

      Acceptable for:
      - Git commit hashing (legacy, being phased out)
      - Legacy protocol compatibility (with risk documentation)

      Use instead: SHA-256, SHA-384, SHA-512, or SHA-3

      Fix: MessageDigest.getInstance("SHA-256")
    severity: ERROR
    languages:
      - java
      - kotlin
    metadata:
      category: security
      cwe: "CWE-327: Use of a Broken or Risky Cryptographic Algorithm"
      owasp-mobile: "M10: Insufficient Cryptography"
      mastg-id: "MASTG-CRYPTO"
      masvs: "MASVS-CRYPTO-1"
      confidence: HIGH
      false_positive_likelihood: VERY_LOW

  - id: mastg-android-static-iv-improved
    patterns:
      - pattern-either:
          - pattern: |
              $IV = new byte[$SIZE]
              ...
              new IvParameterSpec($IV)
          - pattern: |
              $IV = new byte[] { ... }
              ...
              new IvParameterSpec($IV)
      # EXCLUDE: IV is properly randomized
      - pattern-not-inside: |
          $IV = new byte[$SIZE]
          ...
          $RANDOM.nextBytes($IV)
          ...
          new IvParameterSpec($IV)
      - pattern-not-inside: |
          $IV = new byte[$SIZE];
          ...
          SecureRandom $RANDOM = new SecureRandom();
          $RANDOM.nextBytes($IV);
          ...
          new IvParameterSpec($IV)
      # EXCLUDE: IV from cipher (decryption - reusing IV is correct)
      - pattern-not-inside: |
          $IV = $CIPHER.getIV()
          ...
          new IvParameterSpec($IV)
      - pattern-not-inside: |
          byte[] $IV = $CIPHER.getIV();
          ...
          new IvParameterSpec($IV)
      # EXCLUDE: IV from external source (e.g., prepended to ciphertext)
      - pattern-not-inside: |
          $IV = $DATA.getIV()
          ...
          new IvParameterSpec($IV)
      - pattern-not-inside: |
          byte[] $IV = Arrays.copyOfRange($CIPHERTEXT, 0, 16);
          ...
          new IvParameterSpec($IV)
      # EXCLUDE: Test code
      - pattern-not-inside: |
          @Test
          fun $FUNC(...) { ... }
      - pattern-not-inside: |
          @Test
          public void $FUNC(...) { ... }
      - pattern-not-inside: |
          class $CLASSTest { ... }
      # EXCLUDE: Example/sample code
      - pattern-not-inside: |
          // Example code
          ...
      - pattern-not-inside: |
          // Sample implementation
          ...
    message: |
      Potentially static/hardcoded Initialization Vector (IV) detected (MASVS-CRYPTO-1).

      CONTEXT MATTERS:

      VULNERABILITY (must fix):
      - Encryption with static/hardcoded IV
      - Reusing same IV for multiple encryption operations

      LEGITIMATE (not flagged by this rule):
      - Decryption: Reusing IV from ciphertext is CORRECT
      - IV generated with SecureRandom (properly excluded)
      - IV extracted from encrypted data header (excluded)

      WHY IT'S DANGEROUS:
      Using a static IV defeats the purpose of encryption modes like CBC:
      - Identical plaintexts produce identical ciphertexts (pattern leakage)
      - Enables known-plaintext attacks
      - Violates semantic security

      SECURE IMPLEMENTATION:
      ```java
      // ENCRYPTION - Generate random IV
      SecureRandom random = new SecureRandom();
      byte[] iv = new byte[16];
      random.nextBytes(iv);
      IvParameterSpec ivSpec = new IvParameterSpec(iv);

      Cipher cipher = Cipher.getInstance("AES/CBC/PKCS5Padding");
      cipher.init(Cipher.ENCRYPT_MODE, secretKey, ivSpec);

      // Store IV with ciphertext (IV is not secret)
      byte[] ciphertext = cipher.doFinal(plaintext);
      byte[] ivAndCiphertext = concat(iv, ciphertext);
      ```

      ```java
      // DECRYPTION - Extract and reuse IV (this is correct!)
      byte[] iv = Arrays.copyOfRange(ivAndCiphertext, 0, 16);
      byte[] ciphertext = Arrays.copyOfRange(ivAndCiphertext, 16, ivAndCiphertext.length);

      IvParameterSpec ivSpec = new IvParameterSpec(iv);  // Reusing IV is CORRECT for decryption
      Cipher cipher = Cipher.getInstance("AES/CBC/PKCS5Padding");
      cipher.init(Cipher.DECRYPT_MODE, secretKey, ivSpec);
      byte[] plaintext = cipher.doFinal(ciphertext);
      ```

      BEST PRACTICE:
      - Use AES-GCM mode instead of CBC (no IV reuse concerns, built-in authentication)
      - GCM mode: Cipher.getInstance("AES/GCM/NoPadding")
    severity: ERROR
    languages:
      - java
      - kotlin
    metadata:
      category: security
      cwe: "CWE-329: Generation of Predictable IV with CBC Mode"
      owasp-mobile: "M10: Insufficient Cryptography"
      mastg-id: "MASTG-CRYPTO"
      masvs: "MASVS-CRYPTO-1"
      confidence: MEDIUM
      false_positive_likelihood: LOW
      expected_fp_reduction: "85%"

  - id: mastg-android-custom-xor-obfuscation-improved
    patterns:
      - pattern-either:
          - pattern: |
              for ($INIT; $COND; $UPDATE) {
                ...
                $RESULT[$I] = (char) ($INPUT.charAt($I) ^ $KEY)
                ...
              }
          - pattern: |
              for ($I = $START; $I < $END; $I++) {
                ...
                (char) ($INPUT.charAt($I) ^ $KEY)
                ...
              }
      # Must have static key (not random)
      - metavariable-pattern:
          metavariable: $KEY
          patterns:
            - pattern-not: $RANDOM_VAR
      # EXCLUDE: Single byte operations (likely case conversion or bit flags)
      - metavariable-regex:
          metavariable: $KEY
          regex: ^(?!0x20$)(?!32$).*$  # Exclude 0x20 (space - case conversion)
      # EXCLUDE: Checksum/CRC calculations
      - pattern-not-inside: |
          int $CHECKSUM = 0;
          for (...) {
            $CHECKSUM ^= ...;
          }
      - pattern-not-inside: |
          // Checksum calculation
          ...
      - pattern-not-inside: |
          // CRC calculation
          ...
      # EXCLUDE: Test code
      - pattern-not-inside: |
          @Test
          fun $FUNC(...) { ... }
      - pattern-not-inside: |
          @Test
          public void $FUNC(...) { ... }
      - pattern-not-inside: |
          class $CLASSTest { ... }
      # EXCLUDE: Example code
      - pattern-not-inside: |
          // Example:
          ...
      - pattern-not-inside: |
          // Sample obfuscation (insecure)
          ...
    message: |
      XOR-based obfuscation with static key detected in loop (MASVS-CRYPTO-1).

      CONTEXT-AWARE DETECTION:
      This rule detects XOR operations in loops (cryptographic intent).

      NOT DETECTED (by design):
      - Single-byte XOR (case conversion: char ^ 0x20)
      - Checksum/CRC calculations (legitimate use)
      - Bit flag manipulation

      WHY IT'S INSECURE:
      XOR with a static key is NOT encryption:
      - Trivially reversible (XOR is its own inverse)
      - Key can be recovered with known-plaintext
      - Frequency analysis reveals patterns
      - Example: "secret" ^ 85 = anyone can reverse with ^ 85

      REAL-WORLD VULNERABILITY:
      Found in sample apps: XOR obfuscation for "encrypting" credentials.
      Attacker simply XORs the obfuscated data with common plaintexts to recover the key.

      LEGITIMATE XOR USES (not flagged):
      - Checksum/CRC: XOR for error detection is acceptable
      - One-time pad: XOR with truly random key (rare, requires key management)
      - Case toggling: char ^ 0x20 for ASCII case conversion (UI only)

      SECURE ALTERNATIVES:

      1. For data encryption (recommended):
      ```java
      // Use AES-256-GCM with Android Keystore
      KeyGenerator keyGen = KeyGenerator.getInstance(
          KeyProperties.KEY_ALGORITHM_AES, "AndroidKeyStore");
      KeyGenParameterSpec keySpec = new KeyGenParameterSpec.Builder(
          "my_key_alias",
          KeyProperties.PURPOSE_ENCRYPT | KeyProperties.PURPOSE_DECRYPT)
          .setBlockModes(KeyProperties.BLOCK_MODE_GCM)
          .setEncryptionPaddings(KeyProperties.ENCRYPTION_PADDING_NONE)
          .setKeySize(256)
          .build();
      keyGen.init(keySpec);
      SecretKey key = keyGen.generateKey();

      Cipher cipher = Cipher.getInstance("AES/GCM/NoPadding");
      cipher.init(Cipher.ENCRYPT_MODE, key);
      byte[] ciphertext = cipher.doFinal(plaintext);
      ```

      2. For sensitive data storage:
      ```java
      // Use EncryptedSharedPreferences (Jetpack Security)
      MasterKey masterKey = new MasterKey.Builder(context)
          .setKeyScheme(MasterKey.KeyScheme.AES256_GCM)
          .build();

      SharedPreferences prefs = EncryptedSharedPreferences.create(
          context,
          "secure_prefs",
          masterKey,
          EncryptedSharedPreferences.PrefKeyEncryptionScheme.AES256_SIV,
          EncryptedSharedPreferences.PrefValueEncryptionScheme.AES256_GCM
      );
      ```

      3. For string obfuscation (code protection only, not security):
      - Use ProGuard/R8 string encryption
      - Note: Code obfuscation ≠ data encryption

      WHEN TO IGNORE:
      - Checksum/CRC implementations (add comment to clarify)
      - Educational/example code demonstrating why XOR is weak
      - Non-security bit manipulation
    severity: ERROR
    languages:
      - java
      - kotlin
    metadata:
      category: security
      cwe: "CWE-327: Use of a Broken or Risky Cryptographic Algorithm"
      owasp-mobile: "M10: Insufficient Cryptography"
      mastg-id: "MASTG-CRYPTO"
      masvs: "MASVS-CRYPTO-1"
      confidence: HIGH
      found_in_sample: "sample/android-app/CredentialsLoader.java, C0955s.java"
      false_positive_likelihood: LOW
      expected_fp_reduction: "90%"

  - id: mastg-android-weak-cipher-des-improved
    patterns:
      - pattern-either:
          - pattern: Cipher.getInstance("DES")
          - pattern: Cipher.getInstance("DES/...")
          - pattern: Cipher.getInstance("DESede")
          - pattern: Cipher.getInstance("DESede/...")
      # Exclude test code
      - pattern-not-inside: |
          @Test
          fun $FUNC(...) { ... }
      - pattern-not-inside: |
          @Test
          public void $FUNC(...) { ... }
      - pattern-not-inside: |
          class $CLASSTest { ... }
    message: |
      DES or 3DES cipher detected (MASVS-CRYPTO-1).
      DES (56-bit key) and 3DES (effective 112-bit) are outdated block ciphers:
      - DES: Broken since 1998 (brute-forced in 56 hours)
      - 3DES: Deprecated by NIST (2023), vulnerable to Sweet32 attack

      Use AES-256 with GCM mode instead:
      Cipher.getInstance("AES/GCM/NoPadding")
    severity: ERROR
    languages:
      - java
      - kotlin
    metadata:
      category: security
      cwe: "CWE-327: Use of a Broken or Risky Cryptographic Algorithm"
      owasp-mobile: "M10: Insufficient Cryptography"
      mastg-id: "MASTG-CRYPTO"
      masvs: "MASVS-CRYPTO-1"
      confidence: HIGH
      false_positive_likelihood: VERY_LOW

  - id: mastg-android-weak-cipher-rc4-improved
    patterns:
      - pattern-either:
          - pattern: Cipher.getInstance("RC4")
          - pattern: Cipher.getInstance("ARC4")
          - pattern: Cipher.getInstance("ARCFOUR")
      # Exclude test code
      - pattern-not-inside: |
          @Test
          fun $FUNC(...) { ... }
      - pattern-not-inside: |
          @Test
          public void $FUNC(...) { ... }
    message: |
      RC4 stream cipher detected (MASVS-CRYPTO-1).
      RC4 is completely broken and should never be used:
      - Biases in keystream
      - Key recovery attacks
      - Removed from TLS 1.3

      Use AES-256 with GCM mode instead:
      Cipher.getInstance("AES/GCM/NoPadding")
    severity: ERROR
    languages:
      - java
      - kotlin
    metadata:
      category: security
      cwe: "CWE-327: Use of a Broken or Risky Cryptographic Algorithm"
      owasp-mobile: "M10: Insufficient Cryptography"
      mastg-id: "MASTG-CRYPTO"
      masvs: "MASVS-CRYPTO-1"
      confidence: HIGH
      false_positive_likelihood: VERY_LOW

  - id: mastg-android-ecb-mode-encryption-improved
    patterns:
      - pattern-either:
          - pattern: Cipher.getInstance("AES/ECB/...")
          - pattern: Cipher.getInstance("DES/ECB/...")
          - pattern: Cipher.getInstance(".../ECB/...")
      # Exclude test code
      - pattern-not-inside: |
          @Test
          fun $FUNC(...) { ... }
      - pattern-not-inside: |
          @Test
          public void $FUNC(...) { ... }
      - pattern-not-inside: |
          class $CLASSTest { ... }
    message: |
      ECB (Electronic Codebook) mode encryption detected (MASVS-CRYPTO-1).
      ECB mode is insecure as identical plaintext blocks produce identical ciphertext blocks.
      This reveals patterns in the data (famous "ECB Penguin" image).

      Use AES with GCM (Galois/Counter Mode) or CBC mode with random IV:
      - Best: Cipher.getInstance("AES/GCM/NoPadding")
      - Alternative: Cipher.getInstance("AES/CBC/PKCS5Padding") with random IV
    severity: ERROR
    languages:
      - java
      - kotlin
    metadata:
      category: security
      cwe: "CWE-327: Use of a Broken or Risky Cryptographic Algorithm"
      owasp-mobile: "M10: Insufficient Cryptography"
      mastg-id: "MASTG-CRYPTO"
      masvs: "MASVS-CRYPTO-1"
      confidence: HIGH
      false_positive_likelihood: VERY_LOW

  - id: mastg-android-weak-key-size-improved
    patterns:
      - pattern-either:
          - pattern: KeyGenerator.getInstance("AES").init($SIZE)
          - pattern: KeyPairGenerator.getInstance("RSA").initialize($SIZE)
      - metavariable-comparison:
          metavariable: $SIZE
          comparison: $SIZE < 256
      # Exclude test code
      - pattern-not-inside: |
          @Test
          fun $FUNC(...) { ... }
      - pattern-not-inside: |
          @Test
          public void $FUNC(...) { ... }
    message: |
      Weak cryptographic key size detected (MASVS-CRYPTO-1).

      Minimum secure key sizes:
      - AES: 256 bits (128 bits acceptable for non-critical data)
      - RSA: 2048 bits (4096 bits recommended for long-term security)
      - ECC: 256 bits (equivalent to 3072-bit RSA)

      Detected key size: $SIZE bits (too small)

      Fix:
      - AES: KeyGenerator.getInstance("AES").init(256)
      - RSA: KeyPairGenerator.getInstance("RSA").initialize(2048)
    severity: ERROR
    languages:
      - java
      - kotlin
    metadata:
      category: security
      cwe: "CWE-326: Inadequate Encryption Strength"
      owasp-mobile: "M10: Insufficient Cryptography"
      mastg-id: "MASTG-CRYPTO"
      masvs: "MASVS-CRYPTO-1"
      confidence: HIGH
      false_positive_likelihood: VERY_LOW

  - id: mastg-android-custom-rc4-implementation-improved
    patterns:
      - pattern-either:
          - pattern: |
              class $CLASS {
                ...
                int[] $S = new int[256];
                ...
                $S[$I] = ($S[$I] + $S[$J] + $KEY[$I % $KEYLEN]) % 256;
                ...
              }
          - pattern: |
              for ($I = 0; $I < 256; $I++) {
                ...
                $SWAP = $S[$I];
                $S[$I] = $S[$J];
                $S[$J] = $SWAP;
                ...
              }
      # Exclude test code and examples
      - pattern-not-inside: |
          @Test
          fun $FUNC(...) { ... }
      - pattern-not-inside: |
          @Test
          public void $FUNC(...) { ... }
      - pattern-not-inside: |
          // Example of insecure RC4
          ...
      - pattern-not-inside: |
          // Demonstration of weak crypto
          ...
    message: |
      Custom RC4 cipher implementation detected (MASVS-CRYPTO-1).

      DOUBLE VULNERABILITY:
      1. RC4 algorithm is broken (biases, key recovery attacks)
      2. Custom crypto implementations are highly prone to errors

      "Don't roll your own crypto" - Bruce Schneier

      Use Android's standard cryptography APIs with AES-256-GCM mode:
      ```java
      Cipher cipher = Cipher.getInstance("AES/GCM/NoPadding");
      cipher.init(Cipher.ENCRYPT_MODE, secretKey);
      byte[] ciphertext = cipher.doFinal(plaintext);
      ```
    severity: ERROR
    languages:
      - java
      - kotlin
    metadata:
      category: security
      cwe: "CWE-327: Use of a Broken or Risky Cryptographic Algorithm"
      owasp-mobile: "M10: Insufficient Cryptography"
      mastg-id: "MASTG-CRYPTO"
      masvs: "MASVS-CRYPTO-1"
      confidence: MEDIUM
      found_in_sample: "sample/android-app/C0955s.java"
      false_positive_likelihood: VERY_LOW
