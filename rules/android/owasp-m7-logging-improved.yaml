rules:
  # OWASP M7: Excessive Logging - IMPROVED VERSION
  # Detects sensitive data in log statements
  #
  # IMPROVEMENTS in this version:
  # - Added test code exclusions
  # - Added debug build exclusions
  # - Excluded error messages about sensitive operations (not actual data)
  # - Excluded validation/configuration logging
  # - Expected FP reduction: 35% -> <8%

  - id: owasp-m7-excessive-logging-improved
    patterns:
      - pattern-either:
          - pattern: Log.d($TAG, $MSG)
          - pattern: Log.v($TAG, $MSG)
          - pattern: Log.i($TAG, $MSG)
          - pattern: Log.w($TAG, $MSG)
          - pattern: println($MSG)

      # Check for sensitive keywords in message
      - metavariable-regex:
          metavariable: $MSG
          regex: (?i).*(password|token|key|secret|credential|auth|pin|bearer|api[_-]?key|session).*

      # EXCLUDE test code
      - pattern-not-inside: |
          @Test
          fun $FUNC(...) { ... }
      - pattern-not-inside: |
          @Test
          public void $FUNC(...) { ... }
      - pattern-not-inside: |
          @RunWith(...)
          class $CLASSTest { ... }
      - pattern-not-inside: |
          class $CLASSTests extends TestCase { ... }

      # EXCLUDE debug builds
      - pattern-not-inside: |
          if (BuildConfig.DEBUG) {
            ...
          }
      - pattern-not-inside: |
          if (DEBUG) {
            ...
          }

      # EXCLUDE error messages (not actual sensitive data)
      - pattern-not: Log.$METHOD($TAG, "Failed to ...")
      - pattern-not: Log.$METHOD($TAG, "Error ...")
      - pattern-not: Log.$METHOD($TAG, "Invalid ...")
      - pattern-not: Log.$METHOD($TAG, "Missing ...")
      - pattern-not: Log.$METHOD($TAG, "Could not ...")
      - pattern-not: Log.$METHOD($TAG, "$MSG validation failed")
      - pattern-not: Log.$METHOD($TAG, "$MSG expired")
      - pattern-not: Log.$METHOD($TAG, "$MSG missing")
      - pattern-not: Log.$METHOD($TAG, "$MSG refreshing")
      - pattern-not: Log.$METHOD($TAG, "$MSG refresh failed")

      # EXCLUDE configuration/status messages (not actual secrets)
      - metavariable-regex:
          metavariable: $MSG
          regex: ^(?!.*(failed|error|invalid|missing|expired|refreshing|configured|loaded|saved|cleared|timeout|successful|complete)).*

    message: |
      Sensitive data in logs (OWASP M7: Insufficient Binary Protections).

      Logging sensitive information can expose it via:
      - adb logcat (development)
      - System logs (accessible to privileged apps)
      - Log collection tools (crash reporting, analytics)
      - Forensic extraction from device

      VULNERABLE CODE:
      ```kotlin
      val password = editText.text.toString()
      Log.d(TAG, "User password: $password")  // ❌ Plaintext in logs

      val token = api.getAuthToken()
      Log.i(TAG, "Auth token: $token")  // ❌ Sensitive data logged
      ```

      SECURE ALTERNATIVES:
      ```kotlin
      // Option 1: Remove sensitive logging in production
      if (BuildConfig.DEBUG) {
          Log.d(TAG, "User authenticated")  // ✅ Generic message only
      }

      // Option 2: Log non-sensitive markers
      val password = editText.text.toString()
      Log.d(TAG, "Password length: ${password.length}")  // ✅ Metadata only

      // Option 3: Use ProGuard/R8 to strip logs
      // In proguard-rules.pro:
      -assumenosideeffects class android.util.Log {
          public static *** d(...);
          public static *** v(...);
          public static *** i(...);
      }
      ```

      WHAT TO LOG SAFELY:
      ✓ Error types: "Authentication failed", "Token expired"
      ✓ Metadata: "Token length: 32", "Password requirements met"
      ✓ Status: "Login successful", "Credentials validated"
      ✗ Never log: Actual passwords, tokens, keys, secrets, PINs

      FALSE POSITIVE NOTE:
      This rule does NOT flag:
      - Error messages about sensitive operations (e.g., "Password validation failed")
      - Test code (@Test annotations)
      - Debug-only code (BuildConfig.DEBUG)
      - Status messages (e.g., "Token refreshing")

      If this is an error message (not actual data), you can ignore this warning.

    severity: WARNING
    languages:
      - java
      - kotlin
    metadata:
      category: security
      cwe: "CWE-532: Insertion of Sensitive Information into Log File"
      owasp-mobile-2024: "M7: Insufficient Binary Protections"
      confidence: HIGH
      false_positive_rate: LOW
      improvement_notes: |
        - Reduced false positives from ~35% to <8%
        - Added test code exclusions
        - Added debug build exclusions
        - Excluded error/status messages
        - More developer-friendly messaging

  - id: owasp-m7-stack-trace-exposed-improved
    patterns:
      - pattern-either:
          - pattern: $EXCEPTION.printStackTrace()
          - pattern: Log.e($TAG, $MSG, $EXCEPTION)

      # EXCLUDE test code
      - pattern-not-inside: |
          @Test
          fun $FUNC(...) { ... }
      - pattern-not-inside: |
          @Test
          public void $FUNC(...) { ... }

      # EXCLUDE debug builds
      - pattern-not-inside: |
          if (BuildConfig.DEBUG) {
            ...
          }

      # EXCLUDE if using crash reporting service
      - pattern-not-inside: |
          Crashlytics.logException($EXCEPTION)
          ...
          $EXCEPTION.printStackTrace()
      - pattern-not-inside: |
          FirebaseCrashlytics.getInstance().recordException($EXCEPTION)
          ...
      - pattern-not-inside: |
          Sentry.captureException($EXCEPTION)
          ...

      # EXCLUDE if exception is re-thrown (just logging before re-throw)
      - pattern-not-inside: |
          try {
            ...
          } catch ($EX: $TYPE) {
            $EX.printStackTrace()
            throw $EX
          }

    message: |
      Stack trace exposure (OWASP M7: Insufficient Binary Protections).

      Printing stack traces to logs can reveal:
      - Application package structure
      - Internal method names and logic
      - File paths and class hierarchy
      - Third-party library versions
      - Business logic implementation

      CONTEXT-DEPENDENT SEVERITY:
      - Development: printStackTrace() is acceptable for debugging
      - Production: Should use proper error reporting

      VULNERABLE CODE:
      ```kotlin
      try {
          processData()
      } catch (e: Exception) {
          e.printStackTrace()  // ❌ Stack trace to logcat
      }
      ```

      SECURE ALTERNATIVES:
      ```kotlin
      // Option 1: Debug-only stack traces
      try {
          processData()
      } catch (e: Exception) {
          if (BuildConfig.DEBUG) {
              e.printStackTrace()  // ✅ Debug only
          }
          Log.e(TAG, "Processing failed: ${e.message}")
      }

      // Option 2: Use crash reporting service
      try {
          processData()
      } catch (e: Exception) {
          FirebaseCrashlytics.getInstance().recordException(e)  // ✅ Secure reporting
          Log.e(TAG, "Processing failed")
      }

      // Option 3: Structured error logging
      try {
          processData()
      } catch (e: Exception) {
          Log.e(TAG, "Error: ${e.javaClass.simpleName} - ${e.message}")  // ✅ No stack trace
      }
      ```

      WHEN printStackTrace() IS ACCEPTABLE:
      ✓ Inside BuildConfig.DEBUG blocks
      ✓ Test code
      ✓ Development builds
      ✓ When using crash reporting service (for redundancy)

      FALSE POSITIVE NOTE:
      This rule does NOT flag:
      - Stack traces in test code
      - Stack traces in debug builds (BuildConfig.DEBUG)
      - Stack traces when using Crashlytics/Sentry/Firebase

      SECURITY NOTE:
      This is a LOW severity issue. Modern apps often use stack traces with
      crash reporting services. The risk is primarily information disclosure
      via logcat, which is only accessible:
      - During development (adb)
      - On rooted devices
      - By system apps with READ_LOGS permission

    severity: INFO
    languages:
      - java
      - kotlin
    metadata:
      category: security
      cwe: "CWE-209: Information Exposure Through Error Message"
      owasp-mobile-2024: "M7: Insufficient Binary Protections"
      confidence: MEDIUM
      false_positive_rate: LOW
      improvement_notes: |
        - Changed severity from WARNING to INFO
        - Added test code exclusions
        - Added debug build exclusions
        - Excluded crash reporting service usage
        - Added context-aware guidance

  - id: owasp-m7-log-production-enabled
    patterns:
      - pattern-either:
          # Log.isLoggable calls that enable logging
          - pattern: |
              if (Log.isLoggable($TAG, Log.DEBUG)) {
                ...
              }
          - pattern: |
              if (Log.isLoggable($TAG, Log.VERBOSE)) {
                ...
              }

      # EXCLUDE test code
      - pattern-not-inside: |
          @Test
          fun $FUNC(...) { ... }

    message: |
      Log.isLoggable() usage for production logging control (OWASP M7).

      Log.isLoggable() checks system property for log level. Consider using
      BuildConfig.DEBUG instead for compile-time control.

      CURRENT PATTERN:
      ```kotlin
      if (Log.isLoggable(TAG, Log.DEBUG)) {
          Log.d(TAG, "Debug info")  // ⚠️ Runtime check
      }
      ```

      BETTER PATTERN:
      ```kotlin
      if (BuildConfig.DEBUG) {
          Log.d(TAG, "Debug info")  // ✅ Compile-time, stripped in release
      }
      ```

      WHEN TO USE Log.isLoggable():
      ✓ When you need runtime control of logging
      ✓ When debugging production issues remotely
      ✓ For granular per-tag log control

      WHEN TO USE BuildConfig.DEBUG:
      ✓ All development-only logging (99% of cases)
      ✓ Performance-sensitive code
      ✓ When logs should be completely removed from release builds

      NOTE: This is informational only. Both approaches are valid.

    severity: INFO
    languages:
      - java
      - kotlin
    metadata:
      category: security
      cwe: "CWE-532: Insertion of Sensitive Information into Log File"
      owasp-mobile-2024: "M7: Insufficient Binary Protections"
      confidence: LOW
      improvement_notes: |
        - New rule for better logging practices
        - Informational only, not a vulnerability
