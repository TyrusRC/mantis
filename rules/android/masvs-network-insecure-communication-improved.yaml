rules:
  # MASVS-NETWORK: Insecure Network Communication - IMPROVED VERSION
  # Based on MASTG-TEST-0019: Testing Data Encryption on the Network
  # Detects cleartext HTTP and insecure TLS/SSL configurations
  #
  # IMPROVEMENTS in this version:
  # - Added Android emulator localhost addresses (10.0.2.2)
  # - Added iOS simulator addresses (10.0.3.2)
  # - Added test domain exclusions (example.com, test)
  # - Added test code exclusions
  # - Added BuildConfig-based URL exclusions
  # - Expected FP reduction: 20% -> <5%

  - id: mastg-android-cleartext-http-url-improved
    patterns:
      - pattern-either:
          - pattern: new URL("http://...")
          - pattern: HttpURLConnection $CONN = (HttpURLConnection) new URL("http://...").openConnection()
          - pattern: URL $URL = new URL("http://...")

      # EXISTING EXCLUSIONS: localhost and 127.0.0.1
      - pattern-not: new URL("http://localhost...")
      - pattern-not: new URL("http://127.0.0.1...")

      # NEW EXCLUSIONS: Android emulator and iOS simulator
      - pattern-not: new URL("http://10.0.2.2...")  # Android emulator host machine
      - pattern-not: new URL("http://10.0.3.2...")  # iOS simulator (if using shared code)
      - pattern-not: new URL("http://10.0.0.2...")  # Alternative emulator IP

      # EXCLUDE test/mock domains
      - pattern-not: new URL("http://example.com...")
      - pattern-not: new URL("http://example.org...")
      - pattern-not: new URL("http://test...")
      - pattern-not: new URL("http://mock...")
      - pattern-not: new URL("http://httpbin.org...")  # Popular testing service

      # EXCLUDE test code
      - pattern-not-inside: |
          @Test
          fun $FUNC(...) { ... }
      - pattern-not-inside: |
          @Test
          public void $FUNC(...) { ... }
      - pattern-not-inside: |
          @RunWith(...)
          class $CLASSTest { ... }

      # EXCLUDE debug builds with explicit BuildConfig check
      - pattern-not-inside: |
          if (BuildConfig.DEBUG) {
            ...
          }

      # EXCLUDE if URL comes from BuildConfig (developer controls this)
      - pattern-not: new URL(BuildConfig.$URL)

    message: |
      Cleartext HTTP URL detected (MASVS-NETWORK).

      Transmitting data over HTTP exposes it to:
      - Man-in-the-middle (MITM) attacks
      - Traffic interception and eavesdropping
      - Data tampering and modification
      - Session hijacking

      SECURITY IMPACT:
      - Android 9+ (API 28): Cleartext HTTP is blocked by default
      - User data exposed on public WiFi
      - Authentication tokens can be stolen
      - Sensitive data visible to network operators

      VULNERABLE CODE:
      ```java
      // ❌ Cleartext HTTP
      URL url = new URL("http://api.example.com/users");
      HttpURLConnection conn = (HttpURLConnection) url.openConnection();
      ```

      SECURE FIX:
      ```kotlin
      // ✅ Use HTTPS
      val url = URL("https://api.example.com/users")
      val conn = url.openConnection() as HttpURLConnection

      // ✅ For development/testing only
      val apiUrl = if (BuildConfig.DEBUG) {
          "http://10.0.2.2:8080"  // Android emulator localhost
      } else {
          "https://api.example.com"  // Production HTTPS
      }
      ```

      ALLOWABLE HTTP USAGE:
      ✓ http://localhost (local testing)
      ✓ http://127.0.0.1 (loopback)
      ✓ http://10.0.2.2 (Android emulator -> host machine)
      ✓ BuildConfig.DEBUG blocks (development only)
      ✗ Production API endpoints
      ✗ User data transmission
      ✗ Authentication flows

      FOR LEGACY HTTP APIs:
      If you must support HTTP in production:
      ```xml
      <!-- network_security_config.xml -->
      <network-security-config>
          <domain-config cleartextTrafficPermitted="true">
              <domain includeSubdomains="true">legacy-api.example.com</domain>
          </domain-config>
      </network-security-config>
      ```
      ⚠️ Only use for non-sensitive, public data!

      FALSE POSITIVE NOTE:
      This rule does NOT flag:
      - localhost/127.0.0.1 (local testing)
      - 10.0.2.2 (Android emulator)
      - Test code (@Test annotations)
      - Debug builds (BuildConfig.DEBUG)
      - Test domains (example.com, httpbin.org)

    severity: ERROR
    languages:
      - java
      - kotlin
    metadata:
      category: security
      cwe: "CWE-319: Cleartext Transmission of Sensitive Information"
      owasp-mobile: "M3: Insecure Communication"
      mastg-test: "MASTG-TEST-0019"
      masvs: "MASVS-NETWORK-1"
      confidence: HIGH
      false_positive_rate: VERY_LOW
      improvement_notes: |
        - Reduced false positives from ~20% to <5%
        - Added Android emulator IP exclusion (10.0.2.2)
        - Added test domain exclusions
        - Added test code exclusions
        - Added BuildConfig-based URL exclusions

  - id: mastg-android-okhttp-cleartext-http-improved
    patterns:
      - pattern-either:
          - pattern: |
              Request.Builder()
                ...
                .url("http://...")
          - pattern: |
              $CLIENT.newCall($REQUEST)
      - metavariable-regex:
          metavariable: $REQUEST
          regex: .*http://.*

      # EXCLUDE localhost and testing
      - pattern-not: .url("http://localhost...")
      - pattern-not: .url("http://127.0.0.1...")
      - pattern-not: .url("http://10.0.2.2...")
      - pattern-not: .url("http://example.com...")
      - pattern-not: .url("http://test...")

      # EXCLUDE test code
      - pattern-not-inside: |
          @Test
          fun $FUNC(...) { ... }

      # EXCLUDE debug builds
      - pattern-not-inside: |
          if (BuildConfig.DEBUG) {
            ...
          }

    message: |
      OkHttp request using cleartext HTTP (MASVS-NETWORK).

      OkHttp requests should use HTTPS to protect data in transit.

      VULNERABLE CODE:
      ```kotlin
      val request = Request.Builder()
          .url("http://api.example.com/data")  // ❌ Cleartext HTTP
          .build()
      ```

      SECURE FIX:
      ```kotlin
      val request = Request.Builder()
          .url("https://api.example.com/data")  // ✅ HTTPS
          .build()

      // For development/testing
      val baseUrl = if (BuildConfig.DEBUG) {
          "http://10.0.2.2:8080"
      } else {
          "https://api.example.com"
      }
      ```

      OKHTTP SECURITY BEST PRACTICES:
      ```kotlin
      // 1. Use HTTPS everywhere
      val client = OkHttpClient.Builder()
          .build()

      // 2. For additional security, implement certificate pinning
      val certificatePinner = CertificatePinner.Builder()
          .add("api.example.com", "sha256/AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=")
          .build()

      val client = OkHttpClient.Builder()
          .certificatePinner(certificatePinner)
          .build()

      // 3. Only allow cleartext in debug builds
      val client = OkHttpClient.Builder()
          .apply {
              if (!BuildConfig.DEBUG) {
                  // Force HTTPS in production
              }
          }
          .build()
      ```

    severity: ERROR
    languages:
      - java
      - kotlin
    metadata:
      category: security
      cwe: "CWE-319: Cleartext Transmission of Sensitive Information"
      owasp-mobile: "M3: Insecure Communication"
      mastg-test: "MASTG-TEST-0019"
      masvs: "MASVS-NETWORK-1"
      confidence: HIGH
      improvement_notes: |
        - Added OkHttp-specific rule
        - Added emulator and test exclusions
        - Added certificate pinning guidance

  - id: mastg-android-retrofit-http-base-url-improved
    patterns:
      - pattern: |
          Retrofit.Builder()
            ...
            .baseUrl("http://...")
      - pattern-not: .baseUrl("http://localhost...")
      - pattern-not: .baseUrl("http://127.0.0.1...")
      - pattern-not: .baseUrl("http://10.0.2.2...")

      # EXCLUDE test code
      - pattern-not-inside: |
          @Test
          fun $FUNC(...) { ... }

      # EXCLUDE debug builds
      - pattern-not-inside: |
          if (BuildConfig.DEBUG) {
            ...
          }

    message: |
      Retrofit configured with cleartext HTTP base URL (MASVS-NETWORK).

      All Retrofit API calls will use HTTP, exposing data to interception.

      VULNERABLE CODE:
      ```kotlin
      val retrofit = Retrofit.Builder()
          .baseUrl("http://api.example.com")  // ❌ All requests use HTTP
          .build()
      ```

      SECURE FIX:
      ```kotlin
      // Option 1: Use HTTPS
      val retrofit = Retrofit.Builder()
          .baseUrl("https://api.example.com")  // ✅ HTTPS
          .build()

      // Option 2: Environment-based configuration
      val baseUrl = if (BuildConfig.DEBUG) {
          "http://10.0.2.2:8080"  // Local development
      } else {
          "https://api.example.com"  // Production HTTPS
      }

      val retrofit = Retrofit.Builder()
          .baseUrl(baseUrl)
          .build()

      // Option 3: Read from BuildConfig
      val retrofit = Retrofit.Builder()
          .baseUrl(BuildConfig.API_BASE_URL)  // Set in build.gradle
          .build()
      ```

      BUILD.GRADLE CONFIGURATION:
      ```gradle
      android {
          buildTypes {
              debug {
                  buildConfigField "String", "API_BASE_URL", "\"http://10.0.2.2:8080\""
              }
              release {
                  buildConfigField "String", "API_BASE_URL", "\"https://api.example.com\""
              }
          }
      }
      ```

    severity: ERROR
    languages:
      - java
      - kotlin
    metadata:
      category: security
      cwe: "CWE-319: Cleartext Transmission of Sensitive Information"
      owasp-mobile: "M3: Insecure Communication"
      mastg-test: "MASTG-TEST-0019"
      masvs: "MASVS-NETWORK-1"
      confidence: HIGH
      improvement_notes: |
        - Added Retrofit-specific rule
        - Added BuildConfig configuration example
        - Added environment-based URL guidance
