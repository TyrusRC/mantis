  # ============ TYPOSQUATTING DETECTION ============

  - id: android-dep-suspicious-package-name
    patterns:
      - pattern-either:
          - pattern: |
              implementation '$GROUP:$ARTIFACT:$VERSION'
          - pattern: |
              compile '$GROUP:$ARTIFACT:$VERSION'
      - metavariable-regex:
          metavariable: $GROUP
          regex: .*(andriod|gogle|amazn|facbook|sqare|jetbrins).*
    message: |
      Suspicious package name - possible typosquatting (OWASP M2: Inadequate Supply Chain Security).

      Risk: CRITICAL
      Impact: Package name contains common typos that may indicate a malicious
      typosquatting attack (e.g., 'andriod' instead of 'android').

      Common typosquats:
      - andriod → android
      - gogle → google
      - amazn → amazon
      - facbook → facebook
      - sqare → square
      - jetbrins → jetbrains

      Remediation:
      - Verify package name spelling carefully
      - Check official documentation for correct package coordinates
      - Review package publisher and download statistics

      References:
      - https://owasp.org/www-community/attacks/Typosquatting
    severity: ERROR
    languages:
      - gradle
    metadata:
      category: security
      cwe: "CWE-1021: Improper Restriction of Rendered UI Layers or Frames"
      owasp-mobile-2024: "M2: Inadequate Supply Chain Security"
      confidence: HIGH
