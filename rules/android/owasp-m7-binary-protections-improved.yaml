rules:
  # =============================================================================
  # IMPROVED: Android Binary Protections (Phase 2 False Positive Fixes)
  # =============================================================================
  #
  # IMPROVEMENTS OVER ORIGINAL:
  # 1. Root detection: Already INFO severity (kept as is)
  # 2. Exported components: Excludes launcher activities and standard intents
  # 3. Better messaging about when these protections are needed
  #
  # EXPECTED FALSE POSITIVE REDUCTION: 40% → <15%
  # =============================================================================

  - id: owasp-m7-missing-root-detection-improved
    patterns:
      - pattern-either:
          - pattern: |
              class MainActivity : AppCompatActivity() {
                ...
              }
          - pattern: |
              public class MainActivity extends AppCompatActivity {
                ...
              }
      - pattern-not-inside: |
          if (isRooted()) {
            ...
          }
      - pattern-not-inside: |
          RootBeer($CONTEXT).isRooted()

    message: |
      MainActivity without root detection check (OWASP M7: Insufficient Binary Protections).

      IMPORTANT: Root detection is INFORMATIONAL.
      Only implement if your app requires it.

      ROOT DETECTION IS RECOMMENDED FOR:
      ✓ Banking and financial apps
      ✓ Payment processing apps
      ✓ Healthcare apps handling PHI (Protected Health Information)
      ✓ DRM/content protection apps
      ✓ Enterprise apps with strict security requirements
      ✓ Apps handling government/classified data

      ROOT DETECTION IS NOT NEEDED FOR:
      ✗ General purpose apps
      ✗ Developer tools
      ✗ Open-source apps
      ✗ Games (unless handling real money)
      ✗ Information/news apps
      ✗ Productivity apps without sensitive data

      IMPLEMENTATION OPTIONS:
      ```kotlin
      // Option 1: RootBeer library (recommended)
      if (RootBeer(this).isRooted) {
          AlertDialog.Builder(this)
              .setTitle("Rooted Device Detected")
              .setMessage("This app cannot run on rooted devices")
              .setPositiveButton("Exit") { _, _ -> finish() }
              .show()
      }

      // Option 2: Play Integrity API (modern Google approach)
      IntegrityManagerFactory.create(applicationContext)
          .requestIntegrityToken(...)
          .addOnSuccessListener { response ->
              // Check device integrity
          }

      // Option 3: SafetyNet Attestation API (deprecated but still works)
      SafetyNet.getClient(this)
          .attest(nonce, API_KEY)
          .addOnSuccessListener { response ->
              // Validate response server-side
          }
      ```

      LIMITATIONS OF ROOT DETECTION:
      - Can be bypassed by determined attackers
      - May frustrate legitimate users (developers, testers)
      - Creates false sense of security
      - Requires ongoing maintenance (new root methods)

      BETTER ALTERNATIVES:
      - Server-side security controls (primary defense)
      - Runtime application self-protection (RASP)
      - Certificate pinning
      - Code obfuscation
      - Secure key storage (Android Keystore)

      DECISION TREE:
      1. Does your app handle financial transactions? → Implement root detection
      2. Does your app store sensitive PII? → Consider root detection
      3. Is your app open-source/developer-focused? → Skip root detection
      4. Is your app a game without real money? → Skip root detection

      Reference: OWASP Mobile Top 10 2024 - M7

    severity: INFO
    languages:
      - java
      - kotlin
    metadata:
      category: security
      owasp-mobile-2024: "M7: Insufficient Binary Protections"
      confidence: LOW
      false_positive_reduction: "Phase 2 - Better guidance on when needed"

  - id: owasp-m7-exported-component-no-permission-improved
    patterns:
      - pattern-either:
          - pattern: |
              <activity
                ...
                android:exported="true"
                ...
              />
          - pattern: |
              <service
                ...
                android:exported="true"
                ...
              />
          - pattern: |
              <receiver
                ...
                android:exported="true"
                ...
              />

      # Don't flag if permission is set
      - pattern-not-inside: |
          <activity
            ...
            android:permission="..."
            android:exported="true"
            ...
          />
      - pattern-not-inside: |
          <service
            ...
            android:permission="..."
            android:exported="true"
            ...
          />
      - pattern-not-inside: |
          <receiver
            ...
            android:permission="..."
            android:exported="true"
            ...
          />

      # ========== EXCLUDE LAUNCHER ACTIVITIES (MUST BE EXPORTED) ==========
      - pattern-not-inside: |
          <activity
            android:exported="true"
            ...>
            <intent-filter>
              <action android:name="android.intent.action.MAIN" />
              <category android:name="android.intent.category.LAUNCHER" />
            </intent-filter>
          </activity>

      # ========== EXCLUDE STANDARD INTENT HANDLERS ==========
      # These are meant to be called by other apps
      - pattern-not-inside: |
          <activity
            android:exported="true"
            ...>
            <intent-filter>
              <action android:name="android.intent.action.SEND" />
            </intent-filter>
          </activity>
      - pattern-not-inside: |
          <activity
            android:exported="true"
            ...>
            <intent-filter>
              <action android:name="android.intent.action.VIEW" />
            </intent-filter>
          </activity>
      - pattern-not-inside: |
          <activity
            android:exported="true"
            ...>
            <intent-filter>
              <action android:name="android.intent.action.SENDTO" />
            </intent-filter>
          </activity>

    message: |
      Exported component without permission protection (OWASP M7: Insufficient Binary Protections).

      CONTEXT-AWARE ANALYSIS:
      This warning excludes legitimate exports (launcher activities, standard intents).

      LEGITIMATE EXPORTS (no permission needed):
      ✓ Launcher activities (android.intent.action.MAIN)
      ✓ Share targets (android.intent.action.SEND)
      ✓ URL handlers (android.intent.action.VIEW)
      ✓ Public APIs meant for other apps
      ✓ Standard system intents

      EXPORTS REQUIRING PERMISSIONS:
      ✗ Activities handling sensitive operations
      ✗ Services processing private data
      ✗ Receivers for app-specific broadcasts
      ✗ Components with custom actions

      VULNERABLE EXAMPLE:
      ```xml
      <!-- INSECURE - Any app can start this activity -->
      <activity
          android:name=".AdminActivity"
          android:exported="true" />  ❌ Missing permission
      ```

      SECURE FIXES:
      ```xml
      <!-- Option 1: Add permission protection -->
      <activity
          android:name=".AdminActivity"
          android:exported="true"
          android:permission="com.example.app.permission.ADMIN_ACCESS" />

      <!-- Define the permission -->
      <permission
          android:name="com.example.app.permission.ADMIN_ACCESS"
          android:protectionLevel="signature" />

      <!-- Option 2: Don't export (if no other apps need access) -->
      <activity
          android:name=".AdminActivity"
          android:exported="false" />  ✅ Only accessible by this app

      <!-- Option 3: Runtime validation -->
      <activity
          android:name=".SensitiveActivity"
          android:exported="true" />
      ```

      RUNTIME VALIDATION (Defense in Depth):
      ```kotlin
      class SensitiveActivity : AppCompatActivity() {
          override fun onCreate(savedInstanceState: Bundle?) {
              super.onCreate(savedInstanceState)

              // Check caller identity
              val caller = callingActivity
              if (caller == null || !isTrustedCaller(caller.packageName)) {
                  finish()
                  return
              }

              // Validate intent data
              val data = intent.data
              if (data != null && !isValidData(data)) {
                  finish()
                  return
              }
          }
      }
      ```

      PROTECTION LEVELS:
      - normal: Granted automatically
      - dangerous: Requires user approval
      - signature: Only apps signed with same key
      - signatureOrSystem: Signature + system apps

      BEST PRACTICES:
      1. Default to android:exported="false"
      2. Only export when necessary for inter-app communication
      3. Use signature-level permissions for sensitive components
      4. Implement runtime validation (defense in depth)
      5. Document why each component is exported

      ATTACK SCENARIOS:
      - Intent spoofing: Malicious app sends crafted intent
      - Privilege escalation: Access admin functionality
      - Data theft: Extract private information
      - Denial of service: Crash app with invalid data

      Reference: CWE-927 (Use of Implicit Intent for Sensitive Communication)

    severity: WARNING
    languages:
      - xml
    paths:
      include:
        - "**/AndroidManifest.xml"
    metadata:
      category: security
      cwe: "CWE-927: Use of Implicit Intent for Sensitive Communication"
      owasp-mobile-2024: "M7: Insufficient Binary Protections"
      confidence: MEDIUM
      false_positive_reduction: "Phase 2 - Launcher/standard intent exclusions"
      estimated_fp_rate_before: "40%"
      estimated_fp_rate_after: "<15%"
