rules:
  - id: web-a02-hardcoded-aes-key-node
    languages: [javascript, typescript]
    severity: ERROR
    message: |
      Hardcoded symmetric key passed to crypto.createCipheriv. Keys must come
      from a secret store (KMS, HSM, env var, vault) — never embedded in
      source.

      OWASP Top 10:2025 — A02 Cryptographic Failures
      Fix: read the key from process.env, AWS KMS, GCP KMS, HashiCorp Vault, etc.
    patterns:
      - pattern-either:
          - pattern: crypto.createCipheriv($ALG, "$KEY", $IV)
          - pattern: crypto.createCipheriv($ALG, '$KEY', $IV)
          - pattern: crypto.createDecipheriv($ALG, "$KEY", $IV)
          - pattern: crypto.createDecipheriv($ALG, '$KEY', $IV)
    metadata:
      category: security
      owasp: "A02:2025 Cryptographic Failures"
      cwe: "CWE-321"
      confidence: HIGH
      pack: [web, fast, deep]

  - id: web-a02-weak-md5-sha1-password-hash
    languages: [python, javascript, typescript, java]
    severity: ERROR
    message: |
      MD5 / SHA-1 used for password hashing. These are unsuitable — use a
      memory-hard KDF such as argon2id, bcrypt, or scrypt.

      OWASP Top 10:2025 — A02 Cryptographic Failures
    patterns:
      - pattern-either:
          - pattern: hashlib.md5($PWD).hexdigest()
          - pattern: hashlib.sha1($PWD).hexdigest()
          - pattern: crypto.createHash("md5").update($PWD).digest($X)
          - pattern: crypto.createHash("sha1").update($PWD).digest($X)
          - pattern: MessageDigest.getInstance("MD5")
          - pattern: MessageDigest.getInstance("SHA-1")
    metadata:
      category: security
      owasp: "A02:2025 Cryptographic Failures"
      cwe: "CWE-916"
      confidence: MEDIUM
      pack: [web, fast, deep]
