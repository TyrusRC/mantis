rules:
  # =============================================================================
  # IMPROVED: iOS Storage Security (Phase 2 False Positive Fixes)
  # =============================================================================
  #
  # IMPROVEMENTS OVER ORIGINAL:
  # 1. Excludes boolean flags (UI state, feature flags)
  # 2. Excludes UI state keys (has_seen, should_show, enable_)
  # 3. Excludes test code
  # 4. Excludes SwiftUI previews
  # 5. Excludes mock/test data
  # 6. Tightened regex patterns
  #
  # EXPECTED FALSE POSITIVE REDUCTION: 35% → <8%
  # =============================================================================

  - id: mastg-ios-nsuserdefaults-sensitive-data-improved
    patterns:
      - pattern-either:
          - pattern: |
              NSUserDefaults.standard.set($VALUE, forKey: $KEY)
          - pattern: |
              UserDefaults.standard.set($VALUE, forKey: $KEY)
          - pattern: |
              $DEFAULTS.set($VALUE, forKey: $KEY)

      # Detect sensitive keys
      - metavariable-regex:
          metavariable: $KEY
          regex: (?i).*(password|token|secret|api[_-]?key|auth|credential|session|pin|private[_-]?key).*

      # ========== EXCLUDE UI STATE FLAGS ==========
      # Keys for UI state, not actual sensitive data
      - metavariable-regex:
          metavariable: $KEY
          regex: ^(?!.*(has_seen|should_show|enable_|disable_|is_enabled|did_complete|show_|hide_)).*

      # ========== EXCLUDE BOOLEAN VALUES ==========
      # Booleans are usually flags, not credentials
      - pattern-not: |
          UserDefaults.standard.set(true, forKey: $KEY)
      - pattern-not: |
          UserDefaults.standard.set(false, forKey: $KEY)
      - pattern-not: |
          $DEFAULTS.set(true, forKey: $KEY)
      - pattern-not: |
          $DEFAULTS.set(false, forKey: $KEY)

      # ========== EXCLUDE TEST CODE ==========
      - pattern-not-inside: |
          func test$ANYTHING(...) { ... }
      - pattern-not-inside: |
          class $CLASSTests: XCTestCase { ... }
      - pattern-not-inside: |
          class $CLASSTests: QuickSpec { ... }

      # ========== EXCLUDE SWIFTUI PREVIEWS ==========
      - pattern-not-inside: |
          struct $NAME_Previews: PreviewProvider { ... }
      - pattern-not-inside: |
          static var previews: some View { ... }

      # ========== EXCLUDE MOCK/TEST DATA ==========
      - pattern-not-inside: |
          class Mock$CLASS { ... }
      - pattern-not-inside: |
          class Stub$CLASS { ... }
      - pattern-not-inside: |
          class Fake$CLASS { ... }

      # ========== EXCLUDE DEBUG BUILDS ==========
      - pattern-not-inside: |
          #if DEBUG
          ...
          #endif

      # ========== EXCLUDE CONFIGURATION KEYS ==========
      # Storing key names, not actual values
      - pattern-not-inside: |
          enum $NAME {
            static let $KEY = "..."
          }

    message: |
      Sensitive data stored in UserDefaults (MASVS-STORAGE).

      CONTEXT-AWARE ANALYSIS:
      This rule excludes UI state flags, boolean values, and test code.

      FALSE POSITIVE NOTE:
      This warning is safe to ignore if:
      ✓ Storing UI state flags (has_seen_tutorial, enable_dark_mode)
      ✓ Storing boolean feature flags
      ✓ This is test code
      ✓ Storing metadata (timestamps, URLs, not actual secrets)
      ✓ Storing encrypted data (already protected)

      ISSUE:
      UserDefaults stores data in plaintext plist files:
      - Located in Library/Preferences/
      - Included in iTunes/iCloud backups
      - Accessible if device is jailbroken
      - Readable if device is not encrypted
      - Persists after app deletion (sometimes)

      VULNERABLE EXAMPLES:
      ```swift
      // INSECURE - Actual credentials stored in plaintext
      UserDefaults.standard.set(password, forKey: "password")        // ❌
      UserDefaults.standard.set(authToken, forKey: "auth_token")    // ❌
      UserDefaults.standard.set(apiKey, forKey: "api_key")          // ❌
      UserDefaults.standard.set(pin, forKey: "user_pin")            // ❌
      ```

      ACCEPTABLE USES (not flagged):
      ```swift
      // UI state - OK to store in UserDefaults
      UserDefaults.standard.set(true, forKey: "has_seen_password_tutorial")  // ✅
      UserDefaults.standard.set(false, forKey: "enable_auth_feature")        // ✅

      // Metadata - OK (not the actual secret)
      UserDefaults.standard.set(Date(), forKey: "last_token_refresh")        // ✅
      UserDefaults.standard.set("https://api.com", forKey: "api_base_url")   // ✅
      ```

      SECURE FIXES:
      ```swift
      // Option 1: Use iOS Keychain (RECOMMENDED)
      let query: [String: Any] = [
          kSecClass as String: kSecClassGenericPassword,
          kSecAttrAccount as String: "authToken",
          kSecValueData as String: token.data(using: .utf8)!,
          kSecAttrAccessible as String: kSecAttrAccessibleWhenUnlocked
      ]
      SecItemAdd(query as CFDictionary, nil)  // ✅ Secure

      // Option 2: Use KeychainAccess library (easier API)
      let keychain = Keychain(service: "com.example.app")
      keychain["authToken"] = token  // ✅ Secure

      // Option 3: Encrypt before storing (if Keychain not suitable)
      let encryptedToken = try encrypt(token, with: keyFromKeychain)
      UserDefaults.standard.set(encryptedToken, forKey: "encrypted_token")  // ✅ OK
      ```

      WHAT TO STORE WHERE:

      UserDefaults (OK):
      ✓ UI preferences (theme, language)
      ✓ Feature flags
      ✓ Non-sensitive settings
      ✓ Cache metadata
      ✓ Last update timestamps

      Keychain (REQUIRED):
      ✓ Passwords
      ✓ API keys
      ✓ Auth tokens
      ✓ Session IDs
      ✓ OAuth credentials
      ✓ Encryption keys
      ✓ Certificates
      ✓ PINs

      KEYCHAIN BENEFITS:
      - Hardware-backed encryption (Secure Enclave)
      - Survives app deletion (if configured)
      - Protected by device passcode
      - Supports biometric authentication
      - Excluded from backups (optional)

      KEYCHAIN EXAMPLE (KeychainAccess):
      ```swift
      import KeychainAccess

      let keychain = Keychain(service: "com.example.app")

      // Store
      keychain["password"] = password
      keychain["authToken"] = token

      // Retrieve
      let storedPassword = keychain["password"]

      // Delete
      try keychain.remove("password")

      // With accessibility
      keychain
          .accessibility(.whenUnlocked)
          .set(password, key: "password")
      ```

      Reference: https://mas.owasp.org/MASTG/tests/ios/MASVS-STORAGE/MASTG-TEST-0052/

    severity: ERROR
    languages:
      - swift
    metadata:
      category: security
      cwe: "CWE-312: Cleartext Storage of Sensitive Information"
      owasp-mobile-2024: "M9: Insecure Data Storage"
      mastg-test: "MASTG-TEST-0052"
      masvs: "MASVS-STORAGE-1"
      confidence: HIGH
      false_positive_reduction: "Phase 2 - Boolean/UI state/test exclusions"
      estimated_fp_rate_before: "35%"
      estimated_fp_rate_after: "<8%"

  - id: mastg-ios-nsuserdefaults-sensitive-data-objc-improved
    patterns:
      - pattern-either:
          - pattern: |
              [[NSUserDefaults standardUserDefaults] setObject:$VALUE forKey:$KEY]
          - pattern: |
              [$DEFAULTS setObject:$VALUE forKey:$KEY]

      - metavariable-regex:
          metavariable: $KEY
          regex: (?i).*(password|token|secret|api[_-]?key|auth|credential|session|pin|private[_-]?key).*

      # ========== EXCLUDE UI STATE FLAGS ==========
      - metavariable-regex:
          metavariable: $KEY
          regex: ^(?!.*(has_seen|should_show|enable_|disable_|is_enabled|did_complete)).*

      # ========== EXCLUDE BOOLEAN VALUES ==========
      - pattern-not: |
          [$DEFAULTS setObject:@YES forKey:$KEY]
      - pattern-not: |
          [$DEFAULTS setObject:@NO forKey:$KEY]

      # ========== EXCLUDE TEST CODE ==========
      - pattern-not-inside: |
          - (void)test$ANYTHING { ... }

    message: |
      Sensitive data stored in NSUserDefaults (MASVS-STORAGE).
      NSUserDefaults stores data in plaintext plist files. Use iOS Keychain
      for sensitive data like passwords, tokens, or API keys.

      See Swift version of this rule for detailed guidance.

    severity: ERROR
    languages:
      - objc
    metadata:
      category: security
      cwe: "CWE-312: Cleartext Storage of Sensitive Information"
      mastg-test: "MASTG-TEST-0052"
      masvs: "MASVS-STORAGE-1"
      owasp-mobile-2024: "M9: Insecure Data Storage"
      confidence: HIGH
      false_positive_reduction: "Phase 2 - Boolean/UI state/test exclusions"
