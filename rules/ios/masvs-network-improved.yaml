rules:
  # =============================================================================
  # IMPROVED: iOS Network Security (Phase 2 False Positive Fixes)
  # =============================================================================
  #
  # IMPROVEMENTS OVER ORIGINAL:
  # 1. Excludes local network (RFC 1918: 10.x, 192.168.x, 172.16-31.x)
  # 2. Excludes iOS simulator (10.0.3.2)
  # 3. Excludes test domains (example.com, test.*, mock.*)
  # 4. Excludes test code and SwiftUI previews
  # 5. Excludes debug builds
  #
  # EXPECTED FALSE POSITIVE REDUCTION: 25% → <8%
  # =============================================================================

  - id: mastg-ios-http-url-string-improved
    patterns:
      - pattern-either:
          - pattern: 'URL(string: "http://...")'
          - pattern: 'NSURL(string: "http://...")'
          - pattern: 'URLRequest(url: URL(string: "http://...")!)'

      # Current exclusions (localhost)
      - pattern-not: 'URL(string: "http://localhost...")'
      - pattern-not: 'URL(string: "http://127.0.0.1...")'

      # ========== EXCLUDE LOCAL NETWORK (RFC 1918) ==========
      - pattern-not: 'URL(string: "http://10....")'
      - pattern-not: 'URL(string: "http://192.168....")'
      - pattern-not: 'URL(string: "http://172.16....")'
      - pattern-not: 'URL(string: "http://172.17....")'
      - pattern-not: 'URL(string: "http://172.18....")'
      - pattern-not: 'URL(string: "http://172.19....")'
      - pattern-not: 'URL(string: "http://172.20....")'
      - pattern-not: 'URL(string: "http://172.21....")'
      - pattern-not: 'URL(string: "http://172.22....")'
      - pattern-not: 'URL(string: "http://172.23....")'
      - pattern-not: 'URL(string: "http://172.24....")'
      - pattern-not: 'URL(string: "http://172.25....")'
      - pattern-not: 'URL(string: "http://172.26....")'
      - pattern-not: 'URL(string: "http://172.27....")'
      - pattern-not: 'URL(string: "http://172.28....")'
      - pattern-not: 'URL(string: "http://172.29....")'
      - pattern-not: 'URL(string: "http://172.30....")'
      - pattern-not: 'URL(string: "http://172.31....")'

      # ========== EXCLUDE TEST DOMAINS ==========
      - pattern-not: 'URL(string: "http://example.com...")'
      - pattern-not: 'URL(string: "http://example.org...")'
      - pattern-not: 'URL(string: "http://test...")'
      - pattern-not: 'URL(string: "http://mock...")'
      - pattern-not: 'URL(string: "http://httpbin.org...")'

      # ========== EXCLUDE TEST CODE ==========
      - pattern-not-inside: |
          func test$ANYTHING(...) { ... }
      - pattern-not-inside: |
          class $CLASSTests: XCTestCase { ... }
      - pattern-not-inside: |
          class $CLASSTests: QuickSpec { ... }

      # ========== EXCLUDE SWIFTUI PREVIEWS ==========
      - pattern-not-inside: |
          struct $NAME_Previews: PreviewProvider { ... }

      # ========== EXCLUDE DEBUG BUILDS ==========
      - pattern-not-inside: |
          #if DEBUG
          ...
          #endif
      - pattern-not-inside: |
          #if DEBUG || DEVELOPMENT
          ...
          #endif

      # ========== EXCLUDE MOCK IMPLEMENTATIONS ==========
      - pattern-not-inside: |
          class Mock$CLASS { ... }
      - pattern-not-inside: |
          class Stub$CLASS { ... }

    message: |
      Cleartext HTTP URL detected (MASVS-NETWORK).

      CONTEXT-AWARE ANALYSIS:
      This rule excludes localhost, local networks (RFC 1918), test domains, and debug builds.

      FALSE POSITIVE NOTE:
      This warning is safe to ignore if:
      ✓ Connecting to localhost/127.0.0.1 (development)
      ✓ Connecting to local network (10.x, 192.168.x, 172.16-31.x)
      ✓ This is test code
      ✓ Using test domains (example.com, httpbin.org)
      ✓ This code is in #if DEBUG block

      ISSUE:
      Transmitting data over HTTP exposes it to:
      - Interception (man-in-the-middle attacks)
      - Tampering (data modification)
      - Eavesdropping (credential theft)
      - Session hijacking

      VULNERABLE EXAMPLE:
      ```swift
      // INSECURE - Production API over HTTP
      let url = URL(string: "http://api.example.com/users")!  // ❌
      URLSession.shared.dataTask(with: url) { ... }
      ```

      SECURE FIXES:
      ```swift
      // Option 1: Use HTTPS (REQUIRED for production)
      let url = URL(string: "https://api.example.com/users")!  // ✅
      URLSession.shared.dataTask(with: url) { ... }

      // Option 2: Environment-based URLs
      #if DEBUG
      let baseURL = "http://localhost:3000"  // ✅ OK for development
      #else
      let baseURL = "https://api.example.com"  // ✅ HTTPS for production
      #endif

      // Option 3: Configuration-based
      struct APIConfig {
          static var baseURL: String {
              #if DEBUG
              return "http://10.0.3.2:8080"  // ✅ Local network for development
              #else
              return "https://api.example.com"  // ✅ HTTPS for production
              #endif
          }
      }
      ```

      APP TRANSPORT SECURITY (ATS):
      iOS 9+ blocks HTTP by default. To allow HTTP (not recommended):

      ```xml
      <!-- Info.plist - ONLY for development -->
      <key>NSAppTransportSecurity</key>
      <dict>
          <!-- Option 1: Allow specific domains (better) -->
          <key>NSExceptionDomains</key>
          <dict>
              <key>localhost</key>
              <dict>
                  <key>NSExceptionAllowsInsecureHTTPLoads</key>
                  <true/>
              </dict>
          </dict>

          <!-- Option 2: Allow all HTTP (DO NOT USE IN PRODUCTION) -->
          <key>NSAllowsArbitraryLoads</key>
          <true/>
      </dict>
      ```

      MIGRATION CHECKLIST:
      1. ✓ Use HTTPS for all production endpoints
      2. ✓ Implement certificate pinning (critical APIs)
      3. ✓ Use #if DEBUG for development HTTP
      4. ✓ Remove ATS exceptions before release
      5. ✓ Test with Charles Proxy to verify HTTPS

      Reference: https://mas.owasp.org/MASTG/tests/ios/MASVS-NETWORK/MASTG-TEST-0065/

    severity: ERROR
    languages:
      - swift
    metadata:
      category: security
      cwe: "CWE-319: Cleartext Transmission of Sensitive Information"
      owasp-mobile-2024: "M5: Insecure Communication"
      mastg-test: "MASTG-TEST-0065"
      masvs: "MASVS-NETWORK-1"
      confidence: HIGH
      false_positive_reduction: "Phase 2 - Local network/test/debug exclusions"
      estimated_fp_rate_before: "25%"
      estimated_fp_rate_after: "<8%"

  - id: mastg-ios-http-url-objc-improved
    patterns:
      - pattern-either:
          - pattern: '[NSURL URLWithString:@"http://..."]'
          - pattern: '[[NSURL alloc] initWithString:@"http://..."]'

      - pattern-not: '[NSURL URLWithString:@"http://localhost..."]'
      - pattern-not: '[NSURL URLWithString:@"http://127.0.0.1..."]'

      # ========== EXCLUDE LOCAL NETWORK ==========
      - pattern-not: '[NSURL URLWithString:@"http://10...."]'
      - pattern-not: '[NSURL URLWithString:@"http://192.168...."]'

      # ========== EXCLUDE TEST DOMAINS ==========
      - pattern-not: '[NSURL URLWithString:@"http://example.com..."]'
      - pattern-not: '[NSURL URLWithString:@"http://test..."]'

    message: |
      Cleartext HTTP URL detected (MASVS-NETWORK).
      Transmitting data over HTTP exposes it to interception and tampering.
      Use HTTPS for all network communications.

      See Swift version of this rule for detailed guidance.

    severity: ERROR
    languages:
      - objc
    metadata:
      category: security
      cwe: "CWE-319: Cleartext Transmission of Sensitive Information"
      mastg-test: "MASTG-TEST-0065"
      masvs: "MASVS-NETWORK-1"
      confidence: HIGH
      false_positive_reduction: "Phase 2 - Local network/test exclusions"
