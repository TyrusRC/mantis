rules:
  # =============================================================================
  # IMPROVED: iOS Logging Security (Phase 2 False Positive Fixes)
  # =============================================================================
  #
  # IMPROVEMENTS OVER ORIGINAL:
  # 1. Excludes test code (XCTest, Quick/Nimble)
  # 2. Excludes SwiftUI previews
  # 3. Excludes debug builds (#if DEBUG)
  # 4. Excludes error messages (not actual sensitive data)
  # 5. Excludes playground code
  # 6. Excludes documentation examples
  #
  # EXPECTED FALSE POSITIVE REDUCTION: 40% → <10%
  # =============================================================================

  - id: mastg-test-0053-nslog-sensitive-data-improved
    patterns:
      - pattern-either:
          - pattern: |
              NSLog("%@", $DATA)
          - pattern: |
              NSLog($FORMAT, $DATA)
          - pattern: |
              print($DATA)
          - pattern: |
              debugPrint($DATA)
      - metavariable-regex:
          metavariable: $DATA
          regex: (?i).*(password|token|secret|key|pin|auth|credit.*card|ssn|api.*key|bearer|session).*

      # ========== EXCLUDE TEST CODE ==========
      - pattern-not-inside: |
          func test$ANYTHING(...) { ... }
      - pattern-not-inside: |
          func test$ANYTHING(...) async { ... }
      - pattern-not-inside: |
          class $CLASSTests: XCTestCase { ... }
      - pattern-not-inside: |
          class $CLASSTests: QuickSpec { ... }
      - pattern-not-inside: |
          override func spec() { ... }

      # ========== EXCLUDE SWIFTUI PREVIEWS ==========
      - pattern-not-inside: |
          struct $NAME_Previews: PreviewProvider {
            static var previews: some View {
              ...
            }
          }
      - pattern-not-inside: |
          static var previews: some View { ... }

      # ========== EXCLUDE DEBUG BUILDS ==========
      - pattern-not-inside: |
          #if DEBUG
          ...
          #endif
      - pattern-not-inside: |
          #if DEVELOPMENT
          ...
          #endif
      - pattern-not-inside: |
          #if DEBUG || DEVELOPMENT
          ...
          #endif

      # ========== EXCLUDE ERROR MESSAGES ==========
      # These log about errors, not actual sensitive data
      - pattern-not: print("Failed to ...")
      - pattern-not: print("Error ...")
      - pattern-not: NSLog("Failed to ...")
      - pattern-not: NSLog("Error ...")
      - pattern-not: print("... validation failed")
      - pattern-not: print("... expired")
      - pattern-not: print("... refreshing")
      - pattern-not: print("... configured")

      # ========== EXCLUDE PLAYGROUND CODE ==========
      - pattern-not-inside: |
          // Playground
          ...
      - pattern-not-inside: |
          //: Playground
          ...

      # ========== EXCLUDE DOCUMENTATION EXAMPLES ==========
      - pattern-not-inside: |
          /// Example:
          /// ```
          ...
          /// ```

    message: |
      Sensitive data in logs (MASTG-TEST-0053).

      CONTEXT-AWARE ANALYSIS:
      This rule excludes test code, SwiftUI previews, DEBUG builds, and error messages.

      FALSE POSITIVE NOTE:
      This warning is safe to ignore if:
      ✓ This is test code (XCTest, Quick/Nimble)
      ✓ This is a SwiftUI preview
      ✓ This code is in a #if DEBUG block
      ✓ You're logging error messages (not actual data)
      ✓ This is playground/example code

      ISSUE:
      NSLog and print() output to system logs which:
      - Persist on the device (even after app deletion)
      - Are accessible via Console.app
      - Can be extracted from device backups
      - May be visible to other apps (on jailbroken devices)
      - Are included in crash reports

      VULNERABLE EXAMPLES:
      ```swift
      // INSECURE - Actual sensitive data
      print("User password: \(password)")  // ❌ Password logged
      NSLog("Auth token: %@", authToken)   // ❌ Token logged
      print("API key: \(apiKey)")          // ❌ Key logged
      ```

      SECURE FIXES:
      ```swift
      // Option 1: Remove logging in production
      #if DEBUG
      print("Debug password: \(password)")  // ✅ Only in debug builds
      #endif

      // Option 2: Use os_log with privacy
      import os.log
      os_log("%{private}@", log: .default, type: .debug, password)  // ✅ Private

      // Option 3: Log metadata, not data
      print("Password validation failed")  // ✅ No actual password
      print("Token expires in 3600s")      // ✅ No actual token
      ```

      BEST PRACTICES:
      1. Never log passwords, tokens, API keys, PII
      2. Use #if DEBUG for development logging
      3. Use os_log with %{private} for sensitive data
      4. Log events, not data: "Authentication successful" not "Token: xyz"
      5. Use structured logging with privacy annotations

      SECURE OS_LOG USAGE:
      ```swift
      import os.log

      let logger = Logger(subsystem: "com.app", category: "auth")

      // Public log (visible in system)
      logger.log("User logged in")  // ✅ No sensitive data

      // Private log (redacted in system logs)
      logger.log("Session token: \(token, privacy: .private)")  // ✅ Redacted

      // Custom privacy levels
      logger.log("User ID: \(userId, privacy: .public)")        // Public
      logger.log("Email: \(email, privacy: .private)")          // Private
      logger.log("Hash: \(hash, privacy: .sensitive)")          // Sensitive
      ```

      Reference: https://mas.owasp.org/MASTG/tests/ios/MASVS-STORAGE/MASTG-TEST-0053/

    severity: ERROR
    languages:
      - swift
      - c  # Objective-C uses C language parser
    metadata:
      category: security
      mastg-test: "MASTG-TEST-0053"
      cwe: "CWE-532: Insertion of Sensitive Information into Log File"
      masvs: "MASVS-STORAGE-2"
      owasp-mobile-2024: "M9: Insecure Data Storage"
      confidence: HIGH
      false_positive_reduction: "Phase 2 - Test/preview/debug exclusions"
      estimated_fp_rate_before: "40%"
      estimated_fp_rate_after: "<10%"

  - id: mastg-test-0053-os-log-no-privacy-improved
    patterns:
      - pattern-either:
          - pattern: |
              os_log("%@", $DATA)
          - pattern: |
              Logger().log("$MESSAGE: \($DATA)")
      - pattern-not-inside: |
          os_log("%{private}@", $DATA)
      - metavariable-regex:
          metavariable: $DATA
          regex: (?i).*(password|token|secret|key|pin).*

      # ========== EXCLUDE TEST CODE ==========
      - pattern-not-inside: |
          func test$ANYTHING(...) { ... }
      - pattern-not-inside: |
          class $CLASSTests: XCTestCase { ... }

      # ========== EXCLUDE DEBUG BUILDS ==========
      - pattern-not-inside: |
          #if DEBUG
          ...
          #endif

    message: |
      os_log without privacy annotation (MASTG-TEST-0053).

      ISSUE:
      Logged data is visible in Console.app and system logs without %{private}.

      SECURE FIX:
      ```swift
      // INSECURE
      os_log("%@", log: .default, type: .debug, sensitiveData)  // ❌ Public

      // SECURE
      os_log("%{private}@", log: .default, type: .debug, sensitiveData)  // ✅ Private

      // OR use Logger (Swift 5.3+)
      let logger = Logger(subsystem: "com.app", category: "auth")
      logger.log("\(sensitiveData, privacy: .private)")  // ✅ Private
      ```

    severity: WARNING
    languages:
      - swift
      - c  # Objective-C uses C language parser
    metadata:
      category: security
      mastg-test: "MASTG-TEST-0053"
      cwe: "CWE-532: Insertion of Sensitive Information into Log File"
      masvs: "MASVS-STORAGE-2"
      owasp-mobile-2024: "M9: Insecure Data Storage"
      confidence: MEDIUM
      false_positive_reduction: "Phase 2 - Test/debug exclusions"
