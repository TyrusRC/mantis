  # ============ TYPOSQUATTING DETECTION ============

  - id: ios-dep-suspicious-pod-name
    patterns:
      - pattern-either:
          - pattern: |
              pod '$NAME', $REST
      - metavariable-regex:
          metavariable: $NAME
          regex: .*(Alamofier|AlamoFire|SDWeblmage|Relam|Firebse|Gogle|Snapchat|lnstagram).*
    message: |
      Suspicious pod name - possible typosquatting (OWASP M2: Inadequate Supply Chain Security).

      Risk: CRITICAL
      Impact: Pod name contains common typos that may indicate a malicious
      typosquatting attack.

      Common typosquats:
      - Alamofier/AlamoFire → Alamofire
      - SDWeblmage → SDWebImage
      - Relam → Realm
      - Firebse → Firebase
      - Gogle → Google
      - lnstagram (lowercase L) → Instagram

      Remediation:
      - Verify pod name spelling carefully
      - Check official documentation for correct pod name
      - Review pod publisher and download statistics on CocoaPods.org

      References:
      - https://cocoapods.org
      - https://owasp.org/www-community/attacks/Typosquatting
    severity: ERROR
    languages:
      - ruby
    paths:
      include:
        - "**/Podfile"
    metadata:
      category: security
      cwe: "CWE-1021: Improper Restriction of Rendered UI Layers or Frames"
      owasp-mobile-2024: "M2: Inadequate Supply Chain Security"
      confidence: HIGH

  # ============ PODFILE.LOCK INTEGRITY ============

  - id: ios-dep-podfile-lock-missing
    patterns:
      - pattern: |
          source '$SOURCE'
          ...
          pod '$NAME'
    message: |
      Podfile.lock should be committed to version control (OWASP M2: Inadequate Supply Chain Security).

      Risk: MEDIUM
      Impact: Without Podfile.lock, different developers may get different
      dependency versions, leading to non-reproducible builds and potential
      security inconsistencies.

      Best practices:
      - Commit Podfile.lock to version control
      - Run 'pod install' (not 'pod update') for existing projects
      - Only update pods intentionally with 'pod update <pod_name>'

      References:
      - https://guides.cocoapods.org/using/using-cocoapods.html#should-i-check-the-pods-directory-into-source-control
    severity: INFO
    languages:
      - ruby
    paths:
      include:
        - "**/Podfile"
    metadata:
      category: security
      owasp-mobile-2024: "M2: Inadequate Supply Chain Security"
      confidence: LOW
