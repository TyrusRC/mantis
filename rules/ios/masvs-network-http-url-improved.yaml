rules:
  # MASVS-NETWORK: HTTP URL Detection (iOS) - IMPROVED with FP reduction
  # Based on MASTG-TEST-0065: Testing Data Encryption on the Network
  # Detects cleartext HTTP URLs that should use HTTPS
  #
  # IMPROVEMENTS:
  # - Excludes local network ranges (RFC 1918: 10.x, 192.168.x, 172.16-31.x)
  # - Excludes test/mock domains (test.*, mock.*, example.com/org)
  # - Excludes test code (XCTest, Quick/Nimble)
  # - Excludes SwiftUI previews
  # - Excludes DEBUG/DEVELOPMENT builds
  # - Excludes mock/stub implementations



  - id: mastg-ios-ats-disabled
    patterns:
      - pattern-either:
          - pattern: |
              <key>NSAppTransportSecurity</key>
              <dict>
                <key>NSAllowsArbitraryLoads</key>
                <true/>
              </dict>
    message: |
      App Transport Security (ATS) disabled globally (MASVS-NETWORK).

      Disabling ATS allows insecure HTTP connections and weak TLS configurations.

      RISKS:
      - Allows cleartext HTTP connections to ANY domain
      - Permits weak TLS versions (TLS 1.0, 1.1)
      - Disables certificate validation requirements
      - Exposes ALL network traffic to MITM attacks

      SECURE IMPLEMENTATION:
      Only disable ATS for specific domains if absolutely necessary:

        <key>NSAppTransportSecurity</key>
        <dict>
          <key>NSExceptionDomains</key>
          <dict>
            <key>internal-api.company.local</key>
            <dict>
              <key>NSExceptionAllowsInsecureHTTPLoads</key>
              <true/>
              <key>NSIncludesSubdomains</key>
              <true/>
            </dict>
          </dict>
        </dict>

      NEVER disable ATS globally unless:
      - You are a web browser
      - You have no control over backend infrastructure
      - You understand and accept the security risks

      App Store Review may reject apps with global ATS exemptions.
    severity: ERROR
    languages:
      - xml
    paths:
      include:
        - "**/Info.plist"
    metadata:
      category: security
      cwe: "CWE-319: Cleartext Transmission of Sensitive Information"
      owasp-mobile: "M3: Insecure Communication"
      mastg-test: "MASTG-TEST-0065"
      masvs: "MASVS-NETWORK-1"
      confidence: HIGH

  - id: mastg-ios-weak-tls-version
    patterns:
      - pattern-either:
          - pattern: |
              <key>NSExceptionMinimumTLSVersion</key>
              <string>TLSv1.0</string>
          - pattern: |
              <key>NSExceptionMinimumTLSVersion</key>
              <string>TLSv1.1</string>
    message: |
      Weak TLS version allowed (MASVS-NETWORK).

      TLSv1.0 and TLSv1.1 are deprecated and insecure:
      - TLS 1.0: Deprecated in 2020, vulnerable to BEAST, POODLE
      - TLS 1.1: Deprecated in 2020, lacks modern cipher suites

      SECURE IMPLEMENTATION:
      Use TLSv1.2 or TLSv1.3 as minimum version:

        <key>NSExceptionMinimumTLSVersion</key>
        <string>TLSv1.2</string>

      Or remove this key entirely (defaults to TLS 1.2).

      PCI DSS requires TLS 1.2+ for payment card data.
    severity: ERROR
    languages:
      - xml
    paths:
      include:
        - "**/Info.plist"
    metadata:
      category: security
      cwe: "CWE-326: Inadequate Encryption Strength"
      owasp-mobile: "M3: Insecure Communication"
      mastg-test: "MASTG-TEST-0065"
      masvs: "MASVS-NETWORK-1"
      confidence: HIGH

  - id: mastg-ios-webview-ats-exception
    patterns:
      - pattern-either:
          - pattern: |
              <key>NSExceptionAllowsInsecureHTTPLoads</key>
              <true/>
    message: |
      ATS exception allowing insecure HTTP loads (MASVS-NETWORK).

      Allowing insecure HTTP for specific domains should be avoided.
      Use HTTPS for all connections.

      WHEN ACCEPTABLE:
      - Legacy internal APIs (document and time-bound)
      - Third-party services without HTTPS (migrate ASAP)
      - Development/staging servers (use separate build configs)

      SECURE APPROACH:
      Upgrade backend to HTTPS instead of weakening client security.
    severity: WARNING
    languages:
      - xml
    paths:
      include:
        - "**/Info.plist"
    metadata:
      category: security
      cwe: "CWE-319: Cleartext Transmission of Sensitive Information"
      mastg-test: "MASTG-TEST-0065"
      masvs: "MASVS-NETWORK-1"
      confidence: HIGH
