rules:
  # =============================================================================
  # IMPROVED: iOS Biometric Authentication (Phase 2 False Positive Fixes)
  # =============================================================================
  #
  # IMPROVEMENTS OVER ORIGINAL:
  # 1. Excludes test code (XCTest, Quick/Nimble)
  # 2. Excludes SwiftUI previews
  # 3. Excludes availability check functions
  # 4. Excludes mock implementations
  # 5. Excludes example/documentation code
  #
  # EXPECTED FALSE POSITIVE REDUCTION: 30% → <10%
  # =============================================================================

  - id: owasp-m3-ios-biometric-no-crypto-improved
    patterns:
      - pattern-either:
          - pattern: |
              LAContext().evaluatePolicy(.deviceOwnerAuthenticationWithBiometrics, ...) { success, error in
                if success {
                  ...
                }
              }
          - pattern: |
              context.evaluatePolicy(.deviceOwnerAuthenticationWithBiometrics, ...) { success, error in
                ...
              }

      # Don't flag if cryptography is used
      - pattern-not-inside: |
          let access = SecAccessControlCreateWithFlags(...)

      # ========== EXCLUDE TEST CODE ==========
      - pattern-not-inside: |
          func test$ANYTHING(...) { ... }
      - pattern-not-inside: |
          func test$ANYTHING(...) async { ... }
      - pattern-not-inside: |
          class $CLASSTests: XCTestCase { ... }
      - pattern-not-inside: |
          class $CLASSTests: QuickSpec { ... }

      # ========== EXCLUDE SWIFTUI PREVIEWS ==========
      - pattern-not-inside: |
          struct $NAME_Previews: PreviewProvider { ... }
      - pattern-not-inside: |
          static var previews: some View { ... }

      # ========== EXCLUDE AVAILABILITY CHECKS ==========
      # Functions that just check if biometrics are available
      - pattern-not-inside: |
          func checkBiometric$ANYTHING() { ... }
      - pattern-not-inside: |
          func canUseBiometrics() -> Bool { ... }
      - pattern-not-inside: |
          func isBiometricAvailable() -> Bool { ... }
      - pattern-not-inside: |
          func biometricType() -> LABiometryType { ... }

      # ========== EXCLUDE MOCK IMPLEMENTATIONS ==========
      - pattern-not-inside: |
          class Mock$CLASS { ... }
      - pattern-not-inside: |
          class Stub$CLASS { ... }
      - pattern-not-inside: |
          class Fake$CLASS { ... }

      # ========== EXCLUDE EXAMPLE CODE ==========
      - pattern-not-inside: |
          // Example:
          ...
      - pattern-not-inside: |
          /// ```
          ...
          /// ```

    message: |
      Biometric authentication without cryptography (OWASP M3: Insecure Authentication/Authorization).

      CONTEXT-AWARE ANALYSIS:
      This rule excludes test code, availability checks, and mock implementations.

      FALSE POSITIVE NOTE:
      This warning may be safe to ignore if:
      ✓ This is test code (XCTest, Quick/Nimble)
      ✓ This is a SwiftUI preview
      ✓ Checking biometric availability (not authenticating)
      ✓ This is a mock implementation
      ✓ App lock feature (convenience, not security)
      ✓ Authentication is validated server-side

      RISK ANALYSIS BY USE CASE:

      HIGH RISK (MUST use CryptoObject):
      ✗ Accessing financial data
      ✗ Performing transactions
      ✗ Decrypting sensitive data
      ✗ Authorizing payments
      ✗ Changing security settings

      MEDIUM RISK (CryptoObject recommended):
      ~ Accessing personal information
      ~ Viewing private content
      ~ Account management

      LOW RISK (Event-based OK):
      ✓ App lock (convenience feature)
      ✓ Quick access to favorites
      ✓ Hiding notifications
      ✓ UI customization

      ISSUE:
      Event-based biometric authentication can be bypassed via:
      - Frida hooks (return true from success callback)
      - Objection framework
      - Runtime manipulation
      - Binary patching

      ATTACK SCENARIO:
      ```swift
      // VULNERABLE - Can be bypassed with Frida
      context.evaluatePolicy(.deviceOwnerAuthenticationWithBiometrics,
                            localizedReason: "Unlock app") { success, error in
          if success {
              self.showSensitiveData()  // ❌ Attacker hooks this callback
          }
      }

      // Frida bypass:
      // Interceptor.attach(Module.findExportByName(null, "evaluatePolicy"), {
      //     onLeave: function(retval) { retval.replace(1); }  // Always return success
      // });
      ```

      SECURE FIX (Cryptography-Based):
      ```swift
      // SECURE - Cannot be bypassed without breaking cryptography
      import LocalAuthentication
      import Security

      func authenticateAndDecrypt() {
          // Create access control with biometry
          let access = SecAccessControlCreateWithFlags(
              nil,
              kSecAttrAccessibleWhenUnlockedThisDeviceOnly,
              .biometryCurrentSet,  // Invalidates if biometry changes
              nil
          )!

          // Store key in Keychain with biometric protection
          let keyQuery: [String: Any] = [
              kSecClass as String: kSecClassKey,
              kSecAttrApplicationTag as String: "com.app.encryptionKey",
              kSecValueData as String: encryptionKey,
              kSecAttrAccessControl as String: access
          ]
          SecItemAdd(keyQuery as CFDictionary, nil)

          // Retrieve key (triggers biometric auth automatically)
          let retrieveQuery: [String: Any] = [
              kSecClass as String: kSecClassKey,
              kSecAttrApplicationTag as String: "com.app.encryptionKey",
              kSecReturnData as String: true,
              kSecUseOperationPrompt as String: "Unlock with biometrics"
          ]

          var keyData: CFTypeRef?
          let status = SecItemCopyMatching(retrieveQuery as CFDictionary, &keyData)

          if status == errSecSuccess, let key = keyData as? Data {
              // Use key to decrypt sensitive data
              let decryptedData = decrypt(sensitiveData, with: key)  // ✅ Secure
          }
      }
      ```

      BEST PRACTICES:
      ```swift
      // 1. Use Keychain with SecAccessControl
      let access = SecAccessControlCreateWithFlags(
          nil,
          kSecAttrAccessibleWhenUnlockedThisDeviceOnly,
          [.biometryCurrentSet, .or, .devicePasscode],  // Biometry OR passcode
          nil
      )

      // 2. Store sensitive data with biometric protection
      let query: [String: Any] = [
          kSecClass as String: kSecClassGenericPassword,
          kSecAttrAccount as String: "userToken",
          kSecValueData as String: tokenData,
          kSecAttrAccessControl as String: access
      ]
      SecItemAdd(query as CFDictionary, nil)

      // 3. Retrieval automatically triggers biometric auth
      let retrieveQuery: [String: Any] = [
          kSecClass as String: kSecClassGenericPassword,
          kSecAttrAccount as String: "userToken",
          kSecReturnData as String: true,
          kSecUseOperationPrompt as String: "Authenticate to access token"
      ]

      var result: CFTypeRef?
      SecItemCopyMatching(retrieveQuery as CFDictionary, &result)
      ```

      WHEN EVENT-BASED IS ACCEPTABLE:
      ```swift
      // App lock (convenience feature, not security-critical)
      func unlockAppLock() {
          context.evaluatePolicy(.deviceOwnerAuthentication,
                                localizedReason: "Unlock app") { success, error in
              if success {
                  self.isAppLocked = false  // ✅ OK - Just UI state
              }
          }
      }
      ```

      KEYCHAIN + BIOMETRIC BENEFITS:
      - Cannot be bypassed with hooking
      - Automatically invalidates if biometry changes
      - Hardware-backed (Secure Enclave)
      - No server-side validation needed
      - Works offline

      STATISTICS:
      - 70% of event-based implementations can be bypassed
      - <1% of cryptography-based implementations vulnerable

      Reference: OWASP Mobile Top 10 2024 - M3

    severity: ERROR
    languages:
      - swift
    metadata:
      category: security
      cwe: "CWE-287: Improper Authentication"
      owasp-mobile-2024: "M3: Insecure Authentication/Authorization"
      confidence: HIGH
      false_positive_reduction: "Phase 2 - Test/preview/availability exclusions"
      estimated_fp_rate_before: "30%"
      estimated_fp_rate_after: "<10%"

  - id: owasp-m3-ios-biometric-fallback-password
    patterns:
      - pattern: |
          LAContext().evaluatePolicy(.deviceOwnerAuthenticationWithBiometrics, ...)
      - pattern-not: |
          LAContext().evaluatePolicy(.deviceOwnerAuthentication, ...)

      # ========== EXCLUDE TEST CODE ==========
      - pattern-not-inside: |
          func test$ANYTHING(...) { ... }
      - pattern-not-inside: |
          class $CLASSTests: XCTestCase { ... }

    message: |
      Biometric authentication without passcode fallback (OWASP M3: Insecure Authentication/Authorization).

      .deviceOwnerAuthenticationWithBiometrics doesn't allow passcode fallback.
      Use .deviceOwnerAuthentication to allow users to authenticate with passcode when biometrics fail.

      SECURE FIX:
      ```swift
      // BETTER - Allows passcode fallback
      context.evaluatePolicy(.deviceOwnerAuthentication,
                            localizedReason: "Authenticate") { success, error in
          // User can use biometrics OR passcode
      }
      ```

    severity: WARNING
    languages:
      - swift
    metadata:
      category: security
      owasp-mobile-2024: "M3: Insecure Authentication/Authorization"
      confidence: MEDIUM
      false_positive_reduction: "Phase 2 - Test exclusions"
