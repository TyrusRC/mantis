rules:
  # Flutter OWASP M8: Security Misconfiguration Detection Rules
  # Covers Android Manifest, iOS Info.plist, pubspec.yaml, and build configurations
  # Sources: OWASP Mobile Top 10 2024, Flutter Security Best Practices
  # Focus: Platform-specific security misconfigurations in Flutter applications

  # ============ ANDROID MANIFEST MISCONFIGURATIONS ============

  - id: flutter-android-debuggable-release
    patterns:
      - pattern: |
          <application
            ...
            android:debuggable="true"
            ...
          />
    message: |
      Debuggable flag enabled in Flutter app (OWASP M8 - Critical).
      Debug mode in production allows attackers to inspect app behavior,
      extract sensitive data, and manipulate runtime state.

      SECURITY IMPACT:
      - Enables ADB debugging without user permission
      - Allows runtime inspection and memory dumps
      - Bypasses security controls
      - Exposes internal app logic
      - Google Play may reject app

      VULNERABLE CONFIGURATION:
      ```xml
      <!-- AndroidManifest.xml -->
      <application
          android:debuggable="true"
          android:label="@string/app_name">
      </application>
      ```

      SECURE FIX:
      ```xml
      <!-- Remove debuggable flag - Gradle controls this -->
      <application
          android:label="@string/app_name">
      </application>
      ```

      ```gradle
      // android/app/build.gradle
      android {
          buildTypes {
              release {
                  debuggable false
                  minifyEnabled true
                  shrinkResources true
              }
              debug {
                  debuggable true
                  applicationIdSuffix ".debug"
              }
          }
      }
      ```

      VERIFICATION:
      ```bash
      # Check APK
      aapt dump badging app-release.apk | grep debuggable
      # Should return nothing for release builds
      ```

      Reference: OWASP M8, MASVS-RESILIENCE-2
    severity: ERROR
    languages:
      - xml
    paths:
      include:
        - "**/AndroidManifest.xml"
    metadata:
      category: security
      cwe: "CWE-489: Active Debug Code"
      owasp-mobile-2024: "M8: Security Misconfiguration"
      masvs: "MASVS-RESILIENCE-2"
      confidence: VERY_HIGH

  - id: flutter-android-backup-enabled
    patterns:
      - pattern: |
          <application
            ...
            android:allowBackup="true"
            ...
          />
      - pattern-not-inside: |
          <application
            ...
            android:fullBackupContent="@xml/backup_rules"
            ...
          />
    message: |
      Unrestricted backup allowed in Flutter app (OWASP M8).
      Android Auto Backup can expose sensitive data through ADB or cloud backup.

      SECURITY RISKS:
      - Shared preferences backed up (may contain tokens/keys)
      - Database files exposed
      - Internal storage files accessible
      - No encryption for backup data
      - Accessible via ADB even on non-rooted devices

      VULNERABLE CONFIGURATION:
      ```xml
      <!-- AndroidManifest.xml -->
      <application
          android:allowBackup="true">
      </application>
      ```

      ATTACK SCENARIO:
      ```bash
      # Attacker with physical access or ADB
      adb backup -f backup.ab com.example.app
      dd if=backup.ab bs=24 skip=1 | openssl zlib -d > backup.tar
      tar -xvf backup.tar
      # Extract shared_prefs, databases, files
      ```

      SECURE FIX - Option 1 (Disable Backup):
      ```xml
      <application
          android:allowBackup="false">
      </application>
      ```

      SECURE FIX - Option 2 (Controlled Backup):
      ```xml
      <application
          android:allowBackup="true"
          android:fullBackupContent="@xml/backup_rules"
          android:dataExtractionRules="@xml/data_extraction_rules">
      </application>
      ```

      ```xml
      <!-- res/xml/backup_rules.xml -->
      <?xml version="1.0" encoding="utf-8"?>
      <full-backup-content>
          <!-- Exclude sensitive directories -->
          <exclude domain="sharedpref" path="secure_prefs.xml"/>
          <exclude domain="database" path="sensitive.db"/>
          <exclude domain="file" path="keys/"/>

          <!-- Include only safe data -->
          <include domain="file" path="user_preferences/"/>
      </full-backup-content>
      ```

      ```xml
      <!-- res/xml/data_extraction_rules.xml (Android 12+) -->
      <?xml version="1.0" encoding="utf-8"?>
      <data-extraction-rules>
          <cloud-backup>
              <exclude domain="sharedpref" path="secure_prefs.xml"/>
              <exclude domain="database"/>
          </cloud-backup>
          <device-transfer>
              <exclude domain="sharedpref" path="secure_prefs.xml"/>
          </device-transfer>
      </data-extraction-rules>
      ```

      FLUTTER SECURE STORAGE:
      ```dart
      // Use flutter_secure_storage - automatically excluded from backup
      import 'package:flutter_secure_storage/flutter_secure_storage.dart';

      final storage = FlutterSecureStorage();
      await storage.write(key: 'auth_token', value: token);
      ```

      Reference: OWASP M8, MASVS-STORAGE-2
    severity: WARNING
    languages:
      - xml
    paths:
      include:
        - "**/AndroidManifest.xml"
    metadata:
      category: security
      cwe: "CWE-530: Exposure of Backup File to Unauthorized Control Sphere"
      owasp-mobile-2024: "M8: Security Misconfiguration"
      masvs: "MASVS-STORAGE-2"
      confidence: HIGH

  - id: flutter-android-cleartext-traffic
    patterns:
      - pattern: |
          <application
            ...
            android:usesCleartextTraffic="true"
            ...
          />
      - pattern-not-inside: |
          <application
            ...
            android:networkSecurityConfig="@xml/network_security_config"
            ...
          />
    message: |
      Cleartext HTTP traffic permitted in Flutter app (OWASP M8 - Critical).
      Allowing HTTP enables man-in-the-middle attacks on network communication.

      SECURITY IMPACT:
      - HTTP requests/responses intercepted
      - Credentials stolen
      - API tokens compromised
      - Data manipulation
      - Session hijacking

      VULNERABLE CONFIGURATION:
      ```xml
      <!-- AndroidManifest.xml -->
      <application
          android:usesCleartextTraffic="true">
      </application>
      ```

      SECURE FIX:
      ```xml
      <!-- Remove cleartext flag -->
      <application
          android:networkSecurityConfig="@xml/network_security_config">
      </application>
      ```

      ```xml
      <!-- res/xml/network_security_config.xml -->
      <?xml version="1.0" encoding="utf-8"?>
      <network-security-config>
          <!-- Block all HTTP by default -->
          <base-config cleartextTrafficPermitted="false">
              <trust-anchors>
                  <certificates src="system" />
              </trust-anchors>
          </base-config>

          <!-- Development only: Allow localhost -->
          <domain-config cleartextTrafficPermitted="true">
              <domain includeSubdomains="true">localhost</domain>
              <domain includeSubdomains="true">10.0.2.2</domain>
          </domain-config>

          <!-- Certificate pinning for production -->
          <domain-config>
              <domain includeSubdomains="true">api.example.com</domain>
              <pin-set expiration="2025-12-31">
                  <pin digest="SHA-256">base64==</pin>
                  <pin digest="SHA-256">backup-base64==</pin>
              </pin-set>
          </domain-config>
      </network-security-config>
      ```

      FLUTTER IMPLEMENTATION:
      ```dart
      import 'package:http/http.dart' as http;
      import 'dart:io';

      class SecureHttpClient {
        static const String baseUrl = 'https://api.example.com';

        static Future<http.Response> get(String endpoint) async {
          final url = Uri.parse('$baseUrl$endpoint');

          // Enforce HTTPS
          if (url.scheme != 'https') {
            throw SecurityException('Only HTTPS is allowed');
          }

          return await http.get(url);
        }
      }
      ```

      Reference: OWASP M5, M8, MASVS-NETWORK-1
    severity: ERROR
    languages:
      - xml
    paths:
      include:
        - "**/AndroidManifest.xml"
    metadata:
      category: security
      cwe: "CWE-319: Cleartext Transmission of Sensitive Information"
      owasp-mobile-2024: "M8: Security Misconfiguration"
      masvs: "MASVS-NETWORK-1"
      confidence: VERY_HIGH

  - id: flutter-android-exported-component-no-permission
    patterns:
      - pattern-either:
          - pattern: |
              <activity
                ...
                android:exported="true"
                ...
              />
          - pattern: |
              <service
                ...
                android:exported="true"
                ...
              />
          - pattern: |
              <receiver
                ...
                android:exported="true"
                ...
              />
      - pattern-not-inside: |
              android:permission="..."
      - pattern-not-inside: |
          <intent-filter>
            ...
            <action android:name="android.intent.action.MAIN" />
            <category android:name="android.intent.category.LAUNCHER" />
            ...
          </intent-filter>
    message: |
      Exported component without permission protection (OWASP M8).
      Exported components are accessible to all apps without restrictions.

      SECURITY RISKS:
      - Any app can send intents to component
      - Intent injection attacks
      - Unauthorized access to functionality
      - Data leakage through intents

      VULNERABLE PATTERNS:
      ```xml
      <!-- Activity exposed without protection -->
      <activity
          android:name=".PaymentActivity"
          android:exported="true" />

      <!-- Service accessible to all apps -->
      <service
          android:name=".DataSyncService"
          android:exported="true" />

      <!-- Receiver accepts broadcasts from any app -->
      <receiver
          android:name=".NotificationReceiver"
          android:exported="true" />
      ```

      SECURE FIX - Option 1 (Disable Export):
      ```xml
      <!-- Most secure: Don't export if not needed -->
      <activity
          android:name=".PaymentActivity"
          android:exported="false" />
      ```

      SECURE FIX - Option 2 (Add Permission):
      ```xml
      <!-- Define custom permission -->
      <permission
          android:name="com.example.app.permission.PAYMENT_ACCESS"
          android:protectionLevel="signature" />

      <!-- Protect component -->
      <activity
          android:name=".PaymentActivity"
          android:exported="true"
          android:permission="com.example.app.permission.PAYMENT_ACCESS" />
      ```

      SECURE FIX - Option 3 (Intent Validation):
      ```dart
      // Validate intent in Flutter
      import 'package:flutter/services.dart';

      class SecureActivity extends StatefulWidget {
        @override
        void initState() {
          super.initState();
          _validateIntent();
        }

        Future<void> _validateIntent() async {
          const platform = MethodChannel('com.example.app/intent');

          try {
            final String? caller = await platform.invokeMethod('getCaller');

            // Verify calling package
            if (caller != 'com.example.trusted.app') {
              throw SecurityException('Unauthorized caller: $caller');
            }

            // Validate intent data
            final Map data = await platform.invokeMethod('getIntentData');
            if (!_isValidIntentData(data)) {
              throw SecurityException('Invalid intent data');
            }
          } catch (e) {
            Navigator.of(context).pop();
          }
        }

        bool _isValidIntentData(Map data) {
          // Implement validation logic
          return data.containsKey('signature') &&
                 _verifySignature(data['signature']);
        }
      }
      ```

      ANDROID 12+ REQUIREMENT:
      Android 12+ requires explicit android:exported declaration.
      Set to false unless component must be accessible externally.

      Reference: OWASP M8, MASVS-PLATFORM-1, CWE-926
    severity: WARNING
    languages:
      - xml
    paths:
      include:
        - "**/AndroidManifest.xml"
    metadata:
      category: security
      cwe: "CWE-926: Improper Export of Android Application Components"
      owasp-mobile-2024: "M8: Security Misconfiguration"
      masvs: "MASVS-PLATFORM-1"
      confidence: HIGH

  - id: flutter-android-deep-link-no-verification
    patterns:
      - pattern: |
          <intent-filter>
            ...
            <data android:scheme="$SCHEME" />
            ...
          </intent-filter>
      - pattern-not: |
          <intent-filter android:autoVerify="true">
            ...
          </intent-filter>
      - metavariable-regex:
          metavariable: $SCHEME
          regex: ^(?!https?).*$
    message: |
      Flutter deep link without App Links verification (OWASP M8).
      Custom URL schemes can be hijacked by malicious apps.

      SECURITY RISKS:
      - Multiple apps can register same custom scheme
      - No verification of scheme ownership
      - Phishing via scheme hijacking
      - Intent redirection attacks
      - Credential theft

      VULNERABLE CONFIGURATION:
      ```xml
      <!-- Custom scheme - INSECURE -->
      <intent-filter>
          <action android:name="android.intent.action.VIEW" />
          <category android:name="android.intent.category.DEFAULT" />
          <category android:name="android.intent.category.BROWSABLE" />
          <data android:scheme="myapp" />
      </intent-filter>
      ```

      ATTACK SCENARIO:
      1. Malicious app registers same custom scheme
      2. User clicks myapp:// link
      3. Android shows app chooser or picks malicious app
      4. Credentials/tokens sent to wrong app

      SECURE FIX - Use Android App Links:
      ```xml
      <!-- App Links with domain verification -->
      <intent-filter android:autoVerify="true">
          <action android:name="android.intent.action.VIEW" />
          <category android:name="android.intent.category.DEFAULT" />
          <category android:name="android.intent.category.BROWSABLE" />
          <data
              android:scheme="https"
              android:host="example.com"
              android:pathPrefix="/app" />
      </intent-filter>
      ```

      DIGITAL ASSET LINKS:
      ```json
      // https://example.com/.well-known/assetlinks.json
      [{
        "relation": ["delegate_permission/common.handle_all_urls"],
        "target": {
          "namespace": "android_app",
          "package_name": "com.example.app",
          "sha256_cert_fingerprints": [
            "14:6D:E9:83:C5:73:06:50:D8:EE:B9:95:2F:34:FC:64:16:A0:83:42:E6:1D:BE:A8:8A:04:96:B2:3F:CF:44:E5"
          ]
        }
      }]
      ```

      FLUTTER IMPLEMENTATION:
      ```dart
      import 'package:uni_links/uni_links.dart';

      class DeepLinkHandler {
        static const List<String> _trustedHosts = [
          'example.com',
          'www.example.com',
        ];

        Future<void> handleDeepLink(Uri? uri) async {
          if (uri == null) return;

          // Validate scheme
          if (uri.scheme != 'https') {
            throw SecurityException('Only HTTPS deep links allowed');
          }

          // Validate host
          if (!_trustedHosts.contains(uri.host)) {
            throw SecurityException('Untrusted host: ${uri.host}');
          }

          // Validate path and parameters
          if (!_isValidPath(uri.path)) {
            throw SecurityException('Invalid path: ${uri.path}');
          }

          // Process validated link
          _processDeepLink(uri);
        }

        bool _isValidPath(String path) {
          // Whitelist allowed paths
          final allowedPaths = ['/app/login', '/app/payment', '/app/profile'];
          return allowedPaths.any((allowed) => path.startsWith(allowed));
        }

        void _processDeepLink(Uri uri) {
          // Handle validated deep link
          switch (uri.path) {
            case '/app/login':
              _handleLogin(uri.queryParameters);
              break;
            case '/app/payment':
              _handlePayment(uri.queryParameters);
              break;
            default:
              print('Unknown deep link: ${uri.path}');
          }
        }
      }

      // Usage
      void main() async {
        final initialUri = await getInitialUri();
        final handler = DeepLinkHandler();
        await handler.handleDeepLink(initialUri);

        uriLinkStream.listen((Uri? uri) {
          handler.handleDeepLink(uri);
        });

        runApp(MyApp());
      }
      ```

      MIGRATION FROM CUSTOM SCHEMES:
      ```xml
      <!-- Keep custom scheme for backward compatibility -->
      <intent-filter>
          <data android:scheme="myapp" />
      </intent-filter>

      <!-- Add App Links for security -->
      <intent-filter android:autoVerify="true">
          <data android:scheme="https" android:host="example.com" />
      </intent-filter>
      ```

      ```dart
      // Handle both schemes with validation
      Future<void> handleLink(Uri uri) async {
        if (uri.scheme == 'myapp') {
          print('WARNING: Custom scheme used (legacy)');
          // Add extra validation for custom schemes
          if (!await _validateCustomSchemeIntent()) {
            throw SecurityException('Custom scheme validation failed');
          }
        }
        // Process link
      }
      ```

      Reference: OWASP M8, MASVS-PLATFORM-2, CWE-939
    severity: WARNING
    languages:
      - xml
    paths:
      include:
        - "**/AndroidManifest.xml"
    metadata:
      category: security
      cwe: "CWE-939: Improper Authorization in Handler for Custom URL Scheme"
      owasp-mobile-2024: "M8: Security Misconfiguration"
      masvs: "MASVS-PLATFORM-2"
      confidence: HIGH

  # ============ iOS INFO.PLIST MISCONFIGURATIONS ============

  - id: flutter-ios-ats-disabled
    patterns:
      - pattern: |
          <key>NSAppTransportSecurity</key>
          <dict>
            <key>NSAllowsArbitraryLoads</key>
            <true/>
          </dict>
    message: |
      App Transport Security disabled globally in Flutter iOS app (OWASP M8).
      Disabling ATS allows insecure HTTP connections and weak TLS.

      SECURITY IMPACT:
      - HTTP connections permitted
      - Weak TLS versions accepted
      - Insecure cipher suites allowed
      - Man-in-the-middle attacks enabled
      - App Store rejection risk

      VULNERABLE CONFIGURATION:
      ```xml
      <!-- Info.plist - INSECURE -->
      <key>NSAppTransportSecurity</key>
      <dict>
          <key>NSAllowsArbitraryLoads</key>
          <true/>
      </dict>
      ```

      SECURE FIX - Remove ATS Exception:
      ```xml
      <!-- Info.plist - No ATS configuration = secure defaults -->
      <!-- ATS enabled by default on iOS 9+ -->
      ```

      SECURE FIX - Specific Domain Exception (if needed):
      ```xml
      <key>NSAppTransportSecurity</key>
      <dict>
          <!-- Keep NSAllowsArbitraryLoads as false (or omit) -->
          <key>NSExceptionDomains</key>
          <dict>
              <key>legacy-api.example.com</key>
              <dict>
                  <key>NSExceptionRequiresForwardSecrecy</key>
                  <false/>
                  <key>NSExceptionMinimumTLSVersion</key>
                  <string>TLSv1.2</string>
                  <key>NSIncludesSubdomains</key>
                  <false/>
              </dict>
          </dict>
      </dict>
      ```

      FLUTTER HTTPS ENFORCEMENT:
      ```dart
      import 'package:http/http.dart' as http;

      class SecureIOSClient {
        static Future<http.Response> get(String url) async {
          final uri = Uri.parse(url);

          // Enforce HTTPS
          if (uri.scheme != 'https') {
            throw SecurityException(
              'HTTP not allowed on iOS - ATS enforced'
            );
          }

          return await http.get(uri);
        }
      }
      ```

      ATS REQUIREMENTS:
      - TLS 1.2 or higher
      - Forward secrecy cipher suites
      - Certificates signed by trusted CA
      - At least 2048-bit RSA or 256-bit ECC keys

      DEVELOPMENT EXCEPTION (Localhost only):
      ```xml
      <key>NSAppTransportSecurity</key>
      <dict>
          <key>NSExceptionDomains</key>
          <dict>
              <key>localhost</key>
              <dict>
                  <key>NSExceptionAllowsInsecureHTTPLoads</key>
                  <true/>
              </dict>
          </dict>
      </dict>
      ```

      Reference: OWASP M8, MASVS-NETWORK-1, Apple ATS
    severity: ERROR
    languages:
