  - id: flutter-ios-url-scheme-no-validation
    patterns:
      - pattern: |
          <key>CFBundleURLTypes</key>
          <array>
            <dict>
              ...
              <key>CFBundleURLSchemes</key>
              <array>
                <string>$SCHEME</string>
              </array>
              ...
            </dict>
          </array>
      - metavariable-regex:
          metavariable: $SCHEME
          regex: ^(?!https?).*$
    message: |
      Custom URL scheme without Universal Links (OWASP M8).
      Custom schemes are vulnerable to hijacking on iOS.

      SECURITY RISKS:
      - Multiple apps can register same scheme
      - No ownership verification
      - Phishing attacks
      - Data interception

      VULNERABLE CONFIGURATION:
      ```xml
      <!-- Info.plist - Custom scheme -->
      <key>CFBundleURLTypes</key>
      <array>
          <dict>
              <key>CFBundleURLSchemes</key>
              <array>
                  <string>myapp</string>
              </array>
          </dict>
      </array>
      ```

      SECURE FIX - Use Universal Links:
      ```xml
      <!-- Info.plist - Associated Domains -->
      <key>com.apple.developer.associated-domains</key>
      <array>
          <string>applinks:example.com</string>
          <string>applinks:www.example.com</string>
      </array>
      ```

      APPLE APP SITE ASSOCIATION:
      ```json
      // https://example.com/.well-known/apple-app-site-association
      {
        "applinks": {
          "apps": [],
          "details": [
            {
              "appID": "TEAMID.com.example.app",
              "paths": ["/app/*", "/login/*"]
            }
          ]
        }
      }
      ```

      FLUTTER IMPLEMENTATION:
      ```dart
      import 'package:uni_links/uni_links.dart';

      class IOSDeepLinkHandler {
        static const List<String> _trustedDomains = [
          'example.com',
          'www.example.com',
        ];

        Future<void> handleUniversalLink(Uri? uri) async {
          if (uri == null) return;

          // Validate HTTPS
          if (uri.scheme != 'https') {
            throw SecurityException('Only HTTPS universal links allowed');
          }

          // Validate domain
          if (!_trustedDomains.contains(uri.host)) {
            throw SecurityException('Untrusted domain: ${uri.host}');
          }

          // Validate path
          final validPaths = ['/app/', '/login/', '/payment/'];
          if (!validPaths.any((path) => uri.path.startsWith(path))) {
            throw SecurityException('Invalid path: ${uri.path}');
          }

          _processLink(uri);
        }

        void _processLink(Uri uri) {
          // Handle validated universal link
        }
      }

      // AppDelegate.swift
      func application(_ application: UIApplication,
                      continue userActivity: NSUserActivity,
                      restorationHandler: @escaping ([Any]?) -> Void) -> Bool {

        guard userActivity.activityType == NSUserActivityTypeBrowsingWeb,
              let url = userActivity.webpageURL else {
          return false
        }

        // Validate URL
        guard url.scheme == "https",
              let host = url.host,
              ["example.com", "www.example.com"].contains(host) else {
          return false
        }

        // Pass to Flutter
        FlutterMethodChannel.invokeMethod("handleUniversalLink", arguments: url.absoluteString)
        return true
      }
      ```

      Reference: OWASP M8, MASVS-PLATFORM-2, Apple Universal Links
