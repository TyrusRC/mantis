rules:
  # =============================================================================
  # OWASP Mobile Top 10 2024 - M3: Insecure Authentication/Authorization
  # Flutter Comprehensive Authentication & Authorization Security Rules
  # =============================================================================
  #
  # Coverage:
  # - Biometric authentication (local_auth package)
  # - JWT validation and handling
  # - OAuth 2.0 / PKCE flows
  # - Session management
  # - Password policies
  # - Social authentication (Google, Facebook, Apple)
  # - API authentication
  # - Token storage and handling
  # - Authorization checks
  # - FIDO2/WebAuthn
  #
  # Test Exclusions:
  # - Flutter test files
  # - Mock/stub implementations
  # - Example/demo code
  # - Development mode code
  # =============================================================================

  # ============================================================================
  # BIOMETRIC AUTHENTICATION VULNERABILITIES
  # ============================================================================





  - id: flutter-m3-jwt-no-expiration-check
    patterns:
      - pattern: |
          JwtDecoder.decode($TOKEN)
      - pattern-not-inside: |
          if (JwtDecoder.isExpired($TOKEN)) {
            ...
          }
      - pattern-not-inside: |
          final isExpired = JwtDecoder.isExpired($TOKEN);
          ...
      - pattern-not-inside: |
          test($NAME, () {
            ...
          });

    message: |
      JWT used without checking expiration (OWASP M3).

      RISK:
      Tokens without expiration checks remain valid indefinitely if stolen.

      SECURE IMPLEMENTATION:
      ```dart
      import 'package:jwt_decoder/jwt_decoder.dart';

      class TokenValidator {
        Future<Map<String, dynamic>?> validateToken(String token) async {
          // Check expiration
          if (JwtDecoder.isExpired(token)) {
            print('Token expired, refreshing...');
            token = await refreshToken();
            if (token.isEmpty) return null;
          }

          // Verify signature (use secure method)
          final payload = await verifyAndDecode(token);
          return payload;
        }

        Future<String> refreshToken() async {
          final refreshToken = await storage.read(key: 'refresh_token');

          final response = await http.post(
            Uri.parse('https://api.example.com/auth/refresh'),
            body: {'refresh_token': refreshToken},
          );

          final data = jsonDecode(response.body);
          return data['access_token'];
        }
      }
      ```

      Reference: CWE-613, OWASP M3

    severity: WARNING
    languages:
      - dart
    metadata:
      category: security
      cwe: "CWE-613: Insufficient Session Expiration"
      owasp-mobile-2024: "M3: Insecure Authentication/Authorization"
      confidence: MEDIUM

  # ============================================================================
  # OAUTH & OIDC VULNERABILITIES
  # ============================================================================




  - id: flutter-m3-weak-password-policy
    patterns:
      - pattern-either:
          - pattern: |
              if ($PASSWORD.length >= $LEN) { ... }
          - pattern: |
              $PASSWORD.length >= $LEN
          - pattern: |
              $PASSWORD.length > $LEN
      - metavariable-comparison:
          metavariable: $LEN
          comparison: $LEN < 8
      - pattern-not-inside: |
          test($NAME, () {
            ...
          });

    message: |
      Weak password length requirement (OWASP M3).

      RISK:
      NIST 800-63B and OWASP recommend minimum 8 characters for passwords.
      Shorter passwords are vulnerable to brute force attacks.

      SECURE IMPLEMENTATION:
      ```dart
      class PasswordValidator {
        static const int minLength = 8;
        static const int recommendedLength = 12;

        static ValidationResult validate(String password) {
          final errors = <String>[];
          final warnings = <String>[];

          // Length check
          if (password.length < minLength) {
            errors.add('Password must be at least $minLength characters');
          }

          // Check common passwords
          if (_isCommonPassword(password)) {
            errors.add('Password is too common. Choose a stronger password.');
          }

          // Complexity check
          final hasUppercase = password.contains(RegExp(r'[A-Z]'));
          final hasLowercase = password.contains(RegExp(r'[a-z]'));
          final hasDigits = password.contains(RegExp(r'[0-9]'));
          final hasSpecialChars = password.contains(RegExp(r'[!@#$%^&*(),.?":{}|<>]'));

          final complexityCount = [
            hasUppercase,
            hasLowercase,
            hasDigits,
            hasSpecialChars,
          ].where((e) => e).length;

          if (complexityCount < 3) {
            warnings.add(
              'Password should include uppercase, lowercase, numbers, and special characters'
            );
          }

          if (password.length < recommendedLength) {
            warnings.add(
              'For better security, use at least $recommendedLength characters'
            );
          }

          return ValidationResult(
            isValid: errors.isEmpty,
            errors: errors,
            warnings: warnings,
          );
        }

        static bool _isCommonPassword(String password) {
          const commonPasswords = [
            'password', '12345678', 'qwerty', 'abc123',
            'password123', '111111', '123123', 'admin',
          ];
          return commonPasswords.contains(password.toLowerCase());
        }
      }
      ```

      Reference: NIST 800-63B, CWE-521

    severity: WARNING
    languages:
      - dart
    metadata:
      category: security
      cwe: "CWE-521: Weak Password Requirements"
      owasp-mobile-2024: "M3: Insecure Authentication/Authorization"
      confidence: MEDIUM



  - id: flutter-m3-token-in-url
    patterns:
      - pattern-either:
          - pattern: |
              Uri.parse('$URL?token=$TOKEN')
          - pattern: |
              '$URL?token=$TOKEN'
          - pattern: |
              '$URL?access_token=$TOKEN'
          - pattern: |
              http.get(Uri.parse('$URL?token=$TOKEN'))
      - pattern-not-inside: |
          test($NAME, () {
            ...
          });

    message: |
      Authentication token in URL parameter (OWASP M3).

      RISK:
      Tokens in URLs are exposed in:
      - Server logs
      - Browser history
      - Referrer headers
      - Proxy logs
      - Network traffic logs

      SECURE IMPLEMENTATION:
      ```dart
      import 'package:http/http.dart' as http;

      // ❌ WRONG: Token in URL
      final response = await http.get(
        Uri.parse('https://api.example.com/data?token=$authToken')
      );

      // ✅ CORRECT: Token in Authorization header
      final response = await http.get(
        Uri.parse('https://api.example.com/data'),
        headers: {
          'Authorization': 'Bearer $authToken',
          'Content-Type': 'application/json',
        },
      );
      ```

      Reference: CWE-598, OWASP M3

    severity: ERROR
    languages:
      - dart
    metadata:
      category: security
      cwe: "CWE-598: Use of GET Request Method With Sensitive Query Strings"
      owasp-mobile-2024: "M3: Insecure Authentication/Authorization"
      confidence: HIGH

  # ============================================================================
  # AUTHORIZATION VULNERABILITIES
  # ============================================================================


  - id: flutter-m3-deeplink-auth-bypass
    patterns:
      - pattern-either:
          - pattern: |
              void handleDeepLink(Uri uri) {
                ...
                final token = uri.queryParameters['token'];
                ...
              }
          - pattern: |
              final token = uri.queryParameters['access_token'];
              ...
              await saveToken(token);
      - pattern-not-inside: |
          if (await _validateTokenWithServer(token)) {
            ...
          }
      - pattern-not-inside: |
          test($NAME, () {
            ...
          });

    message: |
      Deep link authentication without server validation (OWASP M3).

      RISK:
      Accepting tokens from deep links without validation allows:
      - Token injection attacks
      - Session fixation
      - Account takeover via malicious links

      SECURE IMPLEMENTATION:
      ```dart
      import 'package:uni_links/uni_links.dart';
      import 'package:flutter_secure_storage/flutter_secure_storage.dart';

      class SecureDeepLinkAuth {
        final _storage = FlutterSecureStorage();

        Future<void> handleAuthDeepLink(Uri uri) async {
          final code = uri.queryParameters['code'];
          final state = uri.queryParameters['state'];

          if (code == null || state == null) {
            throw Exception('Invalid deep link');
          }

          // Validate state parameter (CSRF protection)
          final savedState = await _storage.read(key: 'oauth_state');
          if (state != savedState) {
            throw Exception('State mismatch - possible CSRF attack');
          }

          // Exchange code for token server-side
          final token = await _exchangeCodeForToken(code);

          // Validate token with server
          if (await _validateToken(token)) {
            await _storage.write(key: 'auth_token', value: token);
          } else {
            throw Exception('Invalid token');
          }
        }

        Future<String> _exchangeCodeForToken(String code) async {
          final response = await http.post(
            Uri.parse('https://api.example.com/oauth/token'),
            body: {
              'grant_type': 'authorization_code',
              'code': code,
              'client_id': 'your_client_id',
              'redirect_uri': 'com.yourapp://oauth/callback',
            },
          );

          final data = jsonDecode(response.body);
          return data['access_token'];
        }

        Future<bool> _validateToken(String token) async {
          final response = await http.get(
            Uri.parse('https://api.example.com/auth/verify'),
            headers: {'Authorization': 'Bearer $token'},
          );

          return response.statusCode == 200;
        }
      }
      ```

      Reference: CWE-352, OWASP M3

    severity: ERROR
    languages:
      - dart
    metadata:
      category: security
      cwe: "CWE-352: Cross-Site Request Forgery (CSRF)"
      owasp-mobile-2024: "M3: Insecure Authentication/Authorization"
      confidence: MEDIUM

