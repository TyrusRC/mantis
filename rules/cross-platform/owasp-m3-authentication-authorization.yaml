rules:
  # =============================================================================
  # OWASP Mobile Top 10 2024 - M3: Insecure Authentication/Authorization
  # Flutter Comprehensive Authentication & Authorization Security Rules
  # =============================================================================
  #
  # Coverage:
  # - Biometric authentication (local_auth package)
  # - JWT validation and handling
  # - OAuth 2.0 / PKCE flows
  # - Session management
  # - Password policies
  # - Social authentication (Google, Facebook, Apple)
  # - API authentication
  # - Token storage and handling
  # - Authorization checks
  # - FIDO2/WebAuthn
  #
  # Test Exclusions:
  # - Flutter test files
  # - Mock/stub implementations
  # - Example/demo code
  # - Development mode code
  # =============================================================================

  # ============================================================================
  # BIOMETRIC AUTHENTICATION VULNERABILITIES
  # ============================================================================

  - id: flutter-m3-biometric-event-based-auth
    patterns:
      - pattern-either:
          - pattern: |
              $AUTH.authenticate(
                localizedReason: $REASON,
                ...
              )
          - pattern: |
              await $AUTH.authenticate(...)
      - pattern-not-inside: |
          final cipher = ...
          ...
      - pattern-not-inside: |
          final authenticated = await $AUTH.authenticate(...)
          ...
          final key = await $_STORAGE.read(
            key: $KEY,
            ...
          )
          ...

      # Exclude test code
      - pattern-not-inside: |
          void main() {
            testWidgets($NAME, ($TESTER) async {
              ...
            });
          }
      - pattern-not-inside: |
          test($NAME, () async {
            ...
          });

      # Exclude mock implementations
      - pattern-not-inside: |
          class Mock$CLASS extends Mock implements $INTERFACE {
            ...
          }
      - pattern-not-inside: |
          class Fake$CLASS extends Fake<$TYPE> {
            ...
          }

    message: |
      Event-based biometric authentication without cryptographic binding (OWASP M3: Insecure Authentication).

      VULNERABILITY:
      Relying solely on the boolean result of biometric authentication allows attackers to bypass via:
      - Frida/Xposed hooking to return true
      - Binary patching
      - Runtime manipulation

      ATTACK SCENARIO:
      ```dart
      // VULNERABLE: Event-based biometric check
      final auth = LocalAuthentication();
      final authenticated = await auth.authenticate(
        localizedReason: 'Please authenticate',
      );

      if (authenticated) {
        // Attacker can hook this to always return true
        await loadSensitiveData();
      }
      ```

      Frida bypass:
      ```javascript
      Java.perform(function() {
        var LocalAuthPlugin = Java.use('io.flutter.plugins.localauth.LocalAuthPlugin');
        LocalAuthPlugin.authenticate.implementation = function() {
          console.log('[*] Biometric bypassed!');
          return true;  // Always succeed
        };
      });
      ```

      SECURE FIX - Crypto-bound biometrics:
      ```dart
      import 'package:local_auth/local_auth.dart';
      import 'package:flutter_secure_storage/flutter_secure_storage.dart';
      import 'package:encrypt/encrypt.dart' as encrypt;

      class SecureBiometricAuth {
        final _auth = LocalAuthentication();
        final _storage = FlutterSecureStorage(
          aOptions: AndroidOptions(
            encryptedSharedPreferences: true,
            biometricOnly: true,  // Require biometric auth
          ),
          iOptions: IOSOptions(
            accessibility: KeychainAccessibility.whenPasscodeSetThisDeviceOnly,
          ),
        );

        // Initialize with biometric-protected key
        Future<void> setupBiometricKey() async {
          final key = encrypt.Key.fromSecureRandom(32);

          // Store in biometric-protected storage
          await _storage.write(
            key: 'biometric_encryption_key',
            value: base64Encode(key.bytes),
            aOptions: AndroidOptions(biometricOnly: true),
            iOptions: IOSOptions(
              authenticationPrompt: 'Authenticate to setup biometric key',
            ),
          );
        }

        // Authenticate and decrypt data
        Future<String?> authenticateAndDecrypt(String encryptedData) async {
          // Check biometric availability
          final canAuth = await _auth.canCheckBiometrics;
          if (!canAuth) return null;

          // Prompt for biometric auth
          final authenticated = await _auth.authenticate(
            localizedReason: 'Authenticate to access data',
            options: const AuthenticationOptions(
              biometricOnly: true,
              stickyAuth: true,
              sensitiveTransaction: true,
            ),
          );

          if (!authenticated) return null;

          // SECURE: Retrieve key from biometric-protected storage
          // This operation REQUIRES biometric auth to succeed
          final keyStr = await _storage.read(
            key: 'biometric_encryption_key',
            aOptions: AndroidOptions(biometricOnly: true),
            iOptions: IOSOptions(
              authenticationPrompt: 'Authenticate to decrypt data',
            ),
          );

          if (keyStr == null) return null;

          // Decrypt using biometric-protected key
          final key = encrypt.Key(base64Decode(keyStr));
          final encrypter = encrypt.Encrypter(encrypt.AES(key));
          final iv = encrypt.IV.fromLength(16);

          return encrypter.decrypt64(encryptedData, iv: iv);
        }
      }
      ```

      PLATFORM-SPECIFIC SECURITY:

      Android (BiometricPrompt + Keystore):
      - Keys stored in Android KeyStore (hardware-backed)
      - StrongBox support on compatible devices
      - setUserAuthenticationRequired(true)
      - Invalidates when biometry changes

      iOS (Face ID/Touch ID + Keychain):
      - Keys in Secure Enclave
      - kSecAccessControlBiometryCurrentSet
      - Invalidates when biometry changes
      - Hardware-backed protection

      BEST PRACTICES:
      - ALWAYS bind biometric auth to cryptographic operations
      - Use hardware-backed keystores (Android KeyStore, iOS Secure Enclave)
      - Invalidate keys when biometrics change
      - Implement password/PIN fallback
      - Never rely on boolean result alone

      References:
      - OWASP MASTG: MASTG-TEST-0025
      - MASVS-AUTH-3: Additional authentication for sensitive operations
      - CWE-287: Improper Authentication

    severity: ERROR
    languages:
      - dart
    metadata:
      category: security
      cwe: "CWE-287: Improper Authentication"
      owasp-mobile-2024: "M3: Insecure Authentication/Authorization"
      masvs-v2: "MASVS-AUTH-3"
      confidence: HIGH
      likelihood: HIGH
      impact: CRITICAL

  - id: flutter-m3-biometric-weak-config
    patterns:
      - pattern-either:
          - pattern: |
              AuthenticationOptions(
                biometricOnly: false,
                ...
              )
          - pattern: |
              $AUTH.authenticate(
                ...,
                options: const AuthenticationOptions(
                  stickyAuth: false,
                  ...
                )
              )
      - pattern-not-inside: |
          test($NAME, () async {
            ...
          });

    message: |
      Weak biometric authentication configuration (OWASP M3).

      RISK:
      - biometricOnly: false allows password fallback which may be weaker
      - stickyAuth: false doesn't maintain auth state during lifecycle changes

      SECURE CONFIGURATION:
      ```dart
      final authenticated = await auth.authenticate(
        localizedReason: 'Authenticate to access sensitive data',
        options: const AuthenticationOptions(
          biometricOnly: true,           // Require biometric auth
          stickyAuth: true,               // Maintain auth during lifecycle
          sensitiveTransaction: true,      // Mark as sensitive
        ),
      );
      ```

      Reference: MASVS-AUTH-3, CWE-306

    severity: WARNING
    languages:
      - dart
    metadata:
      category: security
      cwe: "CWE-306: Missing Authentication for Critical Function"
      owasp-mobile-2024: "M3: Insecure Authentication/Authorization"
      confidence: MEDIUM

  # ============================================================================
  # JWT TOKEN VALIDATION VULNERABILITIES
  # ============================================================================

  - id: flutter-m3-jwt-no-signature-verification
    patterns:
      - pattern-either:
          - pattern: |
              JWT.decode($TOKEN)
          - pattern: |
              JwtDecoder.decode($TOKEN)
          - pattern: |
              JsonWebToken.decode($TOKEN)
          - pattern: |
              final parts = $TOKEN.split('.');
              ...
              json.decode(utf8.decode(base64.decode(parts[1])))
      - pattern-not-inside: |
          JWT.verify($TOKEN, ...)
          ...
      - pattern-not-inside: |
          test($NAME, () {
            ...
          });

    message: |
      JWT decoded without signature verification (OWASP M3: Insecure Authentication).

      CRITICAL VULNERABILITY:
      Decoding JWTs without verifying signatures allows attackers to:
      - Forge tokens with elevated privileges
      - Modify user IDs, roles, permissions
      - Use "none" algorithm attack
      - Bypass authentication completely

      ATTACK SCENARIO:
      ```dart
      // VULNERABLE: Decode without verification
      import 'package:jwt_decoder/jwt_decoder.dart';

      final payload = JwtDecoder.decode(token);
      final userId = payload['user_id'];
      final isAdmin = payload['admin'] ?? false;

      if (isAdmin) {
        grantAdminAccess();  // Attacker can forge admin token!
      }
      ```

      Attacker creates forged token:
      ```bash
      # Header (alg: none)
      {"alg": "none", "typ": "JWT"}

      # Payload (forged claims)
      {"user_id": "attacker", "admin": true, "exp": 9999999999}

      # Signature: (empty for "none" algorithm)

      # Result: eyJhbGciOiJub25lIn0.eyJ1c2VyX2lkIjoiYXR0YWNrZXIiLCJhZG1pbiI6dHJ1ZX0.
      # App grants admin access!
      ```

      SECURE IMPLEMENTATION:
      ```dart
      import 'package:dart_jsonwebtoken/dart_jsonwebtoken.dart';
      import 'package:flutter_secure_storage/flutter_secure_storage.dart';

      class SecureJWTHandler {
        final _storage = FlutterSecureStorage();

        // Get public key for verification
        Future<String?> getPublicKey() async {
          // Fetch from backend or secure storage
          return await _storage.read(key: 'jwt_public_key');
        }

        // SECURE: Verify signature before trusting claims
        Future<Map<String, dynamic>?> verifyAndDecode(String token) async {
          try {
            final publicKeyPEM = await getPublicKey();
            if (publicKeyPEM == null) {
              throw Exception('Public key not available');
            }

            // Verify signature with public key
            final jwt = JWT.verify(
              token,
              RSAPublicKey(publicKeyPEM),
              checkExpiresIn: true,
              checkNotBefore: true,
            );

            // Validate claims
            final payload = jwt.payload as Map<String, dynamic>;

            if (payload['iss'] != 'https://your-auth-server.com') {
              throw JWTException('Invalid issuer');
            }

            if (payload['aud'] != 'your-mobile-app') {
              throw JWTException('Invalid audience');
            }

            return payload;
          } on JWTExpiredException {
            print('Token expired');
            return null;
          } on JWTException catch (e) {
            print('Invalid token: $e');
            return null;
          }
        }
      }

      // Usage
      final handler = SecureJWTHandler();
      final payload = await handler.verifyAndDecode(token);

      if (payload != null) {
        final userId = payload['sub'];
        final roles = payload['roles'] as List?;

        // Now safe to use verified claims
        if (roles?.contains('admin') == true) {
          grantAdminAccess();
        }
      } else {
        await logout();
      }
      ```

      JWT SECURITY BEST PRACTICES:

      1. Algorithm Security:
         - ✅ Use: RS256, ES256, PS256 (asymmetric)
         - ⚠️ Avoid: HS256 (symmetric) in mobile apps
         - ❌ Never: "none" algorithm

      2. Key Management:
         - Store public keys securely
         - Fetch from backend with cert pinning
         - NEVER include private keys in app
         - Rotate keys periodically

      3. Validation Checks:
         - Verify signature (ALWAYS!)
         - Check expiration (exp)
         - Check not-before (nbf)
         - Validate issuer (iss)
         - Validate audience (aud)
         - Validate subject (sub)

      4. Token Storage:
         - Use flutter_secure_storage
         - Never SharedPreferences
         - Clear on logout
         - Implement refresh flow

      TESTING:
      ```dart
      test('JWT verification rejects tampered tokens', () async {
        final handler = SecureJWTHandler();

        // Valid token should pass
        final validPayload = await handler.verifyAndDecode(validToken);
        expect(validPayload, isNotNull);

        // Tampered token should fail
        final tamperedToken = validToken.replaceFirst('user', 'admin');
        final tamperedPayload = await handler.verifyAndDecode(tamperedToken);
        expect(tamperedPayload, isNull);

        // None algorithm should fail
        final noneToken = 'eyJhbGciOiJub25lIn0...';
        final nonePayload = await handler.verifyAndDecode(noneToken);
        expect(nonePayload, isNull);
      });
      ```

      References:
      - OWASP JWT Cheat Sheet
      - CWE-347: Improper Verification of Cryptographic Signature
      - RFC 7519: JSON Web Token (JWT)

    severity: ERROR
    languages:
      - dart
    metadata:
      category: security
      cwe: "CWE-347: Improper Verification of Cryptographic Signature"
      owasp-mobile-2024: "M3: Insecure Authentication/Authorization"
      confidence: HIGH
      likelihood: HIGH
      impact: CRITICAL

  - id: flutter-m3-jwt-hardcoded-secret
    patterns:
      - pattern-either:
          - pattern: |
              JWT.sign($PAYLOAD, SecretKey('$SECRET'))
          - pattern: |
              JWT.verify($TOKEN, SecretKey('$SECRET'))
          - pattern: |
              const jwtSecret = '$SECRET';
              ...
          - pattern: |
              final secret = '$SECRET';
              ...
              JWT.sign($PAYLOAD, SecretKey(secret))
      - metavariable-regex:
          metavariable: $SECRET
          regex: ^[A-Za-z0-9+/=]{16,}$
      - pattern-not-inside: |
          test($NAME, () {
            ...
          });

    message: |
      JWT with hardcoded secret key (OWASP M3: Insecure Authentication).

      CRITICAL RISK:
      Hardcoded JWT secrets can be extracted via:
      - APK/IPA decompilation
      - Binary analysis (strings, objdump)
      - Runtime memory inspection
      - Frida/objection hooking

      Once extracted, attackers can:
      - Forge valid tokens for any user
      - Bypass authentication completely
      - Escalate privileges to admin

      SECURE IMPLEMENTATION:
      ```dart
      // ❌ WRONG: Mobile apps should NEVER sign JWTs
      // JWT signing should ONLY happen on backend server

      // ✅ CORRECT: Mobile apps should only:
      // 1. Verify JWT signatures (using public key)
      // 2. Read verified claims
      // 3. Store tokens securely

      class ProperMobileJWTUsage {
        // ✅ CORRECT: Verify with public key
        Future<bool> verifyToken(String token, String publicKeyPEM) async {
          try {
            JWT.verify(token, RSAPublicKey(publicKeyPEM));
            return true;
          } catch (e) {
            return false;
          }
        }

        // ❌ WRONG: Never sign tokens in mobile app
        String signToken(Map<String, dynamic> payload) {
          throw UnimplementedError(
            'Token signing must be done on backend server, not mobile app!'
          );
        }
      }
      ```

      WHY MOBILE APPS SHOULD NOT SIGN JWTS:
      - Private keys can be extracted from app binary
      - No secure way to store signing secrets in mobile apps
      - Defeats purpose of server-side authentication
      - Opens app to token forgery attacks

      PROPER JWT FLOW FOR MOBILE:
      ```
      1. User authenticates with backend
      2. Backend signs JWT with private key
      3. Backend returns JWT to mobile app
      4. Mobile app stores JWT securely
      5. Mobile app verifies JWT with public key (optional)
      6. Mobile app sends JWT in API requests
      7. Backend verifies JWT signature for each request
      ```

      Reference: CWE-798, OWASP M3, MASVS-AUTH-1

    severity: ERROR
    languages:
      - dart
    metadata:
      category: security
      cwe: "CWE-798: Use of Hard-coded Credentials"
      owasp-mobile-2024: "M3: Insecure Authentication/Authorization"
      confidence: HIGH

  - id: flutter-m3-jwt-no-expiration-check
    patterns:
      - pattern: |
          JwtDecoder.decode($TOKEN)
      - pattern-not-inside: |
          if (JwtDecoder.isExpired($TOKEN)) {
            ...
          }
      - pattern-not-inside: |
          final isExpired = JwtDecoder.isExpired($TOKEN);
          ...
      - pattern-not-inside: |
          test($NAME, () {
            ...
          });

    message: |
      JWT used without checking expiration (OWASP M3).

      RISK:
      Tokens without expiration checks remain valid indefinitely if stolen.

      SECURE IMPLEMENTATION:
      ```dart
      import 'package:jwt_decoder/jwt_decoder.dart';

      class TokenValidator {
        Future<Map<String, dynamic>?> validateToken(String token) async {
          // Check expiration
          if (JwtDecoder.isExpired(token)) {
            print('Token expired, refreshing...');
            token = await refreshToken();
            if (token.isEmpty) return null;
          }

          // Verify signature (use secure method)
          final payload = await verifyAndDecode(token);
          return payload;
        }

        Future<String> refreshToken() async {
          final refreshToken = await storage.read(key: 'refresh_token');

          final response = await http.post(
            Uri.parse('https://api.example.com/auth/refresh'),
            body: {'refresh_token': refreshToken},
          );

          final data = jsonDecode(response.body);
          return data['access_token'];
        }
      }
      ```

      Reference: CWE-613, OWASP M3

    severity: WARNING
    languages:
      - dart
    metadata:
      category: security
      cwe: "CWE-613: Insufficient Session Expiration"
      owasp-mobile-2024: "M3: Insecure Authentication/Authorization"
      confidence: MEDIUM

  # ============================================================================
  # OAUTH & OIDC VULNERABILITIES
  # ============================================================================

  - id: flutter-m3-oauth-no-pkce
    patterns:
      - pattern-either:
          - pattern: |
              FlutterAppAuth().$METHOD(
                AuthorizationTokenRequest(
                  $CLIENT_ID,
                  $REDIRECT,
                  ...
                )
              )
          - pattern: |
              $APP_AUTH.authorizeAndExchangeCode(
                AuthorizationTokenRequest(...)
              )
      - pattern-not: |
          AuthorizationTokenRequest(
            ...,
            codeVerifier: $VERIFIER,
            ...
          )
      - pattern-not: |
          AuthorizationTokenRequest(
            ...,
            additionalParameters: {..., 'code_challenge': $CHALLENGE, ...},
            ...
          )
      - pattern-not-inside: |
          test($NAME, () async {
            ...
          });

    message: |
      OAuth Authorization Code flow without PKCE (OWASP M3: Insecure Authentication).

      CRITICAL VULNERABILITY:
      OAuth without PKCE is vulnerable to authorization code interception attacks.

      ATTACK SCENARIO:
      ```
      1. User initiates OAuth login in legitimate app
      2. Attacker intercepts authorization code via:
         - Malicious app with same redirect URI scheme
         - Custom URL scheme hijacking
         - Deep link interception
      3. Attacker exchanges code for access token
      4. Attacker gains access to victim's account
      ```

      VULNERABLE PATTERN:
      ```dart
      import 'package:flutter_appauth/flutter_appauth.dart';

      final appAuth = FlutterAppAuth();

      // VULNERABLE: No PKCE
      final result = await appAuth.authorizeAndExchangeCode(
        AuthorizationTokenRequest(
          'client_id',
          'com.myapp://oauth/callback',
          serviceConfiguration: AuthorizationServiceConfiguration(
            authorizationEndpoint: 'https://auth.example.com/authorize',
            tokenEndpoint: 'https://auth.example.com/token',
          ),
          scopes: ['openid', 'profile', 'email'],
        ),
      );

      // Authorization code can be intercepted!
      ```

      SECURE IMPLEMENTATION with PKCE:
      ```dart
      import 'package:flutter_appauth/flutter_appauth.dart';
      import 'package:flutter_secure_storage/flutter_secure_storage.dart';
      import 'dart:convert';
      import 'dart:math';
      import 'package:crypto/crypto.dart';

      class SecureOAuthWithPKCE {
        final _appAuth = FlutterAppAuth();
        final _storage = FlutterSecureStorage();

        // Generate PKCE code verifier and challenge
        Map<String, String> _generatePKCE() {
          // Generate random code verifier (43-128 characters)
          final random = Random.secure();
          final values = List<int>.generate(32, (_) => random.nextInt(256));
          final codeVerifier = base64Url
              .encode(values)
              .replaceAll('=', '')
              .replaceAll('+', '-')
              .replaceAll('/', '_');

          // Generate code challenge (SHA256 of verifier)
          final bytes = utf8.encode(codeVerifier);
          final digest = sha256.convert(bytes);
          final codeChallenge = base64Url
              .encode(digest.bytes)
              .replaceAll('=', '')
              .replaceAll('+', '-')
              .replaceAll('/', '_');

          return {
            'code_verifier': codeVerifier,
            'code_challenge': codeChallenge,
          };
        }

        Future<void> login() async {
          try {
            // Generate PKCE parameters
            final pkce = _generatePKCE();

            // SECURE: OAuth with PKCE
            final result = await _appAuth.authorizeAndExchangeCode(
              AuthorizationTokenRequest(
                'your_client_id',
                'com.yourcompany.yourapp://oauth/callback',
                serviceConfiguration: AuthorizationServiceConfiguration(
                  authorizationEndpoint: 'https://auth.example.com/authorize',
                  tokenEndpoint: 'https://auth.example.com/token',
                ),
                scopes: ['openid', 'profile', 'email'],
                // PKCE parameters
                additionalParameters: {
                  'code_challenge': pkce['code_challenge']!,
                  'code_challenge_method': 'S256',
                },
                // Code verifier for token exchange
                codeVerifier: pkce['code_verifier'],
                // Nonce for CSRF protection
                nonce: _generateNonce(),
              ),
            );

            if (result != null) {
              // Store tokens securely
              await _storage.write(key: 'access_token', value: result.accessToken);

              if (result.refreshToken != null) {
                await _storage.write(key: 'refresh_token', value: result.refreshToken);
              }

              if (result.idToken != null) {
                await _validateIDToken(result.idToken!);
              }
            }
          } catch (e) {
            print('OAuth error: $e');
          }
        }

        String _generateNonce() {
          final random = Random.secure();
          final values = List<int>.generate(16, (_) => random.nextInt(256));
          return base64Url.encode(values);
        }

        Future<void> _validateIDToken(String idToken) async {
          // Validate ID token signature and claims
          // Implementation depends on identity provider
        }
      }
      ```

      PKCE SECURITY GUARANTEES:
      - Code verifier never transmitted (only challenge)
      - Attackers can't exchange intercepted code without verifier
      - Protection against authorization code injection
      - Works with public clients (mobile apps)

      OAUTH 2.0 MOBILE BEST PRACTICES:
      1. ✅ Always use PKCE (RFC 7636)
      2. ✅ Use S256 challenge method (SHA-256)
      3. ✅ Implement state parameter for CSRF protection
      4. ✅ Use secure redirect URIs (app-specific schemes)
      5. ✅ Store tokens in secure storage
      6. ✅ Implement token refresh flow
      7. ❌ Never use implicit flow
      8. ❌ Never use password grant

      REDIRECT URI SECURITY:
      ```dart
      // ✅ SECURE: App-specific custom scheme
      redirectUrl: 'com.yourcompany.yourapp://oauth/callback'

      // ⚠️ LESS SECURE: Universal links (can be hijacked)
      redirectUrl: 'https://yourapp.com/oauth/callback'

      // ❌ INSECURE: Generic schemes
      redirectUrl: 'myapp://callback'
      ```

      References:
      - RFC 7636: Proof Key for Code Exchange
      - OAuth 2.0 for Native Apps (RFC 8252)
      - OWASP Mobile Top 10: M3

    severity: ERROR
    languages:
      - dart
    metadata:
      category: security
      cwe: "CWE-940: Improper Verification of Source of a Communication Channel"
      owasp-mobile-2024: "M3: Insecure Authentication/Authorization"
      confidence: HIGH
      likelihood: HIGH
      impact: CRITICAL

  - id: flutter-m3-oauth-implicit-flow
    patterns:
      - pattern-either:
          - pattern: |
              responseType = 'token'
          - pattern: |
              'response_type=token'
          - pattern: |
              responseType: 'token'
      - pattern-not-inside: |
          test($NAME, () {
            ...
          });

    message: |
      OAuth Implicit Flow used (OWASP M3: Insecure Authentication).

      VULNERABILITY:
      Implicit flow exposes access tokens in:
      - URL fragments (visible in browser history)
      - Redirect URIs (logged on servers)
      - Referrer headers

      SECURE ALTERNATIVE:
      Use Authorization Code flow with PKCE (see flutter-m3-oauth-no-pkce).

      ```dart
      // ❌ INSECURE: Implicit flow
      responseType: 'token'

      // ✅ SECURE: Authorization code flow with PKCE
      responseType: 'code'
      usePKCE: true
      ```

      Reference: OAuth 2.0 Security Best Current Practice (RFC 8252)

    severity: ERROR
    languages:
      - dart
    metadata:
      category: security
      cwe: "CWE-522: Insufficiently Protected Credentials"
      owasp-mobile-2024: "M3: Insecure Authentication/Authorization"
      confidence: HIGH

  - id: flutter-m3-oauth-state-missing
    patterns:
      - pattern-either:
          - pattern: |
              AuthorizationTokenRequest(
                $CLIENT_ID,
                $REDIRECT,
                ...
              )
          - pattern: |
              AuthorizationRequest(
                $CLIENT_ID,
                $REDIRECT,
                ...
              )
      - pattern-not: |
          AuthorizationTokenRequest(
            ...,
            state: $STATE,
            ...
          )
      - pattern-not: |
          AuthorizationRequest(
