      ```dart
      import 'package:flutter_secure_storage/flutter_secure_storage.dart';

      class SessionManager {
        final _storage = FlutterSecureStorage();

        Future<void> saveSession(String token, int expiresIn) async {
          final expiry = DateTime.now().add(Duration(seconds: expiresIn));

          await _storage.write(key: 'auth_token', value: token);
          await _storage.write(
            key: 'token_expiry',
            value: expiry.toIso8601String(),
          );
        }

        Future<String?> getValidToken() async {
          final token = await _storage.read(key: 'auth_token');
          final expiryStr = await _storage.read(key: 'token_expiry');

          if (token == null || expiryStr == null) return null;

          final expiry = DateTime.parse(expiryStr);
          if (DateTime.now().isAfter(expiry)) {
            // Token expired, try refresh
            return await refreshToken();
          }

          return token;
        }

        Future<String?> refreshToken() async {
          final refreshToken = await _storage.read(key: 'refresh_token');

          final response = await http.post(
            Uri.parse('https://api.example.com/auth/refresh'),
            body: {'refresh_token': refreshToken},
          );

          if (response.statusCode == 200) {
            final data = jsonDecode(response.body);
            await saveSession(data['access_token'], data['expires_in']);
            return data['access_token'];
          }

          return null;
        }
      }
