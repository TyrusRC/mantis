rules:
  # Flutter Cryptography Security Rules
  # Weak crypto, insecure key storage, poor random generation
  # Sources: Flutter Security Research 2024-2025, OWASP Mobile
  # Focus: Cryptographic vulnerabilities in Flutter applications

  - id: flutter-hardcoded-crypto-key
    patterns:
      - pattern-either:
          - pattern: |
              final $KEY = '$VALUE';
          - pattern: |
              const $KEY = '$VALUE';
          - pattern: |
              var $KEY = '$VALUE';
      - metavariable-regex:
          metavariable: $KEY
          regex: (?i).*(key|secret|password|token|api[_-]?key|salt|iv|nonce).*
      - metavariable-regex:
          metavariable: $VALUE
          regex: ^[A-Za-z0-9+/=]{16,}$
      - pattern-not-inside: |
          // Test
          void main() {
            test('...', () { ... });
          }
      - pattern-not-inside: |
          // Example
          class Example$CLASS { ... }
    message: |
      Hardcoded cryptographic key in Flutter code (OWASP M9).
      Storing encryption keys in source code allows attackers to extract them
      via static analysis or decompilation.

      VULNERABLE PATTERN:
      ```dart
      // VULNERABLE: Hardcoded AES key
      const String encryptionKey = 'my_super_secret_key_123';
      final key = encrypt.Key.fromUtf8(encryptionKey);

      // VULNERABLE: Hardcoded IV
      final iv = encrypt.IV.fromUtf8('1234567890123456');
      ```

      ATTACK SCENARIO:
      1. Attacker decompiles Flutter app (unzip APK/IPA)
      2. Extracts kernel_blob.bin and analyzes Dart code
      3. Finds hardcoded encryption keys in source
      4. Decrypts sensitive data using extracted keys

      SECURE IMPLEMENTATION:
      ```dart
      import 'package:flutter_secure_storage/flutter_secure_storage.dart';
      import 'dart:math';

      class SecureKeyManager {
        final _secureStorage = FlutterSecureStorage();

        // Generate and store key securely
        Future<String> getOrCreateEncryptionKey() async {
          // Try to retrieve existing key
          String? key = await _secureStorage.read(key: 'encryption_key');

          if (key == null) {
            // Generate new random key
            key = _generateSecureKey();
            await _secureStorage.write(key: 'encryption_key', value: key);
          }

          return key;
        }

        String _generateSecureKey() {
          final random = Random.secure();
          final values = List<int>.generate(32, (i) => random.nextInt(256));
          return base64Encode(values);
        }

        // Delete key when user logs out
        Future<void> clearKey() async {
          await _secureStorage.delete(key: 'encryption_key');
        }
      }

      // Usage
      final keyManager = SecureKeyManager();
      final encryptionKey = await keyManager.getOrCreateEncryptionKey();
      final key = encrypt.Key.fromUtf8(encryptionKey);
      ```

      PLATFORM-SPECIFIC STORAGE:
      - **Android**: flutter_secure_storage uses KeyStore (hardware-backed if available)
      - **iOS**: Uses Keychain with kSecAttrAccessibleWhenUnlocked

      BEST PRACTICES:
      - Never hardcode keys in source code
      - Use flutter_secure_storage for key storage
      - Generate keys at runtime
      - Use key derivation functions (PBKDF2, Argon2) for password-based keys
      - Clear keys on logout

      Reference: OWASP Mobile Top 10 2024, Flutter Security Best Practices
    severity: ERROR
    languages:
      - dart
    metadata:
      category: security
      cwe: "CWE-321: Use of Hard-coded Cryptographic Key"
      owasp-mobile-2024: "M9: Insecure Data Storage"
      confidence: HIGH
      false_positive_likelihood: LOW

  - id: flutter-weak-encryption-algorithm
    patterns:
      - pattern-either:
          - pattern: |
              AES($MODE)
          - pattern: |
              encrypt.AES($KEY, mode: $MODE)
      - metavariable-regex:
          metavariable: $MODE
          regex: (?i)(ecb|AESMode\.ecb)
      - pattern-not-inside: |
          void main() {
            test('...', () { ... });
          }
    message: |
      Weak AES encryption mode (ECB) in Flutter (OWASP M10).
      ECB mode does not provide semantic security. Identical plaintext blocks
      produce identical ciphertext blocks, revealing patterns.

      VULNERABLE PATTERN:
      ```dart
      // VULNERABLE: ECB mode
      final encrypter = encrypt.Encrypter(
        encrypt.AES(key, mode: encrypt.AESMode.ecb)
      );
      ```

      WHY ECB IS INSECURE:
      - No randomness: Same plaintext → same ciphertext
      - Pattern leakage: Repeated data is visible
      - Example: ECB-encrypted images still show outlines

      SECURE IMPLEMENTATION:
      ```dart
      import 'package:encrypt/encrypt.dart';
      import 'dart:math';

      class SecureEncryption {
        late final encrypt.Key _key;
        late final encrypt.Encrypter _encrypter;

        SecureEncryption(String keyString) {
          _key = encrypt.Key.fromUtf8(keyString.padRight(32, '0'));
          // Use GCM mode for authenticated encryption
          _encrypter = encrypt.Encrypter(
            encrypt.AES(_key, mode: encrypt.AESMode.gcm)
          );
        }

        String encryptData(String plaintext) {
          // Generate random IV for each encryption
          final iv = encrypt.IV.fromSecureRandom(16);

          // Encrypt with GCM (includes authentication tag)
          final encrypted = _encrypter.encrypt(plaintext, iv: iv);

          // Return IV + ciphertext (both needed for decryption)
          return '${iv.base64}:${encrypted.base64}';
        }

        String decryptData(String ciphertext) {
          final parts = ciphertext.split(':');
          if (parts.length != 2) {
            throw ArgumentError('Invalid ciphertext format');
          }

          final iv = encrypt.IV.fromBase64(parts[0]);
          final encrypted = encrypt.Encrypted.fromBase64(parts[1]);

          return _encrypter.decrypt(encrypted, iv: iv);
        }
      }
      ```

      RECOMMENDED MODES:
      - **GCM** (Galois/Counter Mode): Authenticated encryption ✅ BEST
      - **CBC** (Cipher Block Chaining): With HMAC ✅ GOOD
      - **CTR** (Counter Mode): With HMAC ✅ GOOD
      - **ECB** (Electronic Codebook): ❌ NEVER USE

      Reference: NIST SP 800-38A, OWASP Mobile Top 10
    severity: ERROR
    languages:
      - dart
    metadata:
      category: security
      cwe: "CWE-327: Use of a Broken or Risky Cryptographic Algorithm"
      owasp-mobile-2024: "M10: Insufficient Cryptography"
      confidence: HIGH
      false_positive_likelihood: VERY_LOW

  - id: flutter-insecure-random
    patterns:
      - pattern-either:
          - pattern: |
              Random()
          - pattern: |
              Random($SEED)
          - pattern: |
              math.Random()
      - pattern-not: |
          Random.secure()
      - pattern-not-inside: |
          void main() {
            test('...', () { ... });
          }
      - pattern-not-inside: |
          // UI/animation purposes
          class $ANIMATIONWidget extends StatelessWidget { ... }
      - metavariable-context:
          metavariable: $SEED
          patterns:
            - pattern-either:
                - pattern: DateTime.now().millisecondsSinceEpoch
                - pattern: $CONSTANT
    message: |
      Insecure random number generator in Flutter (OWASP M10).
      Regular Random() is predictable and must not be used for security purposes.

      VULNERABLE PATTERN:
      ```dart
      // VULNERABLE: Predictable random for token generation
      String generateToken() {
        final random = Random();
        final values = List.generate(32, (i) => random.nextInt(256));
        return base64Encode(values);
      }

      // VULNERABLE: Seeded with time
      final random = Random(DateTime.now().millisecondsSinceEpoch);
      ```

      ATTACK SCENARIO:
      1. Attacker observes approximate time of token generation
      2. Iterates through possible seeds (millisecond range)
      3. Predicts random sequence and forges tokens
      4. Gains unauthorized access

      SECURE IMPLEMENTATION:
      ```dart
      import 'dart:math';
      import 'dart:typed_data';
      import 'dart:convert';

      class SecureTokenGenerator {
        // Use cryptographically secure random
        static final _secureRandom = Random.secure();

        static String generateToken({int length = 32}) {
          final values = Uint8List(length);
          for (int i = 0; i < length; i++) {
            values[i] = _secureRandom.nextInt(256);
          }
          return base64UrlEncode(values);
        }

        static String generateSessionId() {
          return generateToken(length: 32);
        }

        static String generateCSRFToken() {
          return generateToken(length: 32);
        }

        static String generateApiKey() {
          return generateToken(length: 64);
        }
      }

      // Usage
      final sessionId = SecureTokenGenerator.generateSessionId();
      ```

      WHEN TO USE EACH:
      - **Random.secure()**: Security tokens, keys, IVs, nonces ✅
      - **Random()**: UI animations, game mechanics, non-security ✅
      - **Random(seed)**: Reproducible sequences (testing only) ⚠️

      ADDITIONAL SECURITY:
      ```dart
      // For high-security requirements, use platform-specific sources
      import 'package:pointycastle/pointycastle.dart';

      Uint8List generateSecureBytes(int length) {
        final secureRandom = FortunaRandom();
        final seedSource = Random.secure();
        final seeds = List<int>.generate(32, (_) => seedSource.nextInt(256));
        secureRandom.seed(KeyParameter(Uint8List.fromList(seeds)));

        return secureRandom.nextBytes(length);
      }
      ```

      Reference: OWASP Mobile Top 10, NIST SP 800-90A
    severity: ERROR
    languages:
      - dart
    metadata:
      category: security
      cwe: "CWE-338: Use of Cryptographically Weak Pseudo-Random Number Generator"
      owasp-mobile-2024: "M10: Insufficient Cryptography"
      confidence: HIGH
      false_positive_likelihood: MEDIUM

  - id: flutter-md5-sha1-usage
    patterns:
      - pattern-either:
          - pattern: |
              md5.convert($DATA)
          - pattern: |
              sha1.convert($DATA)
          - pattern: |
              crypto.md5.convert($DATA)
          - pattern: |
              crypto.sha1.convert($DATA)
      - pattern-not-inside: |
          // Checksum/fingerprint for non-security purposes
          String calculateChecksum($DATA) { ... }
      - pattern-not-inside: |
          void main() {
            test('...', () { ... });
          }
    message: |
      Weak cryptographic hash function (MD5/SHA1) in Flutter (OWASP M10).
      MD5 and SHA1 are cryptographically broken and vulnerable to collisions.

      VULNERABLE PATTERNS:
      ```dart
      // VULNERABLE: MD5 for password hashing
      String hashPassword(String password) {
        final bytes = utf8.encode(password);
        return md5.convert(bytes).toString();
      }

      // VULNERABLE: SHA1 for data integrity
      String calculateIntegrity(String data) {
        return sha1.convert(utf8.encode(data)).toString();
      }
      ```

      WHY INSECURE:
      - **MD5**: Collision attacks (2^21 operations)
      - **SHA1**: Collision attacks demonstrated (SHAttered attack)
      - Not suitable for passwords (fast, no salt, no iterations)

      SECURE IMPLEMENTATION:
      ```dart
      import 'package:crypto/crypto.dart';
      import 'package:pointycastle/pointycastle.dart';
      import 'dart:typed_data';

      class SecureHashing {
        // For data integrity: Use SHA-256 or SHA-512
        static String calculateIntegrity(String data) {
          final bytes = utf8.encode(data);
          final digest = sha256.convert(bytes);
          return digest.toString();
        }

        // For password hashing: Use PBKDF2 or Argon2
        static String hashPassword(String password, {String? salt}) {
          salt ??= _generateSalt();

          final pbkdf2 = PBKDF2KeyDerivator(HMac(SHA256Digest(), 64))
            ..init(Pbkdf2Parameters(
              Uint8List.fromList(utf8.encode(salt)),
              100000, // iterations
              32 // key length
            ));

          final key = pbkdf2.process(Uint8List.fromList(utf8.encode(password)));
          return '$salt:${base64Encode(key)}';
        }

        static bool verifyPassword(String password, String hashedPassword) {
          final parts = hashedPassword.split(':');
          if (parts.length != 2) return false;

          final salt = parts[0];
          final expectedHash = parts[1];
          final actualHash = hashPassword(password, salt: salt).split(':')[1];

          return expectedHash == actualHash;
        }

        static String _generateSalt() {
          final random = Random.secure();
          final values = List<int>.generate(16, (_) => random.nextInt(256));
          return base64Encode(values);
        }
      }

      // Usage
      final hashedPassword = SecureHashing.hashPassword('user_password');
      final isValid = SecureHashing.verifyPassword('user_password', hashedPassword);
      ```

      RECOMMENDED ALGORITHMS:
      - **Passwords**: Argon2id, PBKDF2, bcrypt, scrypt ✅
      - **Data Integrity**: SHA-256, SHA-512, SHA-3 ✅
      - **HMAC**: HMAC-SHA256, HMAC-SHA512 ✅
      - **Legacy**: MD5, SHA1, CRC32 ❌

      ACCEPTABLE MD5/SHA1 USES:
      - Non-cryptographic checksums (file integrity)
      - Git commit IDs
      - Cache keys
      - ETags for HTTP caching

      Reference: NIST FIPS 180-4, RFC 8018 (PBKDF2)
    severity: ERROR
    languages:
      - dart
    metadata:
      category: security
      cwe: "CWE-327: Use of a Broken or Risky Cryptographic Algorithm"
      owasp-mobile-2024: "M10: Insufficient Cryptography"
      confidence: HIGH
      false_positive_likelihood: LOW
