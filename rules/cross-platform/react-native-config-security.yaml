rules:
  # React Native OWASP M8: Security Misconfiguration Detection Rules
  # Covers Android Manifest, iOS Info.plist, package.json, and build configurations
  # Sources: OWASP Mobile Top 10 2024, React Native Security Best Practices
  # Focus: Platform-specific security misconfigurations in React Native applications

  # ============ REACT NATIVE DEVELOPMENT MODE LEAKS ============

  - id: react-native-dev-mode-enabled-production
    patterns:
      - pattern-either:
          - pattern: |
              __DEV__ && console.log($MSG)
          - pattern: |
              if (__DEV__) {
                ...
                console.log($SECRET);
                ...
              }
          - pattern: |
              const isDevMode = __DEV__;
      - pattern-not-inside: |
          if (__DEV__) {
            console.warn('Development mode');
          }
    message: |
      Development mode checks in production code (OWASP M8).
      __DEV__ flag should be properly handled to prevent leaks and debug features in production.

      SECURITY RISKS:
      - Debug logging in production
      - Development endpoints exposed
      - Sensitive data in logs
      - Performance degradation
      - Remote debugging enabled

      VULNERABLE PATTERNS:
      ```javascript
      // VULNERABLE: Secrets logged in dev mode
      __DEV__ && console.log('API Key:', apiKey);
      __DEV__ && console.log('User token:', token);

      // VULNERABLE: Dev-only bypass
      if (__DEV__) {
        return true; // Skip auth check
      }

      // VULNERABLE: Debug endpoints
      const API_URL = __DEV__
        ? 'http://localhost:3000'
        : 'https://api.example.com';
      ```

      SECURE IMPLEMENTATION:
      ```javascript
      // Proper dev mode usage
      import {Platform} from 'react-native';

      class Config {
        static get apiUrl() {
          if (__DEV__) {
            return 'http://localhost:3000';
          }
          return 'https://api.example.com';
        }

        static log(message, data) {
          if (__DEV__) {
            // Safe development logging (no secrets)
            console.log('[DEBUG]', message, data);
          }
        }

        // NEVER log sensitive data
        static logAuth(token) {
          if (__DEV__) {
            console.log('[AUTH] Token received:', token ? '***' : 'none');
          }
        }
      }

      // Build-time environment variables
      const API_URL = process.env.REACT_APP_API_URL || 'https://api.example.com';

      // Runtime environment check
      import {NativeModules} from 'react-native';
      const {RNConfig} = NativeModules;

      class SecurityConfig {
        static isProduction() {
          return !__DEV__ && RNConfig.buildType === 'release';
        }

        static async initSecurity() {
          if (this.isProduction()) {
            // Disable dev features
            console.log = () => {};
            console.warn = () => {};
            console.error = () => {};

            // Disable remote debugging
            if (global.XMLHttpRequest) {
              delete global.XMLHttpRequest;
            }
          }
        }
      }
      ```

      METRO BUNDLER PRODUCTION CONFIG:
      ```javascript
      // metro.config.js
      module.exports = {
        transformer: {
          minifierConfig: {
            keep_fnames: false,
            mangle: {
              keep_fnames: false,
            },
            compress: {
              drop_console: true, // Remove console.* in production
              dead_code: true,
              drop_debugger: true,
            },
          },
        },
      };
      ```

      ANDROID BUILD CONFIGURATION:
      ```gradle
      // android/app/build.gradle
      android {
          buildTypes {
              release {
                  minifyEnabled true
                  shrinkResources true
                  proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
              }
          }
      }
      ```

      IOS BUILD CONFIGURATION:
      ```ruby
      # ios/Podfile
      post_install do |installer|
        installer.pods_project.targets.each do |target|
          target.build_configurations.each do |config|
            if config.name == 'Release'
              config.build_settings['GCC_PREPROCESSOR_DEFINITIONS'] ||= ['$(inherited)']
              config.build_settings['GCC_PREPROCESSOR_DEFINITIONS'] << 'RCT_DEV=0'
            end
          end
        end
      end
      ```

      VERIFICATION:
      ```bash
      # Check release build
      react-native run-android --variant=release
      react-native run-ios --configuration Release

      # Verify no debug code
      grep -r "__DEV__" android/app/build
      grep -r "console.log" ios/build
      ```

      Reference: OWASP M8, React Native Security, MASVS-RESILIENCE-2
    severity: WARNING
    languages:
      - javascript
      - typescript
    metadata:
      category: security
      cwe: "CWE-489: Active Debug Code"
      owasp-mobile-2024: "M8: Security Misconfiguration"
      masvs: "MASVS-RESILIENCE-2"
      confidence: MEDIUM

  - id: react-native-remote-debugging-enabled
    patterns:
      - pattern-either:
          - pattern: |
              NativeModules.DevSettings.setIsDebuggingRemotely(true)
          - pattern: |
              DevSettings.setIsDebuggingRemotely(true)
          - pattern: |
              global.XMLHttpRequest = global.originalXMLHttpRequest
    message: |
      Remote debugging enabled in React Native (OWASP M8 - Critical).
      Remote debugging exposes app internals and enables runtime manipulation.

      SECURITY IMPACT:
      - JavaScript bridge exposed
      - Variables inspectable
      - Code modifiable at runtime
      - Network traffic visible
      - Secrets extractable

      VULNERABLE PATTERNS:
      ```javascript
      // VULNERABLE: Force enable debugging
      import {NativeModules} from 'react-native';
      NativeModules.DevSettings.setIsDebuggingRemotely(true);

      // VULNERABLE: Expose XMLHttpRequest
      if (global.originalXMLHttpRequest) {
        global.XMLHttpRequest = global.originalXMLHttpRequest;
      }

      // VULNERABLE: Enable dev menu
      NativeModules.DevMenu.show();
      ```

      SECURE FIX:
      ```javascript
      // Disable dev features in production
      import {NativeModules, Platform} from 'react-native';

      class DevToolsManager {
        static disableDevTools() {
          if (!__DEV__) {
            // Disable dev settings
            if (NativeModules.DevSettings) {
              NativeModules.DevSettings.setIsDebuggingRemotely(false);
              NativeModules.DevSettings.setIsShakeToShowDevMenuEnabled(false);
            }

            // Disable dev menu
            if (NativeModules.DevMenu) {
              NativeModules.DevMenu.hide();
            }

            // Remove XMLHttpRequest debugging
            delete global.XMLHttpRequest;
            delete global.originalXMLHttpRequest;

            // Disable console
            console.log = () => {};
            console.warn = () => {};
            console.error = () => {};
            console.debug = () => {};
          }
        }
      }

      // Call on app init
      DevToolsManager.disableDevTools();
      ```

      ANDROID MANIFEST:
      ```xml
      <!-- AndroidManifest.xml - Prevent debugging -->
      <application
          android:debuggable="false">
      </application>
      ```

      IOS CONFIGURATION:
      ```objective-c
      // AppDelegate.m
      #if !DEBUG
      - (BOOL)application:(UIApplication *)application didFinishLaunchingWithOptions:(NSDictionary *)launchOptions
      {
        // Disable dev menu in release
        [[RCTBundleURLProvider sharedSettings] setEnableDev:NO];
        [[RCTBundleURLProvider sharedSettings] setEnableLiveReload:NO];

        // Disable remote debugging
        RCTSetEnableRemoteDebugging(NO);

        return YES;
      }
      #endif
      ```

      DETECTION AT RUNTIME:
      ```javascript
      import {NativeModules} from 'react-native';

      class SecurityChecker {
        static async checkDebugMode() {
          // Check if remote debugging is active
          const isRemoteDebugging = NativeModules.DevSettings?.isRemoteDebuggingEnabled;

          if (isRemoteDebugging && !__DEV__) {
            // Log security violation
            console.error('Remote debugging detected in production!');

            // Alert user or exit app
            Alert.alert(
              'Security Warning',
              'Debugging detected. App will now close.',
              [{text: 'OK', onPress: () => RNExitApp.exitApp()}]
            );
          }
        }
      }
      ```

      Reference: OWASP M8, MASVS-RESILIENCE-3
    severity: ERROR
    languages:
      - javascript
      - typescript
      - objective-c
    metadata:
      category: security
      cwe: "CWE-489: Active Debug Code"
      owasp-mobile-2024: "M8: Security Misconfiguration"
      masvs: "MASVS-RESILIENCE-3"
      confidence: VERY_HIGH

  # ============ PACKAGE.JSON SECURITY ISSUES ============

  - id: react-native-outdated-version
    patterns:
      - pattern: |
          "react-native": "$VERSION"
      - metavariable-regex:
          metavariable: $VERSION
          regex: ^["']?[~^]?0\.(6[0-6]|[0-5]\d)\.
    message: |
      Severely outdated React Native version (OWASP M8 - Critical).
      React Native versions before 0.67 have critical security vulnerabilities.

      SECURITY RISKS:
      - Known CVEs unpatched
      - Missing security features
      - Vulnerable dependencies
      - No security updates

      VULNERABLE CONFIGURATION:
      ```json
      {
        "dependencies": {
          "react-native": "0.63.4"
        }
      }
      ```

      SECURE FIX:
      ```json
      {
        "dependencies": {
          "react-native": "^0.73.0"
        }
      }
      ```

      UPGRADE PROCESS:
      ```bash
      # Check current version
      npx react-native --version

      # Upgrade React Native
      npx react-native upgrade

      # Or use upgrade helper
      npx react-native upgrade 0.73.0

      # Update dependencies
      npm install

      # Clear caches
      npm start -- --reset-cache

      # Test thoroughly
      npm test
      npx react-native run-android
      npx react-native run-ios
      ```

      SECURITY IMPROVEMENTS IN RECENT VERSIONS:
      - 0.71+: Improved TLS security
      - 0.70+: Better permission handling
      - 0.69+: Enhanced WebView security
      - 0.68+: Hermes engine improvements
      - 0.67+: Critical security patches

      BREAKING CHANGES PREPARATION:
      ```javascript
      // Handle API changes during upgrade
      import {Platform} from 'react-native';

      const isNewArchitecture = Platform.constants?.reactNativeVersion?.minor >= 70;

      if (isNewArchitecture) {
        // New Fabric renderer
      } else {
        // Legacy Paper renderer
      }
      ```

      Reference: OWASP M8, React Native Changelog, CVE Database
    severity: ERROR
    languages:
      - json
    paths:
      include:
        - "**/package.json"
    metadata:
      category: security
      cwe: "CWE-1104: Use of Unmaintained Third Party Components"
      owasp-mobile-2024: "M8: Security Misconfiguration"
      confidence: VERY_HIGH

  - id: react-native-insecure-scripts
    patterns:
      - pattern: |
          "scripts": {
            ...
            "$SCRIPT": "... --reset-cache ..."
            ...
          }
    message: |
      Reset cache script in production package.json (OWASP M8).
      Cache reset scripts can expose development tools in production.

      SECURITY RISKS:
      - Exposes metro bundler
      - Development dependencies loaded
      - Debug tools accessible

      VULNERABLE CONFIGURATION:
      ```json
      {
        "scripts": {
          "start": "react-native start --reset-cache",
          "android": "react-native run-android --variant=release --reset-cache"
        }
      }
      ```

      SECURE FIX:
      ```json
      {
        "scripts": {
          "start": "react-native start",
          "start:clean": "react-native start --reset-cache",
          "android:debug": "react-native run-android",
          "android:release": "cd android && ./gradlew assembleRelease",
          "ios:debug": "react-native run-ios",
          "ios:release": "react-native run-ios --configuration Release"
        }
      }
      ```

      PRODUCTION BUILD SCRIPTS:
      ```json
      {
        "scripts": {
          "build:android": "cd android && ./gradlew clean && ./gradlew bundleRelease",
          "build:ios": "cd ios && xcodebuild -workspace App.xcworkspace -scheme App -configuration Release archive",
          "prebuild": "npm run test && npm run lint",
          "postbuild": "npm run verify-security"
        }
      }
      ```

      Reference: OWASP M8, React Native Best Practices
    severity: WARNING
    languages:
      - json
    paths:
      include:
        - "**/package.json"
    metadata:
      category: security
      owasp-mobile-2024: "M8: Security Misconfiguration"
      confidence: MEDIUM

  - id: react-native-dependency-git-source
    patterns:
      - pattern: |
          "dependencies": {
            ...
            "$PKG": "git+$URL"
            ...
          }
    message: |
      Git-based dependency in package.json (OWASP M2/M8).
      Git dependencies bypass npm security and can be compromised.

      SECURITY RISKS:
      - No integrity verification
      - Mutable dependencies
      - Supply chain attacks
      - No security audits

      VULNERABLE CONFIGURATION:
      ```json
      {
        "dependencies": {
          "custom-lib": "git+https://github.com/user/repo.git",
          "internal-lib": "git+ssh://git@github.com/company/lib.git#main"
        }
      }
      ```

      SECURE FIX - Option 1 (Use npm):
      ```json
      {
        "dependencies": {
          "custom-lib": "^1.2.3"
        }
      }
      ```

      SECURE FIX - Option 2 (Pin commit):
      ```json
      {
        "dependencies": {
          "custom-lib": "git+https://github.com/user/repo.git#a1b2c3d4e5f6"
        }
      }
      ```

      DEPENDENCY VERIFICATION:
      ```bash
      # Audit dependencies
      npm audit

      # Check for vulnerabilities
      npm audit fix

      # Use Snyk or similar
      npx snyk test

      # Verify integrity
      npm ci --ignore-scripts
      ```

      SECURE DEPENDENCY MANAGEMENT:
      ```json
      {
        "dependencies": {
          "react-native": "0.73.0",
          "@react-navigation/native": "^6.1.0"
        },
        "devDependencies": {
          "@types/react-native": "^0.73.0"
        },
        "resolutions": {
          "minimist": "^1.2.6"
        }
      }
      ```

      Reference: OWASP M2, M8, npm Security
    severity: WARNING
    languages:
      - json
    paths:
      include:
        - "**/package.json"
    metadata:
      category: security
      cwe: "CWE-494: Download of Code Without Integrity Check"
      owasp-mobile-2024: "M2: Inadequate Supply Chain Security"
      confidence: HIGH

  # ============ ANDROID MANIFEST MISCONFIGURATIONS ============

  - id: react-native-android-debuggable
    patterns:
      - pattern: |
          <application
            ...
            android:debuggable="true"
            ...
          />
    message: |
      Debuggable flag enabled in React Native Android app (OWASP M8 - Critical).
      Debug mode allows attackers to inspect React Native bridge and JavaScript code.

      SECURITY IMPACT:
      - React Native bridge exposed
      - JavaScript code inspectable
      - ADB debugging enabled
      - Memory dumps accessible
      - Runtime manipulation possible

      VULNERABLE CONFIGURATION:
      ```xml
      <!-- AndroidManifest.xml -->
      <application
          android:name=".MainApplication"
          android:debuggable="true">
      </application>
      ```

      SECURE FIX:
      ```xml
      <!-- Remove debuggable - Gradle controls this -->
      <application
          android:name=".MainApplication">
      </application>
      ```

      ```gradle
      // android/app/build.gradle
      android {
          buildTypes {
              release {
                  debuggable false
                  minifyEnabled true
                  shrinkResources true
                  proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
              }
              debug {
                  debuggable true
                  applicationIdSuffix ".debug"
              }
          }
      }
      ```

      PROGUARD RULES FOR REACT NATIVE:
      ```
      # proguard-rules.pro
      -keep class com.facebook.react.** { *; }
      -keep class com.facebook.hermes.** { *; }

      # Remove debug symbols
      -assumenosideeffects class android.util.Log {
          public static *** d(...);
          public static *** v(...);
      }
      ```

      Reference: OWASP M8, MASVS-RESILIENCE-2
    severity: ERROR
    languages:
      - xml
    paths:
      include:
        - "**/AndroidManifest.xml"
    metadata:
      category: security
      cwe: "CWE-489: Active Debug Code"
      owasp-mobile-2024: "M8: Security Misconfiguration"
      masvs: "MASVS-RESILIENCE-2"
      confidence: VERY_HIGH
      platform: android

  - id: react-native-android-backup-allowed
    patterns:
      - pattern: |
          <application
            ...
            android:allowBackup="true"
            ...
          />
      - pattern-not-inside: |
          <application
            ...
            android:fullBackupContent="@xml/backup_rules"
            ...
          />
    message: |
      Unrestricted backup in React Native Android app (OWASP M8).
      React Native AsyncStorage and app data can be exposed via backup.

      SECURITY RISKS:
      - AsyncStorage data backed up
      - Redux persist state exposed
      - Secure preferences compromised
      - API tokens in backup

      VULNERABLE CONFIGURATION:
      ```xml
      <application
          android:allowBackup="true">
      </application>
      ```

      SECURE FIX:
      ```xml
      <application
          android:allowBackup="true"
          android:fullBackupContent="@xml/backup_rules">
      </application>
      ```

      ```xml
      <!-- res/xml/backup_rules.xml -->
      <?xml version="1.0" encoding="utf-8"?>
      <full-backup-content>
          <!-- Exclude AsyncStorage -->
          <exclude domain="sharedpref" path="RKStorage"/>

          <!-- Exclude secure storage -->
          <exclude domain="database" path="RKStorage"/>

          <!-- Exclude Redux persist -->
          <exclude domain="file" path="persist/"/>

          <!-- Exclude sensitive files -->
          <exclude domain="file" path="cache/"/>
      </full-backup-content>
      ```

      REACT NATIVE STORAGE SECURITY:
      ```javascript
      // Use react-native-encrypted-storage
      import EncryptedStorage from 'react-native-encrypted-storage';

      async function saveToken(token) {
        await EncryptedStorage.setItem('auth_token', token);
      }

      // Or react-native-keychain
      import * as Keychain from 'react-native-keychain';

      async function saveCredentials(username, password) {
        await Keychain.setGenericPassword(username, password);
      }
      ```

      Reference: OWASP M8, MASVS-STORAGE-2
    severity: WARNING
    languages:
      - xml
    paths:
      include:
        - "**/AndroidManifest.xml"
    metadata:
      category: security
      cwe: "CWE-530: Exposure of Backup File to Unauthorized Control Sphere"
      owasp-mobile-2024: "M8: Security Misconfiguration"
      masvs: "MASVS-STORAGE-2"
      confidence: HIGH
      platform: android

  - id: react-native-android-cleartext-traffic
    patterns:
      - pattern: |
          <application
            ...
            android:usesCleartextTraffic="true"
            ...
          />
    message: |
      Cleartext HTTP traffic enabled in React Native Android (OWASP M8).
      React Native fetch/axios calls can use insecure HTTP.

      SECURITY IMPACT:
      - API calls over HTTP
      - Man-in-the-middle attacks
      - Token interception
      - Data manipulation

      VULNERABLE CONFIGURATION:
      ```xml
      <application
          android:usesCleartextTraffic="true">
      </application>
      ```

      SECURE FIX:
      ```xml
      <application
          android:networkSecurityConfig="@xml/network_security_config">
      </application>
      ```

      ```xml
      <!-- res/xml/network_security_config.xml -->
      <?xml version="1.0" encoding="utf-8"?>
      <network-security-config>
          <base-config cleartextTrafficPermitted="false"/>

          <!-- Dev only -->
          <domain-config cleartextTrafficPermitted="true">
              <domain includeSubdomains="true">localhost</domain>
              <domain includeSubdomains="true">10.0.2.2</domain>
          </domain-config>
      </network-security-config>
      ```

      REACT NATIVE HTTPS ENFORCEMENT:
      ```javascript
      import axios from 'axios';

      const api = axios.create({
        baseURL: 'https://api.example.com',
        timeout: 10000,
      });

      // Intercept and validate
      api.interceptors.request.use(config => {
        if (!config.url?.startsWith('https://')) {
          throw new Error('Only HTTPS allowed');
        }
        return config;
      });
      ```

      Reference: OWASP M5, M8, MASVS-NETWORK-1
    severity: ERROR
    languages:
      - xml
    paths:
      include:
        - "**/AndroidManifest.xml"
    metadata:
      category: security
      cwe: "CWE-319: Cleartext Transmission of Sensitive Information"
      owasp-mobile-2024: "M8: Security Misconfiguration"
      masvs: "MASVS-NETWORK-1"
      confidence: VERY_HIGH
      platform: android

  # ============ iOS INFO.PLIST MISCONFIGURATIONS ============

  - id: react-native-ios-ats-disabled
    patterns:
      - pattern: |
          <key>NSAppTransportSecurity</key>
          <dict>
            <key>NSAllowsArbitraryLoads</key>
            <true/>
          </dict>
    message: |
      App Transport Security disabled in React Native iOS (OWASP M8).
      React Native network calls can use insecure HTTP on iOS.

      SECURITY IMPACT:
      - HTTP API calls permitted
      - Weak TLS accepted
      - MITM attacks enabled
      - App Store rejection risk

      VULNERABLE CONFIGURATION:
      ```xml
      <!-- Info.plist -->
      <key>NSAppTransportSecurity</key>
      <dict>
          <key>NSAllowsArbitraryLoads</key>
          <true/>
      </dict>
      ```

      SECURE FIX:
      ```xml
      <!-- Remove ATS exception entirely -->
      <!-- ATS enabled by default -->
      ```

      REACT NATIVE HTTPS CLIENT:
      ```javascript
      import {Platform} from 'react-native';

      class SecureAPI {
        static async fetch(url, options = {}) {
          const uri = new URL(url);

          if (uri.protocol !== 'https:') {
            if (Platform.OS === 'ios') {
              throw new Error('iOS ATS blocks HTTP');
            }
            throw new Error('Only HTTPS allowed');
          }

          return fetch(url, options);
        }
      }
      ```

      Reference: OWASP M8, MASVS-NETWORK-1
    severity: ERROR
    languages:
      - xml
    paths:
      include:
        - "**/Info.plist"
    metadata:
      category: security
      cwe: "CWE-319: Cleartext Transmission of Sensitive Information"
      owasp-mobile-2024: "M8: Security Misconfiguration"
      masvs: "MASVS-NETWORK-1"
      confidence: VERY_HIGH
      platform: ios

  - id: react-native-ios-url-scheme-insecure
    patterns:
      - pattern: |
          <key>CFBundleURLTypes</key>
          <array>
            <dict>
              ...
              <key>CFBundleURLSchemes</key>
              <array>
                <string>$SCHEME</string>
              </array>
              ...
            </dict>
          </array>
      - metavariable-regex:
          metavariable: $SCHEME
          regex: ^(?!https?).*$
    message: |
      Custom URL scheme without Universal Links (OWASP M8).
      React Native deep linking via custom schemes is insecure.

      SECURITY RISKS:
      - Scheme hijacking
      - Data interception
      - Phishing attacks

      VULNERABLE CONFIGURATION:
      ```xml
      <!-- Info.plist -->
      <key>CFBundleURLTypes</key>
      <array>
          <dict>
              <key>CFBundleURLSchemes</key>
              <array>
                  <string>myapp</string>
              </array>
          </dict>
      </array>
      ```

      SECURE FIX - Universal Links:
      ```xml
      <key>com.apple.developer.associated-domains</key>
      <array>
          <string>applinks:example.com</string>
      </array>
      ```

      REACT NATIVE DEEP LINKING:
      ```javascript
      import {Linking} from 'react-native';

      class DeepLinkHandler {
        static async handleURL(url) {
          const uri = new URL(url);

          // Validate scheme
          if (uri.protocol !== 'https:') {
            throw new Error('Only HTTPS deep links');
          }

          // Validate host
          const trusted = ['example.com'];
          if (!trusted.includes(uri.hostname)) {
            throw new Error('Untrusted host');
          }

          // Process link
          this.navigate(uri);
        }
      }

      // App.js
      useEffect(() => {
        Linking.addEventListener('url', ({url}) => {
          DeepLinkHandler.handleURL(url);
        });
      }, []);
      ```

      Reference: OWASP M8, MASVS-PLATFORM-2
    severity: WARNING
    languages:
      - xml
    paths:
      include:
        - "**/Info.plist"
    metadata:
      category: security
      cwe: "CWE-939: Improper Authorization in Handler for Custom URL Scheme"
      owasp-mobile-2024: "M8: Security Misconfiguration"
      masvs: "MASVS-PLATFORM-2"
      confidence: HIGH
      platform: ios

  # ============ METRO BUNDLER SECURITY ============

  - id: react-native-metro-insecure-config
    patterns:
      - pattern: |
          module.exports = {
            ...
            server: {
              ...
              port: $PORT,
              ...
            },
            ...
          };
      - metavariable-regex:
          metavariable: $PORT
          regex: ^(8080|8081|3000)$
    message: |
      Metro bundler on default port in config (OWASP M8).
      Production apps should not include Metro configuration.

      SECURITY RISKS:
      - Dev server accessible
      - Source code exposure
      - Hot reload in production
      - Bundle manipulation

      VULNERABLE CONFIGURATION:
      ```javascript
      // metro.config.js - Should not be in production
      module.exports = {
        server: {
          port: 8081,
        },
        transformer: {
          babelTransformerPath: require.resolve('metro-react-native-babel-transformer'),
        },
      };
      ```

      SECURE FIX:
      ```javascript
      // metro.config.js - Production config
      module.exports = {
        transformer: {
          minifierConfig: {
            compress: {
              drop_console: true,
              drop_debugger: true,
            },
          },
        },
        serializer: {
          getModulesRunBeforeMainModule: () => [],
        },
      };
      ```

      PRODUCTION BUILD:
      ```bash
      # Android
      npx react-native bundle \
        --platform android \
        --dev false \
        --entry-file index.js \
        --bundle-output android/app/src/main/assets/index.android.bundle \
        --assets-dest android/app/src/main/res

      # iOS
      npx react-native bundle \
        --platform ios \
        --dev false \
        --entry-file index.js \
        --bundle-output ios/main.jsbundle \
        --assets-dest ios
      ```

      Reference: OWASP M8, React Native Production
