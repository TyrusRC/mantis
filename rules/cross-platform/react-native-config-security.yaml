  - id: react-native-sensitive-props-exposure
    patterns:
      - pattern-either:
          - pattern: |
              <$COMPONENT
                ...
                accessibilityLabel="$LABEL"
                ...
              >
          - pattern: |
              <TextInput
                ...
                testID="password"
                ...
              />
      - metavariable-regex:
          metavariable: $LABEL
          regex: (?i).*(password|token|secret|key|pin|cvv|ssn).*
    message: |
      Sensitive data in accessibility props (OWASP M6/M8).
      Accessibility labels can expose sensitive information.

      SECURITY RISKS:
      - Screen readers announce secrets
      - Test IDs reveal sensitive fields
      - Automation tools access data

      VULNERABLE PATTERNS:
      ```javascript
      // VULNERABLE: Password in accessibility
      <TextInput
        accessibilityLabel="Enter your password"
        secureTextEntry={true}
      />

      // VULNERABLE: Sensitive testID
      <TextInput
        testID="password_input"
        secureTextEntry={true}
      />

      // VULNERABLE: Token in label
      <Text accessibilityLabel={`Token: ${authToken}`}>
        Token
      </Text>
      ```

      SECURE FIX:
      ```javascript
      // Secure accessibility
      <TextInput
        accessibilityLabel="Secure credential field"
        accessibleViewIsModal={true}
        secureTextEntry={true}
      />

      // Generic testID
      <TextInput
        testID="secure_input_1"
        secureTextEntry={true}
      />

      // No sensitive data in labels
      <Text accessibilityLabel="Authentication token">
        {authToken ? '***' : 'Not set'}
      </Text>
      ```

      Reference: OWASP M6, M8, WCAG, MASVS-PRIVACY-1
