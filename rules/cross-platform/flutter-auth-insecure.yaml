      SECURE IMPLEMENTATION:
      ```dart
      import 'package:firebase_auth/firebase_auth.dart';

      class SecureFirebaseRegistration {
        final FirebaseAuth _auth = FirebaseAuth.instance;

        Future<bool> registerAndVerify(String email, String password) async {
          try {
            // Create user account
            final userCredential = await _auth.createUserWithEmailAndPassword(
              email: email,
              password: password,
            );

            final user = userCredential.user;
            if (user == null) return false;

            // SECURE: Send email verification
            await user.sendEmailVerification();

            // Sign out until email is verified
            await _auth.signOut();

            // Show verification message
            showDialog(
              context: context,
              builder: (context) => AlertDialog(
                title: Text('Verify Your Email'),
                content: Text(
                  'A verification email has been sent to $email. '
                  'Please verify your email before signing in.'
                ),
              ),
            );

            return true;
          } catch (e) {
            print('Registration error: $e');
            return false;
          }
        }

        Future<bool> signInWithVerification(String email, String password) async {
          try {
            final userCredential = await _auth.signInWithEmailAndPassword(
              email: email,
              password: password,
            );

            final user = userCredential.user;
            if (user == null) return false;

            // SECURE: Check email verification status
            if (!user.emailVerified) {
              await _auth.signOut();

              showDialog(
                context: context,
                builder: (context) => AlertDialog(
                  title: Text('Email Not Verified'),
                  content: Text(
                    'Please verify your email before signing in. '
                    'Check your inbox for the verification link.'
                  ),
                  actions: [
                    TextButton(
                      onPressed: () async {
                        await user.sendEmailVerification();
                        Navigator.pop(context);
                      },
                      child: Text('Resend Verification Email'),
                    ),
                  ],
                ),
              );

              return false;
            }

            return true;
          } catch (e) {
            print('Sign-in error: $e');
            return false;
          }
        }

        // Periodically check verification status
        Future<void> monitorEmailVerification() async {
          final user = _auth.currentUser;
          if (user == null || user.emailVerified) return;

          // Reload user to get latest verification status
          await user.reload();
          final updatedUser = _auth.currentUser;

          if (updatedUser?.emailVerified == true) {
            // Email verified, proceed to app
            navigateToHome();
          }
        }
      }
