rules:
  # Flutter Authentication/Authorization Security Rules
  # OWASP Mobile Top 10 2024 - M3: Insecure Authentication/Authorization
  # Comprehensive detection of authentication vulnerabilities in Flutter apps
  # Coverage: Biometrics, JWT, OAuth, session management, password policies

  # ============================================================================
  # BIOMETRIC AUTHENTICATION VULNERABILITIES
  # ============================================================================

  - id: flutter-biometric-event-based-no-crypto
    patterns:
      - pattern-either:
          - pattern: |
              $AUTH.authenticate(
                ...,
                options: AuthenticationOptions(...)
              )
          - pattern: |
              await $AUTH.authenticate(...)
      - pattern-not-inside: |
          final cipher = ...
          ...
          await $AUTH.authenticate(
            ...,
            options: AuthenticationOptions(
              ...,
              biometricOnly: true,
              ...
            )
          )
      - pattern-not-inside: |
          final authenticated = await $AUTH.authenticate(...)
          if (authenticated) {
            final key = await _getEncryptedKey(...)
            ...
          }
    message: |
      Event-based biometric authentication without cryptographic binding (OWASP M3).

      VULNERABILITY:
      Relying only on the boolean result of biometric authentication without
      cryptographic operations allows attackers to bypass biometrics via:
      - Frida/Xposed hooking to return true
      - Binary patching
      - Runtime manipulation

      VULNERABLE PATTERN:
      ```dart
      // VULNERABLE: Event-based biometric auth
      import 'package:local_auth/local_auth.dart';

      class InsecureBiometricAuth {
        final LocalAuthentication auth = LocalAuthentication();

        Future<void> authenticateUser() async {
          try {
            final authenticated = await auth.authenticate(
              localizedReason: 'Please authenticate',
              options: const AuthenticationOptions(
                biometricOnly: true,
                stickyAuth: true,
              ),
            );

            // VULNERABLE: Just checking boolean result
            if (authenticated) {
              // Grant access to sensitive data
              await loadSensitiveData();
            }
          } catch (e) {
            print('Authentication error: $e');
          }
        }
      }
      ```

      ATTACK SCENARIO:
      ```javascript
      // Frida script to bypass biometric check
      Java.perform(function() {
        var LocalAuthentication = Java.use('io.flutter.plugins.localauth.LocalAuthPlugin');
        LocalAuthentication.authenticate.implementation = function() {
          console.log('[*] Biometric authentication bypassed!');
          return true; // Always return success
        };
      });
      ```

      SECURE IMPLEMENTATION - Crypto-bound biometrics:
      ```dart
      import 'package:local_auth/local_auth.dart';
      import 'package:flutter_secure_storage/flutter_secure_storage.dart';
      import 'package:pointycastle/export.dart';

      class SecureBiometricAuth {
        final LocalAuthentication _auth = LocalAuthentication();
        final FlutterSecureStorage _storage = FlutterSecureStorage(
          aOptions: AndroidOptions(
            encryptedSharedPreferences: true,
            // Use biometric-protected keystore
            biometricOnly: true,
          ),
          iOptions: IOSOptions(
            accessibility: KeychainAccessibility.when_passcode_set_this_device_only,
            // Require biometric or passcode
            authenticationPrompt: 'Authenticate to access data',
          ),
        );

        // Initialize biometric-protected encryption
        Future<void> setupBiometricKey() async {
          // Generate encryption key during first setup
          final keyBytes = _generateSecureKey();
          final keyB64 = base64Encode(keyBytes);

          // Store key in biometric-protected storage
          await _storage.write(
            key: 'biometric_encryption_key',
            value: keyB64,
            aOptions: AndroidOptions(
              biometricOnly: true,
            ),
            iOptions: IOSOptions(
              accessibility: KeychainAccessibility.when_passcode_set_this_device_only,
              accessGroup: 'com.myapp.biometric',
            ),
          );
        }

        // Authenticate with crypto-bound biometrics
        Future<String?> authenticateAndDecryptData(String encryptedData) async {
          try {
            // Check biometric availability
            final canAuthenticate = await _auth.canCheckBiometrics;
            if (!canAuthenticate) {
              throw Exception('Biometric authentication not available');
            }

            // Attempt biometric authentication
            final authenticated = await _auth.authenticate(
              localizedReason: 'Authenticate to access sensitive data',
              options: const AuthenticationOptions(
                biometricOnly: true,
                stickyAuth: true,
                sensitiveTransaction: true,
              ),
            );

            if (!authenticated) {
              return null;
            }

            // SECURE: Retrieve encryption key from biometric-protected storage
            // This operation REQUIRES successful biometric authentication
            final keyB64 = await _storage.read(
              key: 'biometric_encryption_key',
              aOptions: AndroidOptions(
                biometricOnly: true,
              ),
              iOptions: IOSOptions(
                authenticationPrompt: 'Authenticate to decrypt data',
              ),
            );

            if (keyB64 == null) {
              throw Exception('Encryption key not found');
            }

            final key = base64Decode(keyB64);

            // Decrypt data using biometric-protected key
            return _decryptData(encryptedData, key);
          } catch (e) {
            print('Biometric authentication failed: $e');
            return null;
          }
        }

        // Encrypt sensitive data
        Future<String> encryptData(String plaintext) async {
          final keyB64 = await _storage.read(key: 'biometric_encryption_key');
          if (keyB64 == null) {
            throw Exception('Encryption key not initialized');
          }

          final key = base64Decode(keyB64);
          return _encryptData(plaintext, key);
        }

        Uint8List _generateSecureKey() {
          final random = FortunaRandom();
          final seed = List<int>.generate(32, (_) => Random.secure().nextInt(256));
          random.seed(KeyParameter(Uint8List.fromList(seed)));
          return random.nextBytes(32);
        }

        String _encryptData(String plaintext, Uint8List key) {
          final iv = _generateIV();
          final cipher = GCMBlockCipher(AESEngine())
            ..init(
              true,
              AEADParameters(KeyParameter(key), 128, iv, Uint8List(0))
            );

          final plaintextBytes = utf8.encode(plaintext);
          final ciphertext = cipher.process(Uint8List.fromList(plaintextBytes));

          // Return IV + ciphertext
          return base64Encode([...iv, ...ciphertext]);
        }

        String _decryptData(String encrypted, Uint8List key) {
          final data = base64Decode(encrypted);
          final iv = data.sublist(0, 16);
          final ciphertext = data.sublist(16);

          final cipher = GCMBlockCipher(AESEngine())
            ..init(
              false,
              AEADParameters(KeyParameter(key), 128, iv, Uint8List(0))
            );

          final plaintext = cipher.process(ciphertext);
          return utf8.decode(plaintext);
        }

        Uint8List _generateIV() {
          final random = Random.secure();
          return Uint8List.fromList(
            List<int>.generate(16, (_) => random.nextInt(256))
          );
        }
      }
      ```

      PLATFORM-SPECIFIC SECURITY:

      **Android (BiometricPrompt + Keystore):**
      - Use `setUserAuthenticationRequired(true)` in Keystore
      - Set `setUserAuthenticationValidityDurationSeconds(0)` for per-use auth
      - Keys protected by Secure Element (StrongBox) on supported devices

      **iOS (Face ID/Touch ID + Keychain):**
      - Use `kSecAccessControlBiometryCurrentSet` for biometric binding
      - Store encryption keys in Keychain with Secure Enclave protection
      - Use `kSecAttrAccessibleWhenPasscodeSetThisDeviceOnly`

      BEST PRACTICES:
      - NEVER rely on biometric callback boolean alone
      - ALWAYS bind biometric auth to cryptographic operations
      - Use hardware-backed keystores (Android KeyStore, iOS Secure Enclave)
      - Require biometric re-authentication for sensitive operations
      - Invalidate biometric keys when biometrics change
      - Implement fallback to strong password/PIN

      TESTING:
      ```dart
      // Test biometric bypass resistance
      test('Biometric authentication requires crypto validation', () async {
        final auth = SecureBiometricAuth();

        // Mock biometric success but without valid key
        // Should fail to decrypt
        final result = await auth.authenticateAndDecryptData(encryptedData);
        expect(result, isNull);
      });
      ```

      References:
      - OWASP MASTG: MASTG-TEST-0025 (Biometric Authentication)
      - CWE-287: Improper Authentication
      - MASVS-AUTH-3: The app secures sensitive operations with additional authentication
    severity: ERROR
    languages:
      - dart
    metadata:
      category: security
      cwe: "CWE-287: Improper Authentication"
      owasp-mobile-2024: "M3: Insecure Authentication/Authorization"
      masvs-v2: "MASVS-AUTH-3"
      confidence: HIGH
      likelihood: MEDIUM
      impact: HIGH
      subcategory:
        - vuln

  - id: flutter-biometric-no-fallback
    patterns:
      - pattern: |
          $AUTH.authenticate(
            ...,
            options: AuthenticationOptions(
              biometricOnly: true,
              ...
            )
          )
      - pattern-not-inside: |
          try {
            ...
            await $AUTH.authenticate(...)
            ...
          } catch ($E) {
            ...
            await _authenticateWithPassword(...)
            ...
          }
      - pattern-not-inside: |
          final result = await $AUTH.authenticate(...)
          if (!result) {
            await _showPasswordDialog(...)
            ...
          }
    message: |
      Biometric authentication without password/PIN fallback (OWASP M3).

      RISK:
      Biometric-only authentication can lock users out if:
      - Biometric hardware fails
      - Biometric enrollment is removed
      - Device doesn't support biometrics
      - Too many failed biometric attempts

      SECURE IMPLEMENTATION:
      ```dart
      class BiometricWithFallback {
        final LocalAuthentication _auth = LocalAuthentication();

        Future<bool> authenticate() async {
          try {
            // Try biometric first
            final biometricAvailable = await _auth.canCheckBiometrics;

            if (biometricAvailable) {
              final authenticated = await _auth.authenticate(
                localizedReason: 'Authenticate to continue',
                options: const AuthenticationOptions(
                  biometricOnly: true,
                  stickyAuth: true,
                ),
              );

              if (authenticated) return true;
            }

            // Fallback to password/PIN
            return await _showPasswordDialog();
          } catch (e) {
            // Biometric failed, use password fallback
            return await _showPasswordDialog();
          }
        }

        Future<bool> _showPasswordDialog() async {
          // Implement secure password verification
          // Verify against server-side hash, not client-side
          return false;
        }
      }
      ```

      Reference: MASVS-AUTH-3, CWE-306
    severity: WARNING
    languages:
      - dart
    metadata:
      category: security
      cwe: "CWE-306: Missing Authentication for Critical Function"
      owasp-mobile-2024: "M3: Insecure Authentication/Authorization"
      confidence: MEDIUM

  # ============================================================================
  # JWT TOKEN VALIDATION VULNERABILITIES
  # ============================================================================

  - id: flutter-jwt-no-signature-verification
    patterns:
      - pattern-either:
          - pattern: |
              JWT.decode($TOKEN)
          - pattern: |
              JwtDecoder.decode($TOKEN)
          - pattern: |
              JsonWebToken.decode($TOKEN)
      - pattern-not-inside: |
          JWT.verify($TOKEN, $SECRET)
          ...
      - pattern-not-inside: |
          JwtDecoder.isExpired($TOKEN)
          ...
          final verified = JwtDecoder.tryDecode($TOKEN)
          ...
    message: |
      JWT decoded without signature verification (OWASP M3).

      VULNERABILITY:
      Decoding JWTs without verifying signatures allows attackers to:
      - Forge tokens with elevated privileges
      - Modify token claims (user ID, roles, permissions)
      - Create tokens with "none" algorithm
      - Bypass authentication entirely

      VULNERABLE PATTERN:
      ```dart
      import 'package:jwt_decoder/jwt_decoder.dart';

      class InsecureJWT {
        void processToken(String token) {
          // VULNERABLE: Decode without verification
          Map<String, dynamic> payload = JwtDecoder.decode(token);

          String userId = payload['user_id'];
          bool isAdmin = payload['admin'] ?? false;

          // Grant access based on unverified claims
          if (isAdmin) {
            grantAdminAccess();
          }
        }
      }
      ```

      ATTACK SCENARIO:
      ```bash
      # Attacker creates forged JWT with admin claim
      # Using https://jwt.io or custom script

      # Header (alg: none)
      {
        "alg": "none",
        "typ": "JWT"
      }

      # Payload (forged admin claim)
      {
        "user_id": "attacker123",
        "admin": true,
        "exp": 9999999999
      }

      # Signature: (empty for "none" algorithm)

      # Final forged token:
      eyJhbGciOiJub25lIiwidHlwIjoiSldUIn0.eyJ1c2VyX2lkIjoiYXR0YWNrZXIxMjMiLCJhZG1pbiI6dHJ1ZSwiZXhwIjo5OTk5OTk5OTk5fQ.

      # App decodes without verification → Admin access granted!
      ```

      SECURE IMPLEMENTATION:
      ```dart
      import 'package:dart_jsonwebtoken/dart_jsonwebtoken.dart';
      import 'package:flutter_secure_storage/flutter_secure_storage.dart';

      class SecureJWTHandler {
        final FlutterSecureStorage _storage = FlutterSecureStorage();

        // IMPORTANT: In production, get public key from secure backend
        // NEVER hardcode private keys in mobile app
        Future<String?> getPublicKey() async {
          // Fetch from secure backend or app signing
          return await _storage.read(key: 'jwt_public_key');
        }

        Future<Map<String, dynamic>?> verifyAndDecodeToken(String token) async {
          try {
            // Get public key (for RS256, ES256)
            final publicKeyPEM = await getPublicKey();

            if (publicKeyPEM == null) {
              throw Exception('Public key not available');
            }

            // SECURE: Verify signature before trusting claims
            final jwt = JWT.verify(
              token,
              RSAPublicKey(publicKeyPEM),
              // Specify allowed algorithms (prevent "none" algorithm attack)
              checkExpiresIn: true,
              checkNotBefore: true,
            );

            // Additional validations
            if (!_validateClaims(jwt.payload)) {
              throw JWTException('Invalid token claims');
            }

            return jwt.payload as Map<String, dynamic>;
          } on JWTExpiredException {
            print('Token expired');
            return null;
          } on JWTException catch (e) {
            print('Invalid token: $e');
            return null;
          }
        }

        bool _validateClaims(dynamic payload) {
          if (payload is! Map<String, dynamic>) return false;

          // Validate issuer
          if (payload['iss'] != 'https://your-auth-server.com') {
            return false;
          }

          // Validate audience
          if (payload['aud'] != 'your-mobile-app') {
            return false;
          }

          // Validate token type
          if (payload['typ'] != 'Bearer') {
            return false;
          }

          return true;
        }

        // For symmetric key verification (HS256) - less recommended for mobile
        Future<Map<String, dynamic>?> verifyHMACToken(String token) async {
          try {
            // HMAC secret should NEVER be in mobile app
            // This is only for backend verification
            // Mobile apps should use asymmetric verification (RS256, ES256)
            throw UnimplementedError(
              'HMAC verification should be done server-side. '
              'Use RS256/ES256 for mobile apps.'
            );
          } catch (e) {
            return null;
          }
        }
      }

      // Usage
      final jwtHandler = SecureJWTHandler();

      Future<void> handleAuthToken(String token) async {
        final payload = await jwtHandler.verifyAndDecodeToken(token);

        if (payload != null) {
          final userId = payload['sub'];
          final roles = payload['roles'] as List?;

          // Now safe to use verified claims
          if (roles?.contains('admin') == true) {
            grantAdminAccess();
          }
        } else {
          // Invalid token - logout user
          await logout();
        }
      }
      ```

      JWT SECURITY BEST PRACTICES:

      1. **Algorithm Security:**
         - ✅ Use: RS256, ES256, PS256 (asymmetric)
         - ⚠️ Avoid: HS256 (symmetric) in mobile apps
         - ❌ Never: "none" algorithm

      2. **Key Management:**
         - Store public keys securely (not hardcoded)
         - Fetch public keys from backend (with cert pinning)
         - NEVER include private keys in mobile app
         - Rotate keys periodically

      3. **Validation Checks:**
         - Verify signature (always!)
         - Check expiration (exp claim)
         - Check not-before (nbf claim)
         - Validate issuer (iss claim)
         - Validate audience (aud claim)
         - Validate token type

      4. **Token Storage:**
         - Store tokens in flutter_secure_storage
         - Never in SharedPreferences
         - Clear tokens on logout
         - Implement token refresh flow

      TESTING:
      ```dart
      test('JWT verification rejects tampered tokens', () async {
        final handler = SecureJWTHandler();

        // Valid token
        final validToken = 'eyJ...';
        final validPayload = await handler.verifyAndDecodeToken(validToken);
        expect(validPayload, isNotNull);

        // Tampered token (modified payload)
        final tamperedToken = validToken.replaceFirst('user', 'admin');
        final tamperedPayload = await handler.verifyAndDecodeToken(tamperedToken);
        expect(tamperedPayload, isNull); // Should reject

        // None algorithm attack
        final noneAlgToken = 'eyJhbGciOiJub25lIn0...';
        final nonePayload = await handler.verifyAndDecodeToken(noneAlgToken);
        expect(nonePayload, isNull); // Should reject
      });
      ```

      References:
      - OWASP JWT Cheat Sheet
      - CWE-347: Improper Verification of Cryptographic Signature
      - RFC 7519: JSON Web Token (JWT)
