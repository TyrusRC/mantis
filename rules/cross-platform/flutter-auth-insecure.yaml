    languages:
      - dart
    metadata:
      category: security
      cwe: "CWE-347: Improper Verification of Cryptographic Signature"
      owasp-mobile-2024: "M3: Insecure Authentication/Authorization"
      confidence: HIGH

  - id: flutter-jwt-hardcoded-secret
    patterns:
      - pattern-either:
          - pattern: |
              JWT.sign($PAYLOAD, SecretKey('$SECRET'))
          - pattern: |
              JWT.verify($TOKEN, SecretKey('$SECRET'))
          - pattern: |
              final secret = '$SECRET';
              ...
              JWT.sign($PAYLOAD, SecretKey(secret))
      - metavariable-regex:
          metavariable: $SECRET
          regex: ^[A-Za-z0-9+/=]{16,}$
    message: |
      JWT with hardcoded secret key (OWASP M3).

      RISK:
      Hardcoded JWT secrets can be extracted via:
      - APK/IPA decompilation
      - Binary analysis tools
      - Runtime memory inspection
      - Frida/objection hooking

      Once extracted, attackers can:
      - Forge valid tokens for any user
      - Bypass authentication completely
      - Escalate privileges to admin

      SECURE IMPLEMENTATION:
      ```dart
      // WRONG: Mobile apps should NEVER sign JWTs
      // JWT signing should ONLY happen on backend server

      // Mobile apps should only:
      // 1. Verify JWT signatures (using public key)
      // 2. Read verified claims
      // 3. Store tokens securely

      class ProperMobileJWTUsage {
        // ✅ CORRECT: Verify with public key
        Future<bool> verifyToken(String token, String publicKeyPEM) async {
          try {
            JWT.verify(token, RSAPublicKey(publicKeyPEM));
            return true;
          } catch (e) {
            return false;
          }
        }

        // ❌ WRONG: Never sign tokens in mobile app
        String signToken(Map<String, dynamic> payload) {
          throw UnimplementedError(
            'Token signing must be done on backend server, not mobile app!'
          );
        }
      }
      ```

      Reference: CWE-798, OWASP M3
    severity: ERROR
    languages:
