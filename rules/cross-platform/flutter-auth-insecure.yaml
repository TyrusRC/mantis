  # ============================================================================
  # OAUTH & OIDC VULNERABILITIES
  # ============================================================================

  - id: flutter-oauth-no-pkce
    patterns:
      - pattern-either:
          - pattern: |
              FlutterAppAuth().$METHOD(
                AuthorizationTokenRequest(
                  ...,
                  redirectUrl: $REDIRECT,
                  ...
                )
              )
          - pattern: |
              appAuth.authorizeAndExchangeCode(
                AuthorizationTokenRequest(...)
              )
      - pattern-not: |
          AuthorizationTokenRequest(
            ...,
            codeVerifier: $VERIFIER,
            ...
          )
      - pattern-not: |
          AuthorizationTokenRequest(
            ...,
            additionalParameters: {'code_challenge': $CHALLENGE, ...},
            ...
          )
    message: |
      OAuth flow without PKCE (Proof Key for Code Exchange) (OWASP M3).

      VULNERABILITY:
      OAuth Authorization Code flow without PKCE is vulnerable to:
      - Authorization code interception
      - Malicious app registration with same redirect URI
      - Code replay attacks

      ATTACK SCENARIO:
      ```
      1. User initiates OAuth login in legitimate app
      2. Attacker intercepts authorization code via:
         - Malicious app with same redirect URI scheme
         - Custom URL scheme hijacking
         - Deep link interception
      3. Attacker exchanges code for access token
      4. Attacker gains access to victim's account
      ```

      VULNERABLE PATTERN:
      ```dart
      import 'package:flutter_appauth/flutter_appauth.dart';

      class InsecureOAuth {
        final FlutterAppAuth _appAuth = FlutterAppAuth();

        Future<void> login() async {
          // VULNERABLE: No PKCE
          final result = await _appAuth.authorizeAndExchangeCode(
            AuthorizationTokenRequest(
              'client_id',
              'com.myapp://oauth/callback',
              serviceConfiguration: AuthorizationServiceConfiguration(
                authorizationEndpoint: 'https://auth.example.com/authorize',
                tokenEndpoint: 'https://auth.example.com/token',
              ),
              scopes: ['openid', 'profile', 'email'],
            ),
          );

          if (result != null) {
            // Use access token
            await saveToken(result.accessToken);
          }
        }
      }
      ```

      SECURE IMPLEMENTATION with PKCE:
      ```dart
      import 'package:flutter_appauth/flutter_appauth.dart';
      import 'package:flutter_secure_storage/flutter_secure_storage.dart';
      import 'dart:convert';
      import 'dart:math';
      import 'package:crypto/crypto.dart';

      class SecureOAuthWithPKCE {
        final FlutterAppAuth _appAuth = FlutterAppAuth();
        final FlutterSecureStorage _storage = FlutterSecureStorage();

        // Generate PKCE code verifier and challenge
        Map<String, String> _generatePKCE() {
          // Generate random code verifier (43-128 characters)
          final random = Random.secure();
          final values = List<int>.generate(32, (_) => random.nextInt(256));
          final codeVerifier = base64Url
              .encode(values)
              .replaceAll('=', '')
              .replaceAll('+', '-')
              .replaceAll('/', '_');

          // Generate code challenge (SHA256 of verifier)
          final bytes = utf8.encode(codeVerifier);
          final digest = sha256.convert(bytes);
          final codeChallenge = base64Url
              .encode(digest.bytes)
              .replaceAll('=', '')
              .replaceAll('+', '-')
              .replaceAll('/', '_');

          return {
            'code_verifier': codeVerifier,
            'code_challenge': codeChallenge,
          };
        }

        Future<void> login() async {
          try {
            // Generate PKCE parameters
            final pkce = _generatePKCE();

            // SECURE: OAuth with PKCE
            final result = await _appAuth.authorizeAndExchangeCode(
              AuthorizationTokenRequest(
                'your_client_id',
                'com.myapp://oauth/callback',
                serviceConfiguration: AuthorizationServiceConfiguration(
                  authorizationEndpoint: 'https://auth.example.com/authorize',
                  tokenEndpoint: 'https://auth.example.com/token',
                ),
                scopes: ['openid', 'profile', 'email'],
                // PKCE parameters
                additionalParameters: {
                  'code_challenge': pkce['code_challenge']!,
                  'code_challenge_method': 'S256',
                },
                // Code verifier for token exchange
                codeVerifier: pkce['code_verifier'],
                // State parameter for CSRF protection
                nonce: _generateNonce(),
              ),
            );

            if (result != null) {
              // Store tokens securely
              await _storage.write(
                key: 'access_token',
                value: result.accessToken,
              );

              if (result.refreshToken != null) {
                await _storage.write(
                  key: 'refresh_token',
                  value: result.refreshToken,
                );
              }

              // Validate ID token if present
              if (result.idToken != null) {
                await _validateIDToken(result.idToken!);
              }
            }
          } catch (e) {
            print('OAuth error: $e');
          }
        }

        String _generateNonce() {
          final random = Random.secure();
          final values = List<int>.generate(16, (_) => random.nextInt(256));
          return base64Url.encode(values);
        }

        Future<void> _validateIDToken(String idToken) async {
          // Validate ID token signature and claims
          // Implementation depends on your identity provider
        }

        Future<void> refreshAccessToken() async {
          final refreshToken = await _storage.read(key: 'refresh_token');

          if (refreshToken == null) {
            throw Exception('No refresh token available');
          }

          try {
            final result = await _appAuth.token(
              TokenRequest(
                'your_client_id',
                'com.myapp://oauth/callback',
                refreshToken: refreshToken,
                serviceConfiguration: AuthorizationServiceConfiguration(
                  authorizationEndpoint: 'https://auth.example.com/authorize',
                  tokenEndpoint: 'https://auth.example.com/token',
                ),
              ),
            );

            if (result != null) {
              await _storage.write(
                key: 'access_token',
                value: result.accessToken,
              );

              if (result.refreshToken != null) {
                await _storage.write(
                  key: 'refresh_token',
                  value: result.refreshToken,
                );
              }
            }
          } catch (e) {
            print('Token refresh failed: $e');
            // Force re-authentication
            await logout();
          }
        }

        Future<void> logout() async {
          await _storage.delete(key: 'access_token');
          await _storage.delete(key: 'refresh_token');

          // Optional: Revoke tokens on server
          // await revokeTokens();
        }
      }
