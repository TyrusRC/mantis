rules:
  # Flutter OWASP M8: Security Misconfiguration Detection Rules
  # Comprehensive coverage of Flutter Android/iOS configuration issues
  # Sources: OWASP Mobile Top 10 2024, Flutter Security Best Practices, MASVS
  # Focus: Build configurations, manifest/plist issues, permission misconfigurations

  # ============ ANDROID BUILD CONFIGURATION ============

  - id: flutter-android-debuggable-production
    patterns:
      - pattern: |
          <application
            ...
            android:debuggable="true"
            ...
          />
    message: |
      Debuggable flag enabled in Flutter Android app (OWASP M8 - Critical).
      Debug mode in production allows attackers to inspect app behavior and extract data.

      SECURITY IMPACT:
      - ADB debugging enabled without permission
      - Runtime inspection and memory dumps
      - Security controls bypassed
      - Internal app logic exposed
      - Google Play rejection risk

      SECURE FIX:
      ```xml
      <!-- Remove debuggable flag - Gradle controls this -->
      <application
          android:label="@string/app_name">
      </application>
      ```

      ```gradle
      // android/app/build.gradle
      android {
          buildTypes {
              release {
                  debuggable false
                  minifyEnabled true
                  shrinkResources true
              }
          }
      }
      ```

      Reference: OWASP M8, MASVS-RESILIENCE-2, CWE-489
    severity: ERROR
    languages:
      - xml
    paths:
      include:
        - "**/AndroidManifest.xml"
    metadata:
      category: security
      cwe: "CWE-489: Active Debug Code"
      owasp-mobile-2024: "M8: Security Misconfiguration"
      masvs: "MASVS-RESILIENCE-2"
      confidence: VERY_HIGH

  - id: flutter-android-backup-unrestricted
    patterns:
      - pattern: |
          <application
            ...
            android:allowBackup="true"
            ...
          />
      - pattern-not-inside: |
          <application
            ...
            android:fullBackupContent="@xml/backup_rules"
            ...
          />
    message: |
      Unrestricted backup in Flutter Android app (OWASP M8).
      Auto Backup can expose sensitive data through ADB or cloud backup.

      SECURITY RISKS:
      - SharedPreferences backed up (may contain tokens/keys)
      - Database files exposed (SQLite, Hive, ObjectBox)
      - Flutter secure storage may be compromised
      - No encryption for backup data

      ATTACK SCENARIO:
      ```bash
      adb backup -f backup.ab com.example.app
      dd if=backup.ab bs=24 skip=1 | openssl zlib -d > backup.tar
      tar -xvf backup.tar
      # Extract shared_prefs, databases, files
      ```

      SECURE FIX:
      ```xml
      <application
          android:allowBackup="true"
          android:fullBackupContent="@xml/backup_rules"
          android:dataExtractionRules="@xml/data_extraction_rules">
      </application>
      ```

      ```xml
      <!-- res/xml/backup_rules.xml -->
      <?xml version="1.0" encoding="utf-8"?>
      <full-backup-content>
          <exclude domain="sharedpref" path="FlutterSecureStorage"/>
          <exclude domain="database" path="app.db"/>
          <exclude domain="file" path="secure/"/>
      </full-backup-content>
      ```

      Reference: OWASP M8, MASVS-STORAGE-2, CWE-530
    severity: WARNING
    languages:
      - xml
    paths:
      include:
        - "**/AndroidManifest.xml"
    metadata:
      category: security
      cwe: "CWE-530: Exposure of Backup File"
      owasp-mobile-2024: "M8: Security Misconfiguration"
      masvs: "MASVS-STORAGE-2"
      confidence: HIGH

  - id: flutter-android-cleartext-traffic-allowed
    patterns:
      - pattern: |
          <application
            ...
            android:usesCleartextTraffic="true"
            ...
          />
      - pattern-not-inside: |
          <application
            ...
            android:networkSecurityConfig="@xml/network_security_config"
            ...
          />
    message: |
      Cleartext HTTP traffic permitted in Flutter app (OWASP M8 - Critical).
      HTTP connections enable man-in-the-middle attacks on Flutter network calls.

      SECURITY IMPACT:
      - Flutter http/dio requests over HTTP
      - API credentials intercepted
      - OAuth tokens stolen
      - Data manipulation
      - Session hijacking

      FLUTTER SECURE FIX:
      ```xml
      <application
          android:networkSecurityConfig="@xml/network_security_config">
      </application>
      ```

      ```xml
      <!-- res/xml/network_security_config.xml -->
      <network-security-config>
          <base-config cleartextTrafficPermitted="false"/>

          <!-- Dev only: localhost -->
          <domain-config cleartextTrafficPermitted="true">
              <domain includeSubdomains="true">localhost</domain>
              <domain includeSubdomains="true">10.0.2.2</domain>
          </domain-config>

          <!-- Production: Certificate pinning -->
          <domain-config>
              <domain includeSubdomains="true">api.example.com</domain>
              <pin-set expiration="2025-12-31">
                  <pin digest="SHA-256">base64hash==</pin>
              </pin-set>
          </domain-config>
      </network-security-config>
      ```

      FLUTTER CODE:
      ```dart
      import 'package:http/http.dart' as http;

      class SecureClient {
        static Future<http.Response> get(String url) async {
          if (!url.startsWith('https://')) {
            throw SecurityException('Only HTTPS allowed');
          }
          return await http.get(Uri.parse(url));
        }
      }
      ```

      Reference: OWASP M5, M8, MASVS-NETWORK-1, CWE-319
    severity: ERROR
    languages:
      - xml
    paths:
      include:
        - "**/AndroidManifest.xml"
    metadata:
      category: security
      cwe: "CWE-319: Cleartext Transmission"
      owasp-mobile-2024: "M8: Security Misconfiguration"
      masvs: "MASVS-NETWORK-1"
      confidence: VERY_HIGH

  - id: flutter-android-exported-component-unprotected
    patterns:
      - pattern-either:
          - pattern: |
              <activity
                ...
                android:exported="true"
                ...
              />
          - pattern: |
              <service
                ...
                android:exported="true"
                ...
              />
      - pattern-not-inside: |
          android:permission="..."
      - pattern-not-inside: |
          <intent-filter>
            ...
            <action android:name="android.intent.action.MAIN" />
            ...
          </intent-filter>
    message: |
      Exported component without permission protection (OWASP M8).
      Exported Flutter Android components are accessible to all apps.

      SECURITY RISKS:
      - Any app can send intents to component
      - Intent injection attacks
      - Unauthorized access to Flutter screens
      - Data leakage through intent extras

      SECURE FIX:
      ```xml
      <!-- Option 1: Don't export if not needed -->
      <activity
          android:name=".MainActivity"
          android:exported="false"/>

      <!-- Option 2: Add permission protection -->
      <permission
          android:name="com.example.app.FLUTTER_SCREEN"
          android:protectionLevel="signature"/>

      <activity
          android:name=".PaymentActivity"
          android:exported="true"
          android:permission="com.example.app.FLUTTER_SCREEN"/>
      ```

      Reference: OWASP M8, MASVS-PLATFORM-1, CWE-926
    severity: WARNING
    languages:
      - xml
    paths:
      include:
        - "**/AndroidManifest.xml"
    metadata:
      category: security
      cwe: "CWE-926: Improper Export of Android Components"
      owasp-mobile-2024: "M8: Security Misconfiguration"
      masvs: "MASVS-PLATFORM-1"
      confidence: HIGH

  - id: flutter-android-deep-link-no-verification
    patterns:
      - pattern: |
          <intent-filter>
            ...
            <data android:scheme="$SCHEME" />
            ...
          </intent-filter>
      - pattern-not: |
          <intent-filter android:autoVerify="true">
            ...
          </intent-filter>
      - metavariable-regex:
          metavariable: $SCHEME
          regex: ^(?!https?).*$
    message: |
      Flutter deep link without App Links verification (OWASP M8).
      Custom URL schemes can be hijacked by malicious apps.

      SECURITY RISKS:
      - Multiple apps can register same scheme
      - No ownership verification
      - Phishing via scheme hijacking
      - Credential theft from Flutter screens

      VULNERABLE PATTERN:
      ```xml
      <intent-filter>
          <action android:name="android.intent.action.VIEW"/>
          <category android:name="android.intent.category.BROWSABLE"/>
          <data android:scheme="myapp"/>
      </intent-filter>
      ```

      SECURE FIX - App Links:
      ```xml
      <intent-filter android:autoVerify="true">
          <action android:name="android.intent.action.VIEW"/>
          <category android:name="android.intent.category.DEFAULT"/>
          <category android:name="android.intent.category.BROWSABLE"/>
          <data
              android:scheme="https"
              android:host="example.com"
              android:pathPrefix="/app"/>
      </intent-filter>
      ```

      FLUTTER IMPLEMENTATION:
      ```dart
      import 'package:uni_links/uni_links.dart';

      class DeepLinkHandler {
        Future<void> handleLink(Uri? uri) async {
          if (uri == null) return;

          // Validate HTTPS
          if (uri.scheme != 'https') {
            throw SecurityException('Only HTTPS deep links');
          }

          // Validate host
          if (!['example.com'].contains(uri.host)) {
            throw SecurityException('Untrusted host');
          }

          _navigate(uri);
        }
      }
      ```

      Reference: OWASP M8, MASVS-PLATFORM-2, CWE-939
    severity: WARNING
    languages:
      - xml
    paths:
      include:
        - "**/AndroidManifest.xml"
    metadata:
      category: security
      cwe: "CWE-939: Improper Authorization in URL Scheme Handler"
      owasp-mobile-2024: "M8: Security Misconfiguration"
      masvs: "MASVS-PLATFORM-2"
      confidence: HIGH

  - id: flutter-android-min-sdk-too-low
    patterns:
      - pattern: |
          <uses-sdk
            ...
            android:minSdkVersion="$VERSION"
            ...
          />
      - metavariable-comparison:
          metavariable: $VERSION
          comparison: $VERSION < 21
    message: |
      Minimum SDK version too low for Flutter (OWASP M8).
      Flutter officially supports Android API 21+ (Android 5.0).

      SECURITY FEATURES MISSING < API 21:
      - Modern TLS cipher suites
      - Hardware-backed keystore
      - Runtime permissions (API 23+)
      - Network Security Config (API 24+)

      FLUTTER RECOMMENDATION:
      ```xml
      <uses-sdk
          android:minSdkVersion="21"
          android:targetSdkVersion="33"/>
      ```

      Reference: OWASP M8, Flutter Platform Support
    severity: WARNING
    languages:
      - xml
    paths:
      include:
        - "**/AndroidManifest.xml"
    metadata:
      category: security
      owasp-mobile-2024: "M8: Security Misconfiguration"
      confidence: MEDIUM

  # ============ iOS INFO.PLIST CONFIGURATION ============

  - id: flutter-ios-ats-disabled-globally
    patterns:
      - pattern: |
          <key>NSAppTransportSecurity</key>
          <dict>
            <key>NSAllowsArbitraryLoads</key>
            <true/>
          </dict>
    message: |
      App Transport Security disabled globally in Flutter iOS (OWASP M8).
      Disabling ATS allows insecure HTTP and weak TLS for all connections.

      SECURITY IMPACT:
      - Flutter http/dio calls over HTTP
      - Weak TLS versions accepted
      - Man-in-the-middle attacks
      - App Store rejection risk

      SECURE FIX:
      ```xml
      <!-- Remove global ATS exception -->
      <!-- ATS enabled by default on iOS 9+ -->

      <!-- If legacy API needed, use specific domain -->
      <key>NSAppTransportSecurity</key>
      <dict>
          <key>NSExceptionDomains</key>
          <dict>
              <key>legacy-api.example.com</key>
              <dict>
                  <key>NSExceptionMinimumTLSVersion</key>
                  <string>TLSv1.2</string>
              </dict>
          </dict>
      </dict>
      ```

      FLUTTER ENFORCEMENT:
      ```dart
      import 'package:http/http.dart' as http;

      class SecureIOSClient {
        static Future<http.Response> get(String url) async {
          if (!url.startsWith('https://')) {
            throw SecurityException('iOS ATS requires HTTPS');
          }
          return await http.get(Uri.parse(url));
        }
      }
      ```

      Reference: OWASP M8, MASVS-NETWORK-1, Apple ATS
    severity: ERROR
    languages:
      - xml
    paths:
      include:
        - "**/Info.plist"
    metadata:
      category: security
      cwe: "CWE-319: Cleartext Transmission"
      owasp-mobile-2024: "M8: Security Misconfiguration"
      masvs: "MASVS-NETWORK-1"
      confidence: VERY_HIGH
      platform: ios

  - id: flutter-ios-custom-url-scheme-insecure
    patterns:
      - pattern: |
          <key>CFBundleURLTypes</key>
          <array>
            <dict>
              ...
              <key>CFBundleURLSchemes</key>
              <array>
                <string>$SCHEME</string>
              </array>
              ...
            </dict>
          </array>
      - metavariable-regex:
          metavariable: $SCHEME
          regex: ^(?!https?).*$
    message: |
      Flutter iOS custom URL scheme without Universal Links (OWASP M8).
      Custom schemes are vulnerable to hijacking on iOS.

      SECURITY RISKS:
      - Multiple apps can register same scheme
      - No ownership verification
      - Phishing attacks on Flutter screens
      - Data interception

      SECURE FIX - Universal Links:
      ```xml
      <key>com.apple.developer.associated-domains</key>
      <array>
          <string>applinks:example.com</string>
      </array>
      ```

      FLUTTER DEEP LINKING:
      ```dart
      import 'package:uni_links/uni_links.dart';

      class UniversalLinkHandler {
        Future<void> handleLink(Uri? uri) async {
          if (uri == null) return;

          if (uri.scheme != 'https') {
            throw SecurityException('Only HTTPS universal links');
          }

          if (!['example.com'].contains(uri.host)) {
            throw SecurityException('Untrusted domain');
          }

          _navigate(uri);
        }
      }
      ```

      Reference: OWASP M8, MASVS-PLATFORM-2, Apple Universal Links
    severity: WARNING
    languages:
      - xml
    paths:
      include:
        - "**/Info.plist"
    metadata:
      category: security
      cwe: "CWE-939: Improper Authorization in URL Scheme Handler"
      owasp-mobile-2024: "M8: Security Misconfiguration"
      masvs: "MASVS-PLATFORM-2"
      confidence: HIGH
      platform: ios

  - id: flutter-ios-privacy-description-insufficient
    patterns:
      - pattern-either:
          - pattern: |
              <key>NSCameraUsageDescription</key>
              <string>$DESC</string>
          - pattern: |
              <key>NSLocationAlwaysUsageDescription</key>
              <string>$DESC</string>
          - pattern: |
              <key>NSPhotoLibraryUsageDescription</key>
              <string>$DESC</string>
      - metavariable-regex:
          metavariable: $DESC
          regex: ^.{0,25}$
    message: |
      Insufficient privacy permission description in Flutter iOS (OWASP M6/M8).
      iOS requires clear, detailed permission descriptions.

      PRIVACY RISKS:
      - App Store rejection
      - User distrust
      - GDPR/CCPA non-compliance

      SECURE FIX:
      ```xml
      <key>NSCameraUsageDescription</key>
      <string>Camera access is required to scan QR codes for payments and capture profile photos.</string>

      <key>NSLocationWhenInUseUsageDescription</key>
      <string>Location is needed to show nearby stores and provide delivery estimates.</string>

      <key>NSPhotoLibraryUsageDescription</key>
      <string>Photo library access allows selecting images for your profile and sharing product photos.</string>
      ```

      FLUTTER PERMISSION HANDLING:
      ```dart
      import 'package:permission_handler/permission_handler.dart';

      Future<bool> requestCamera() async {
        final status = await Permission.camera.request();
        if (status.isDenied) {
          // Show explanation matching Info.plist description
          _showPermissionDialog();
        }
        return status.isGranted;
      }
      ```

      Reference: OWASP M6, M8, Apple Privacy Guidelines, MASVS-PRIVACY-1
    severity: WARNING
    languages:
      - xml
    paths:
      include:
        - "**/Info.plist"
    metadata:
      category: privacy
      owasp-mobile-2024: "M6: Inadequate Privacy Controls"
      masvs: "MASVS-PRIVACY-1"
      confidence: MEDIUM
      platform: ios
      compliance: "GDPR, CCPA, App Store"

  # ============ FLUTTER PUBSPEC.YAML CONFIGURATION ============

  - id: flutter-pubspec-outdated-dart-sdk
    patterns:
      - pattern: |
          environment:
            sdk: "$VERSION"
      - metavariable-regex:
          metavariable: $VERSION
          regex: ^['"]?[<>=^~]*[0-2]\.\d+\.\d+
    message: |
      Outdated Dart SDK version in Flutter pubspec.yaml (OWASP M8).
      Old SDK versions lack security patches and modern protections.

      SECURITY RISKS:
      - Missing security patches
      - Vulnerable to known exploits
      - Lack of null safety (Dart 2.12+)
      - Missing modern security features

      SECURE FIX:
      ```yaml
      environment:
        sdk: ">=3.2.0 <4.0.0"
        flutter: ">=3.16.0"
      ```

      UPDATE PROCESS:
      ```bash
      flutter upgrade
      flutter pub upgrade
      flutter test
      flutter build apk --release
      ```

      Reference: OWASP M8, Flutter Security, CWE-1104
    severity: WARNING
    languages:
      - yaml
    paths:
      include:
        - "**/pubspec.yaml"
    metadata:
      category: security
      cwe: "CWE-1104: Use of Unmaintained Components"
      owasp-mobile-2024: "M8: Security Misconfiguration"
      confidence: MEDIUM

  - id: flutter-pubspec-git-dependency
    patterns:
      - pattern: |
          dependencies:
            ...
            $PKG:
              git: $URL
            ...
    message: |
      Git-based dependency in Flutter pubspec.yaml (OWASP M2/M8).
      Git dependencies bypass pub.dev security and can be compromised.

      SECURITY RISKS:
      - No pub.dev security scanning
      - No version verification
      - Mutable dependencies
      - Supply chain attacks

      SECURE FIX:
      ```yaml
      dependencies:
        # Use pub.dev verified packages
        http: ^1.1.0
        dio: ^5.4.0

        # If git needed, pin to commit
        custom_package:
          git:
            url: https://github.com/user/package.git
            ref: a1b2c3d4  # Specific commit SHA
      ```

      DEPENDENCY VERIFICATION:
      ```bash
      flutter pub deps
      flutter pub outdated
      dart pub global activate pana
      pana --no-warning .
      ```

      Reference: OWASP M2, M8, SLSA Supply Chain
    severity: WARNING
    languages:
      - yaml
    paths:
      include:
        - "**/pubspec.yaml"
    metadata:
      category: security
      cwe: "CWE-494: Download Without Integrity Check"
      owasp-mobile-2024: "M2: Inadequate Supply Chain Security"
      confidence: HIGH

  - id: flutter-gradle-insecure-repository
    patterns:
      - pattern-either:
          - pattern: |
              repositories {
                ...
                maven { url "http://$URL" }
                ...
              }
          - pattern: |
              maven { url 'http://$URL' }
    message: |
      Insecure HTTP Maven repository in Flutter Gradle (OWASP M8).
      HTTP repositories allow dependency poisoning attacks.

      SECURITY IMPACT:
      - Dependencies downloaded over HTTP
      - Man-in-the-middle attacks
      - Malicious dependency injection
      - Build compromise

      SECURE FIX:
      ```gradle
      repositories {
          google()
          mavenCentral()
          // Use HTTPS for custom repositories
          maven { url "https://secure-repo.example.com" }
      }
      ```

      Reference: OWASP M2, M8, Gradle Security
    severity: ERROR
    languages:
      - gradle
    paths:
      include:
        - "**/build.gradle"
    metadata:
      category: security
      cwe: "CWE-494: Download Without Integrity Check"
      owasp-mobile-2024: "M8: Security Misconfiguration"
      confidence: VERY_HIGH

  - id: flutter-gradle-allow-insecure-protocol
    patterns:
      - pattern: |
          repositories {
            ...
            allowInsecureProtocol = true
            ...
          }
    message: |
      Insecure protocol explicitly allowed in Gradle (OWASP M8).
      Gradle 7+ requires HTTPS by default - this bypasses security.

      REMOVE THIS SETTING - Use HTTPS repositories only.

      Reference: OWASP M8, Gradle 7 Security
    severity: ERROR
    languages:
      - gradle
    paths:
      include:
        - "**/build.gradle"
    metadata:
      category: security
      owasp-mobile-2024: "M8: Security Misconfiguration"
      confidence: VERY_HIGH

  # ============ FLUTTER BUILD CONFIGURATION ============

  - id: flutter-obfuscation-disabled
    patterns:
      - pattern: |
          flutter build $PLATFORM --release
      - pattern-not: |
          flutter build $PLATFORM --release --obfuscate --split-debug-info=$PATH
    message: |
      Flutter obfuscation not enabled in build (OWASP M7/M8).
      Without obfuscation, Dart code is easily reverse-engineered.

      SECURITY BENEFITS OF OBFUSCATION:
      - Symbol names mangled
      - Stack traces anonymized
      - Reverse engineering harder
      - Business logic protected

      SECURE BUILD:
      ```bash
      # Android
      flutter build apk --release \
        --obfuscate \
        --split-debug-info=build/app/outputs/symbols

      # iOS
      flutter build ios --release \
        --obfuscate \
        --split-debug-info=build/ios/symbols
      ```

      Reference: OWASP M7, M8, Flutter Obfuscation
    severity: WARNING
    languages:
      - bash
    metadata:
      category: security
      owasp-mobile-2024: "M7: Insufficient Binary Protections"
      confidence: MEDIUM

  - id: flutter-web-insecure-headers
    patterns:
      - pattern: |
          <meta http-equiv="Content-Security-Policy" content="$CSP">
      - metavariable-regex:
          metavariable: $CSP
          regex: (?i).*unsafe-inline.*
    message: |
      Flutter Web with unsafe CSP (OWASP M8).
      'unsafe-inline' in Content-Security-Policy allows XSS attacks.

      SECURE CSP FOR FLUTTER WEB:
      ```html
      <meta http-equiv="Content-Security-Policy"
            content="default-src 'self';
                     script-src 'self';
                     style-src 'self' 'nonce-{random}';
                     img-src 'self' data: https:;
                     connect-src 'self' https://api.example.com;">
      ```

      Reference: OWASP M8, Flutter Web Security
    severity: WARNING
    languages:
      - html
    paths:
      include:
        - "**/web/index.html"
    metadata:
      category: security
      cwe: "CWE-1021: Improper Restriction of Rendered UI Layers"
      owasp-mobile-2024: "M8: Security Misconfiguration"
      confidence: HIGH
