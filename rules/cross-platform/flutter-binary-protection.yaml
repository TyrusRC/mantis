      import 'package:flutter_windowmanager/flutter_windowmanager.dart';

      class ScreenshotProtection {
        static Future<void> enableScreenshotProtection() async {
          if (Platform.isAndroid) {
            await FlutterWindowManager.addFlags(
              FlutterWindowManager.FLAG_SECURE
            );
          }
          // iOS: No API for this, use app switcher blur instead
        }

        static Future<void> disableScreenshotProtection() async {
          if (Platform.isAndroid) {
            await FlutterWindowManager.clearFlags(
              FlutterWindowManager.FLAG_SECURE
            );
          }
        }
      }

      class SensitiveScreen extends StatefulWidget {
        @override
        void initState() {
          super.initState();
          ScreenshotProtection.enableScreenshotProtection();
        }

        @override
        void dispose() {
          ScreenshotProtection.disableScreenshotProtection();
          super.dispose();
        }
      }
