  # ============ LOGGING & INFORMATION DISCLOSURE ============

  - id: flutter-m7-print-sensitive-data
    patterns:
      - pattern-either:
          - pattern: print($DATA)
          - pattern: debugPrint($DATA)
      - metavariable-regex:
          metavariable: $DATA
          regex: (?i).*(password|token|key|secret|credential|auth|pin|ssn|credit.*card).*
      - pattern-not-inside: |
          void main() {
            testWidgets('...', (...) { ... });
          }
    message: |
      Sensitive data in print statements (OWASP M7: Insufficient Binary Protections).
      print() and debugPrint() output to device logs, exposing sensitive information.

      VULNERABLE PATTERN:
      ```dart
      // VULNERABLE: Logging sensitive data
      void login(String username, String password) {
        print('Login attempt: $username / $password'); // Exposed in logs!
        debugPrint('API Token: $token'); // Visible via ADB/Xcode
      }
      ```

      SECURE IMPLEMENTATION:
      ```dart
      import 'package:flutter/foundation.dart';

      class SecureLogger {
        static void log(String message, {bool sensitive = false}) {
          if (kDebugMode && !sensitive) {
            debugPrint(message);
          } else if (kReleaseMode && !sensitive) {
            // Send to analytics (sanitized)
            _sendToAnalytics(message);
          }
          // Never log sensitive data
        }

        static void logSecureOperation(String operation) {
          if (kDebugMode) {
            debugPrint('Secure operation: $operation');
          }
          // Do NOT log parameters, only operation name
        }
      }

      // Usage
      void login(String username, String password) {
        SecureLogger.logSecureOperation('login_attempt');
        // Never log credentials
      }
      ```

      PROGUARD/R8 LOG STRIPPING (Android):
      ```
      # android/app/proguard-rules.pro
      -assumenosideeffects class android.util.Log {
          public static *** d(...);
          public static *** v(...);
          public static *** i(...);
      }
      ```

      Reference: OWASP Mobile Logging
    severity: ERROR
    languages:
      - dart
    metadata:
      category: security
      cwe: "CWE-532: Insertion of Sensitive Information into Log File"
      owasp-mobile-2024: "M7: Insufficient Binary Protections"
      confidence: HIGH
      false_positive_likelihood: LOW

  # ============ EMULATOR DETECTION ============

  - id: flutter-m7-missing-emulator-detection
    patterns:
      - pattern: |
          void main() {
            runApp($APP);
          }
      - pattern-not-inside: |
          SafeDevice.isRealDevice
      - pattern-not-inside: |
          Platform.isAndroid && $CHECK
    message: |
      Missing emulator detection (OWASP M7: Insufficient Binary Protections).
      Banking/payment apps should detect emulators to prevent automated attacks.

      SECURE IMPLEMENTATION:
      ```dart
      import 'package:safe_device/safe_device.dart';

      class EmulatorDetector {
