rules:
  # =============================================================================
  # OWASP Mobile Top 10 - M7: Insufficient Binary Protections (Flutter)
  # COMPREHENSIVE COVERAGE - 2024/2025
  # =============================================================================
  #
  # Coverage Areas:
  # 1. Code Obfuscation & Build Configuration
  # 2. Debug Mode Detection
  # 3. Root & Jailbreak Detection
  # 4. Runtime Integrity Checks
  # 5. Anti-Tampering Mechanisms
  # 6. Debug Symbol Stripping
  # 7. Screenshot Protection
  # 8. Debugger Detection
  # 9. Emulator Detection
  # 10. Code Signing Verification
  #
  # Target: 85%+ M7 Coverage for Flutter
  # Sources: OWASP MASTG, Flutter Security Guide 2024, Google Play Security
  # =============================================================================

  # ============================================================================
  # SECTION 1: CODE OBFUSCATION & BUILD CONFIGURATION
  # ============================================================================

  - id: flutter-m7-build-without-obfuscation
    patterns:
      - pattern-either:
          - pattern: |
              flutter build apk
          - pattern: |
              flutter build appbundle
          - pattern: |
              flutter build ios
          - pattern: |
              flutter build ipa
      - pattern-not: |
          flutter build ... --obfuscate --split-debug-info=...
    message: |
      Flutter build without code obfuscation (OWASP M7: Insufficient Binary Protections).

      CRITICAL SECURITY ISSUE:
      Building without --obfuscate flag leaves Dart code readable in release builds.
      Attackers can extract kernel_blob.bin and reverse engineer application logic,
      API endpoints, cryptographic keys, and business logic using tools like reFlutter.

      VULNERABLE PATTERN:
      ```bash
      # INSECURE - No obfuscation
      flutter build apk --release
      flutter build appbundle --release
      flutter build ios --release
      flutter build ipa --release
      ```

      ATTACK SCENARIO:
      1. Attacker extracts APK/IPA from device or app store
      2. Locates kernel_blob.bin containing Dart VM snapshot
      3. Uses reFlutter, Doldrums, or similar tools to decompile Dart code
      4. Extracts hardcoded API keys, secrets, endpoints
      5. Reverse engineers business logic and algorithms
      6. Bypasses client-side validations and security checks
      7. Identifies vulnerabilities in code structure

      SECURE IMPLEMENTATION:
      ```bash
      # Android APK with Obfuscation
      flutter build apk --release \
        --obfuscate \
        --split-debug-info=./build/debug-symbols/android

      # Android App Bundle (AAB) with Obfuscation
      flutter build appbundle --release \
        --obfuscate \
        --split-debug-info=./build/debug-symbols/android \
        --target-platform android-arm,android-arm64,android-x64

      # iOS IPA with Obfuscation
      flutter build ipa --release \
        --obfuscate \
        --split-debug-info=./build/debug-symbols/ios \
        --export-options-plist=ios/ExportOptions.plist

      # iOS without IPA (Xcode archive)
      flutter build ios --release \
        --obfuscate \
        --split-debug-info=./build/debug-symbols/ios
      ```

      ANDROID NATIVE CODE PROTECTION (build.gradle):
      ```gradle
      // android/app/build.gradle
      android {
          buildTypes {
              release {
                  // Enable R8/ProGuard for native code
                  minifyEnabled true
                  shrinkResources true
                  proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'),
                                'proguard-rules.pro'

                  // Strip debug symbols from native libraries
                  ndk {
                      debugSymbolLevel 'SYMBOL_TABLE'
                  }

                  // Additional hardening
                  signingConfig signingConfigs.release
              }
          }

          // Enable code shrinking
          packagingOptions {
              exclude 'META-INF/*.kotlin_module'
          }
      }
      ```

      PROGUARD RULES (android/app/proguard-rules.pro):
      ```
      # Keep Flutter Engine
      -keep class io.flutter.app.** { *; }
      -keep class io.flutter.plugin.** { *; }
      -keep class io.flutter.util.** { *; }
      -keep class io.flutter.view.** { *; }
      -keep class io.flutter.** { *; }
      -keep class io.flutter.plugins.** { *; }

      # Obfuscate application code
      -repackageclasses ''
      -allowaccessmodification

      # Remove logging
      -assumenosideeffects class android.util.Log {
          public static *** d(...);
          public static *** v(...);
          public static *** i(...);
      }
      ```

      IOS XCODE CONFIGURATION:
      ```xml
      <!-- ios/Runner.xcodeproj/project.pbxproj -->
      <!-- Ensure these are set for Release configuration -->
      STRIP_INSTALLED_PRODUCT = YES
      DEPLOYMENT_POSTPROCESSING = YES
      COPY_PHASE_STRIP = YES
      ENABLE_BITCODE = NO  /* Deprecated in Xcode 14+ */
      GCC_OPTIMIZATION_LEVEL = fast
      SWIFT_OPTIMIZATION_LEVEL = -O
      ```

      CI/CD INTEGRATION:
      ```yaml
      # .github/workflows/build-release.yml
      name: Build Release

      on:
        push:
          tags:
            - 'v*'

      jobs:
        build-android:
          runs-on: ubuntu-latest
          steps:
            - uses: actions/checkout@v3

            - name: Setup Flutter
              uses: subosito/flutter-action@v2
              with:
                flutter-version: '3.32.x'

            - name: Build APK with Obfuscation
              run: |
                flutter build apk --release \
                  --obfuscate \
                  --split-debug-info=build/app/outputs/symbols \
                  --target-platform android-arm64

            - name: Archive Debug Symbols
              run: |
                cd build/app/outputs/symbols
                tar -czf android-symbols.tar.gz *
                # Upload to secure storage (DO NOT include in APK)

            - name: Verify Obfuscation
              run: |
                # Extract and check for readable strings
                unzip -q build/app/outputs/flutter-apk/app-release.apk -d extracted/

                # Should NOT find readable class/function names
                if strings extracted/lib/*/libflutter.so | grep -E "class [A-Z]|function [a-z]" > /dev/null; then
                  echo "ERROR: Obfuscation may not be working correctly"
                  exit 1
                fi

                echo "✓ Obfuscation verified"

        build-ios:
          runs-on: macos-latest
          steps:
            - uses: actions/checkout@v3

            - name: Setup Flutter
              uses: subosito/flutter-action@v2

            - name: Build IPA with Obfuscation
              run: |
                flutter build ipa --release \
                  --obfuscate \
                  --split-debug-info=build/ios/symbols \
                  --export-options-plist=ios/ExportOptions.plist

            - name: Archive Debug Symbols
              run: |
                cd build/ios/symbols
                tar -czf ios-symbols.tar.gz *
      ```

      WHAT --obfuscate DOES:
      ✓ Renames Dart classes, functions, variables to meaningless identifiers
      ✓ Removes unnecessary whitespace and comments
      ✓ Makes stack traces unreadable without symbol map
      ✓ Increases reverse engineering difficulty
      ✗ Does NOT encrypt code (still readable with effort)
      ✗ Does NOT protect string literals (need additional measures)

      WHAT --split-debug-info DOES:
      ✓ Separates debug symbols from release binary
      ✓ Reduces app size significantly
      ✓ Required for obfuscation to work
      ✓ Enables crash reporting with proper symbol upload
      ✗ Store symbols securely (DO NOT commit to repo)

      LIMITATIONS & ADDITIONAL MEASURES:
      ```dart
      // 1. String literals remain visible - Use code generation
      class ApiConfig {
        // ❌ BAD: Hardcoded string
        static const String apiKey = 'sk-1234567890abcdef';

        // ✅ GOOD: Environment variable
        static const String apiKey = String.fromEnvironment(
          'API_KEY',
          defaultValue: '',
        );
      }

      // Build with: flutter build apk --dart-define=API_KEY=sk-prod-key

      // 2. Asset files remain readable - Encrypt sensitive assets
      import 'package:flutter/services.dart' show rootBundle;
      import 'package:encrypt/encrypt.dart';

      Future<String> loadEncryptedAsset(String path) async {
        final encrypted = await rootBundle.loadString(path);
        final key = Key.fromUtf8('32-character-encryption-key!');
        final iv = IV.fromLength(16);
        final encrypter = Encrypter(AES(key));
        return encrypter.decrypt64(encrypted, iv: iv);
      }

      // 3. Native code needs separate obfuscation
      // Use ProGuard/R8 for Android
      // Use strip utility for iOS
      ```

      CRASHLYTICS INTEGRATION (Deobfuscate Stack Traces):
      ```yaml
      # Upload symbols to Firebase Crashlytics
      # .github/workflows/upload-symbols.yml
      - name: Upload symbols to Crashlytics
        run: |
          # Android
          firebase crashlytics:symbols:upload \
            --app=1:1234567890:android:abcdef \
            build/app/outputs/symbols

          # iOS
          ./ios/Pods/FirebaseCrashlytics/upload-symbols \
            -gsp ios/Runner/GoogleService-Info.plist \
            -p ios \
            build/ios/symbols
      ```

      VERIFICATION CHECKLIST:
      - [ ] --obfuscate flag used in all release builds
      - [ ] --split-debug-info configured with secure storage
      - [ ] ProGuard/R8 enabled for Android native code
      - [ ] Xcode strip settings enabled for iOS
      - [ ] Debug symbols uploaded to crash reporting (Crashlytics/Sentry)
      - [ ] Sensitive strings moved to environment variables
      - [ ] CI/CD pipeline enforces obfuscation
      - [ ] Release builds tested for functionality
      - [ ] Obfuscation verified with strings command

      DEOBFUSCATION FOR DEBUGGING:
      ```bash
      # When crash occurs, use symbol map to deobfuscate
      flutter symbolize \
        --input=crash-stack-trace.txt \
        --debug-info=build/app/outputs/symbols \
        --output=readable-stack-trace.txt
      ```

      Reference:
      - Flutter Obfuscation: https://docs.flutter.dev/deployment/obfuscate
      - OWASP MASTG-TEST-0226: Testing for Code Obfuscation
      - reFlutter: https://github.com/ptswarm/reFlutter

    severity: ERROR
    languages:
      - generic
    paths:
      include:
        - "**/build.sh"
        - "**/Makefile"
        - "**/*.yml"
        - "**/*.yaml"
        - "**/Fastfile"
    metadata:
      category: security
      cwe: "CWE-656: Reliance on Security Through Obscurity"
      owasp-mobile-2024: "M7: Insufficient Binary Protections"
      mastg-test: "MASTG-TEST-0226: Testing for Code Obfuscation"
      confidence: VERY_HIGH
      false_positive_likelihood: VERY_LOW

  - id: flutter-m7-debug-info-not-split
    patterns:
      - pattern: |
          flutter build ... --obfuscate
      - pattern-not: |
          flutter build ... --obfuscate --split-debug-info=...
    message: |
      Obfuscation without split debug info (OWASP M7).
      --split-debug-info is REQUIRED for obfuscation to work properly.

      ISSUE:
      Using --obfuscate without --split-debug-info means debug symbols
      remain embedded in the binary, defeating the purpose of obfuscation.

      CORRECT USAGE:
      ```bash
      flutter build apk --release \
        --obfuscate \
        --split-debug-info=./build/debug-symbols
      ```

      Reference: Flutter Build Modes
    severity: ERROR
    languages:
      - generic
    paths:
      include:
        - "**/build.sh"
        - "**/*.yml"
        - "**/*.yaml"
    metadata:
      category: security
      owasp-mobile-2024: "M7: Insufficient Binary Protections"
      confidence: VERY_HIGH

  # ============================================================================
  # SECTION 2: DEBUG MODE & DEVELOPMENT ARTIFACTS
  # ============================================================================

  - id: flutter-m7-kdebugmode-in-production
    patterns:
      - pattern-either:
          - pattern: |
              if (kDebugMode) {
                ...
              }
          - pattern: |
              kDebugMode ? $TRUE : $FALSE
      - pattern-not-inside: |
          void main() {
            testWidgets('...', (...) { ... });
          }
      - pattern-not-inside: |
          // Performance monitoring only
          if (kDebugMode) {
            debugPrint($MSG);
          }
    message: |
      kDebugMode check in production code (OWASP M7).

      RISK: Debug code paths can leak sensitive information or bypass security.

      VULNERABLE PATTERNS:
      ```dart
      // ❌ VULNERABLE: Security bypass
      class AuthService {
        Future<bool> authenticate(String password) async {
          if (kDebugMode) {
            return true; // Bypasses auth in debug builds!
          }
          return await _realAuthenticate(password);
        }
      }

      // ❌ VULNERABLE: Sensitive data leak
      void processPayment(CreditCard card) {
        if (kDebugMode) {
          print('Card: ${card.number}'); // Leaks PII
        }
      }

      // ❌ VULNERABLE: Security control disabled
      final enableSSLPinning = kDebugMode ? false : true;
      ```

      SECURE PATTERNS:
      ```dart
      // ✅ SAFE: Non-sensitive performance logging
      void buildWidget() {
        if (kDebugMode) {
          final stopwatch = Stopwatch()..start();
          // ... widget building ...
          debugPrint('Build time: ${stopwatch.elapsedMilliseconds}ms');
        }
      }

      // ✅ SAFE: Dev tools initialization
      void main() {
        if (kDebugMode) {
          // Enable dev tools (tree-shaken in release)
          initializeDevTools();
        }
        runApp(MyApp());
      }

      // ✅ BETTER: Environment-based configuration
      class AppConfig {
        static const bool isProduction = bool.fromEnvironment(
          'PRODUCTION',
          defaultValue: false,
        );

        static const String apiUrl = String.fromEnvironment(
          'API_URL',
          defaultValue: 'https://staging-api.example.com',
        );
      }

      // Build: flutter build apk --dart-define=PRODUCTION=true --dart-define=API_URL=https://api.prod.com
      ```

      Reference: Flutter Build Modes
    severity: WARNING
    languages:
      - dart
    metadata:
      category: security
      cwe: "CWE-489: Active Debug Code"
      owasp-mobile-2024: "M7: Insufficient Binary Protections"
      confidence: MEDIUM
      false_positive_likelihood: MEDIUM

  - id: flutter-m7-assert-with-sensitive-data
    patterns:
      - pattern: assert($CONDITION, $MESSAGE)
      - metavariable-regex:
          metavariable: $MESSAGE
          regex: (?i).*(password|token|key|secret|credential|card|ssn|pin).*
    message: |
      Assert statement with sensitive data (OWASP M7).

      ISSUE: Assert messages can leak sensitive information in debug builds.

      VULNERABLE:
      ```dart
      void encrypt(String data, String key) {
        assert(key.isNotEmpty, 'Key: $key'); // ❌ Leaks key
      }
      ```

      SECURE:
      ```dart
      void encrypt(String data, String key) {
        assert(key.isNotEmpty, 'Encryption key required'); // ✅ Safe

        // Better: Use exceptions for both debug and release
        if (key.isEmpty) {
          throw ArgumentError('Encryption key required');
        }
      }
      ```

      Reference: Dart Assert Best Practices
    severity: WARNING
    languages:
      - dart
    metadata:
      category: security
      cwe: "CWE-532: Insertion of Sensitive Information into Log File"
      owasp-mobile-2024: "M7: Insufficient Binary Protections"
      confidence: HIGH

  - id: flutter-m7-debugprint-sensitive-data
    patterns:
      - pattern-either:
          - pattern: print($DATA)
          - pattern: debugPrint($DATA)
      - metavariable-regex:
          metavariable: $DATA
          regex: (?i).*(password|token|key|secret|credential|auth|pin|ssn|card).*
    message: |
      Sensitive data in print/debugPrint (OWASP M7).

      RISK: Logs are accessible via ADB (Android) or Xcode console (iOS).

      VULNERABLE:
      ```dart
      void login(String username, String password) {
        print('Login: $username / $password'); // ❌ Exposed in logs!
      }
      ```

      SECURE:
      ```dart
      class SecureLogger {
        static void logOperation(String operation) {
          if (kDebugMode) {
            debugPrint('[SECURE] Operation: $operation');
          }
          // Never log sensitive parameters
        }
      }

      void login(String username, String password) {
        SecureLogger.logOperation('login_attempt');
        // Do NOT log credentials
      }
      ```

      Reference: OWASP Mobile Logging Best Practices
    severity: ERROR
    languages:
      - dart
    metadata:
      category: security
      cwe: "CWE-532: Insertion of Sensitive Information into Log File"
      owasp-mobile-2024: "M7: Insufficient Binary Protections"
      confidence: HIGH

  # ============================================================================
  # SECTION 3: ROOT & JAILBREAK DETECTION
  # ============================================================================

  - id: flutter-m7-missing-root-jailbreak-detection
    patterns:
      - pattern: |
          void main() {
            runApp($APP);
          }
      - pattern-not-inside: |
          FlutterJailbreakDetection.jailbroken
      - pattern-not-inside: |
          RootDetector.isRooted
      - pattern-not-inside: |
          SafeDevice.isJailBroken
    message: |
      Missing root/jailbreak detection (OWASP M7).

      SEVERITY ASSESSMENT:
      CRITICAL: Banking, payment, healthcare apps
      HIGH: Enterprise apps with confidential data
      MEDIUM: Social apps with user data
      LOW: Utility/productivity apps
      NONE: Developer tools, open-source apps

      IMPLEMENTATION:
      ```dart
      // pubspec.yaml
      dependencies:
        flutter_jailbreak_detection: ^1.10.0
        safe_device: ^1.1.5

      // lib/security/device_checker.dart
      import 'package:flutter_jailbreak_detection/flutter_jailbreak_detection.dart';
      import 'package:safe_device/safe_device.dart';

      class DeviceSecurityChecker {
        static Future<DeviceSecurityStatus> checkDevice() async {
          final results = await Future.wait([
            FlutterJailbreakDetection.jailbroken,
            FlutterJailbreakDetection.developerMode,
            SafeDevice.isRealDevice,
            SafeDevice.canMockLocation,
          ]);

          return DeviceSecurityStatus(
            isJailbroken: results[0] as bool,
            isDeveloperMode: results[1] as bool,
            isRealDevice: results[2] as bool,
            canMockLocation: results[3] as bool,
          );
        }
      }

      // lib/main.dart
      void main() async {
        WidgetsFlutterBinding.ensureInitialized();

        final status = await DeviceSecurityChecker.checkDevice();

        if (!status.isSecure && kReleaseMode) {
          runApp(InsecureDeviceWarning(status: status));
        } else {
          runApp(MyApp());
        }
      }
      ```

      NATIVE DETECTION (Android):
      ```kotlin
      // android/app/src/main/kotlin/.../RootDetector.kt
      class RootDetector {
          fun isRooted(): Boolean {
              return checkSuBinary() || checkBuildTags() || checkSuCommand()
          }

          private fun checkSuBinary(): Boolean {
              val paths = arrayOf(
                  "/system/app/Superuser.apk",
                  "/sbin/su", "/system/bin/su", "/system/xbin/su",
                  "/data/local/xbin/su", "/data/local/bin/su",
                  "/system/sd/xbin/su", "/system/bin/failsafe/su",
                  "/data/local/su", "/su/bin/su"
              )
              return paths.any { File(it).exists() }
          }

          private fun checkBuildTags(): Boolean {
              return Build.TAGS?.contains("test-keys") == true
          }
      }
      ```

      LIMITATIONS:
      - Can be bypassed by advanced attackers
      - May frustrate legitimate power users
      - Requires maintenance for new bypass methods
      - Better combined with server-side attestation

      RECOMMENDED: Google Play Integrity API (Android) / DeviceCheck (iOS)

      Reference: MASTG-TEST-0228: Testing Root Detection
    severity: WARNING
    languages:
      - dart
    metadata:
      category: security
      owasp-mobile-2024: "M7: Insufficient Binary Protections"
      mastg-test: "MASTG-TEST-0228: Testing Root Detection"
      confidence: LOW
      false_positive_likelihood: HIGH

  # ============================================================================
  # SECTION 4: ANDROID-SPECIFIC PROTECTIONS
  # ============================================================================

  - id: flutter-m7-android-proguard-disabled
    patterns:
      - pattern: |
          buildTypes {
            release {
              ...
              minifyEnabled false
              ...
            }
          }
    message: |
      ProGuard/R8 disabled in Flutter Android app (OWASP M7).

      ISSUE: Native Android code is not obfuscated in release builds.

      SECURE CONFIGURATION:
      ```gradle
      // android/app/build.gradle
      android {
          buildTypes {
              release {
                  minifyEnabled true
                  shrinkResources true
                  proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'),
                                'proguard-rules.pro'

                  ndk {
                      debugSymbolLevel 'SYMBOL_TABLE'
                  }
              }
          }
      }
      ```

      Reference: Android Code Obfuscation
    severity: WARNING
    languages:
      - generic
    paths:
      include:
        - "**/android/app/build.gradle"
    metadata:
      category: security
      owasp-mobile-2024: "M7: Insufficient Binary Protections"
      confidence: HIGH

  - id: flutter-m7-android-debuggable-true
    patterns:
      - pattern: |
          <application
            ...
            android:debuggable="true"
            ...
          />
    message: |
      Application set as debuggable in AndroidManifest.xml (OWASP M7).

      CRITICAL SECURITY ISSUE:
      android:debuggable="true" allows attackers to:
      - Attach debuggers to app process
      - Read/modify app memory at runtime
      - Bypass security controls
      - Extract sensitive data

      FIX:
      ```xml
      <!-- Remove android:debuggable attribute (defaults to false in release) -->
      <application
          android:name=".MainApplication"
          android:icon="@mipmap/ic_launcher"
          android:label="@string/app_name">
          <!-- Do NOT set android:debuggable in production -->
      </application>
      ```

      Reference: CWE-489 Active Debug Code
    severity: ERROR
    languages:
      - xml
    paths:
      include:
        - "**/AndroidManifest.xml"
    metadata:
      category: security
      cwe: "CWE-489: Active Debug Code"
      owasp-mobile-2024: "M7: Insufficient Binary Protections"
      confidence: VERY_HIGH

  - id: flutter-m7-android-backup-allowed
    patterns:
      - pattern-either:
          - pattern: |
              <application
                ...
                android:allowBackup="true"
                ...
              />
          - pattern: |
              <application
                ...
              />
      - pattern-not: |
          <application
            ...
            android:allowBackup="false"
            ...
          />
    message: |
      Android backup enabled (OWASP M7).

      RISK: App data can be backed up via ADB and restored on other devices.

      SECURE CONFIGURATION:
      ```xml
      <application
          android:allowBackup="false"
          android:fullBackupContent="false">
      </application>
      ```

      Reference: Android Backup Security
    severity: WARNING
    languages:
      - xml
    paths:
      include:
        - "**/AndroidManifest.xml"
    metadata:
      category: security
      owasp-mobile-2024: "M7: Insufficient Binary Protections"
      confidence: MEDIUM

  # ============================================================================
  # SECTION 5: IOS-SPECIFIC PROTECTIONS
  # ============================================================================

  - id: flutter-m7-ios-symbols-not-stripped
    patterns:
      - pattern-either:
          - pattern: |
              STRIP_INSTALLED_PRODUCT = NO
          - pattern: |
              COPY_PHASE_STRIP = NO
    message: |
      iOS debug symbols not stripped (OWASP M7).

      ISSUE: Binary contains debugging information aiding reverse engineering.

      SECURE CONFIGURATION:
      ```
      // ios/Runner.xcodeproj/project.pbxproj (Release configuration)
      STRIP_INSTALLED_PRODUCT = YES
      DEPLOYMENT_POSTPROCESSING = YES
      COPY_PHASE_STRIP = YES
      ENABLE_BITCODE = NO  /* Deprecated in Xcode 14+ */
      ```

      Reference: iOS Binary Protection
    severity: WARNING
    languages:
      - generic
    paths:
      include:
        - "**/project.pbxproj"
    metadata:
      category: security
      owasp-mobile-2024: "M7: Insufficient Binary Protections"
      confidence: HIGH

  # ============================================================================
  # SECTION 6: RUNTIME INTEGRITY CHECKS
  # ============================================================================

  - id: flutter-m7-missing-app-integrity-check
    patterns:
      - pattern: |
          void main() async {
            ...
            runApp($APP);
          }
      - pattern-not-inside: |
          PackageInfo.fromPlatform()
      - pattern-not-inside: |
          verifyAppIntegrity()
    message: |
      Missing app integrity verification (OWASP M7).

      RECOMMENDATION: High-value apps should verify integrity at startup.

      IMPLEMENTATION:
      ```dart
      import 'package:package_info_plus/package_info_plus.dart';

      class IntegrityChecker {
        static Future<bool> verifyAppIntegrity() async {
          final info = await PackageInfo.fromPlatform();

          // Verify package name
          if (info.packageName != 'com.example.app') {
            return false;
          }

          // For signature verification, use platform channels
          return await _verifyNativeSignature();
        }

        static Future<bool> _verifyNativeSignature() async {
          // Android: Check APK signature
          // iOS: Check code signature
          // Requires native implementation
          return true;
        }
      }

      void main() async {
        WidgetsFlutterBinding.ensureInitialized();

        if (kReleaseMode) {
          final isValid = await IntegrityChecker.verifyAppIntegrity();
          if (!isValid) {
            runApp(TamperingDetectedScreen());
            return;
          }
        }

        runApp(MyApp());
      }
      ```

      Reference: OWASP Mobile Tampering Detection
    severity: INFO
    languages:
      - dart
